// ─── Plan Tomorrow ────────────────────────────────────────────────────────────
function renderPlanPage(fromDisplay = false) {
  document.body.classList.remove("display-mode");
  const app = document.getElementById("app");
  app.innerHTML = "";

  const deptCode = session.deptCode;

  // ── Date helpers ──
  function planDateKey(dateStr) {
    // dateStr: "YYYY-MM-DD"
    const [y, m, d] = dateStr.split("-").map(Number);
    return `${y}-${m}-${d}`;
  }
  function getTomorrow() {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }
  function formatDateBanner(dateStr) {
    const [y, m, d] = dateStr.split("-").map(Number);
    const dt = new Date(y, m - 1, d);
    return dt.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric", year: "numeric" });
  }
  function isWeekend(dateStr) {
    const [y, m, d] = dateStr.split("-").map(Number);
    const day = new Date(y, m - 1, d).getDay();
    return day === 0 || day === 6;
  }

  // ── State ──
  let selectedDate = getTomorrow();
  let planData = {};        // { [roomId]: { provider, supervisor, empty } }
  let availableList = [];   // ordered array of names
  let planNotes = {};       // { [nameKey]: { text, color } }
  let planLate  = {};       // { [nameKey]: true }
  let planCallData = {};    // { [posIdx]: name }
  let planPostCallData = {}; // { [posIdx]: name }
  let planHeaderText = "";
  let emailConfig    = {};   // { to, fromName, defaultSubject }

  // ── Firebase helpers ──
  function planBoardRef(dateStr) {
    return ref(db, `boards/${deptCode}/${planDateKey(dateStr)}`);
  }
  function planAvailRef(dateStr) {
    return ref(db, `boards/${deptCode}/${planDateKey(dateStr)}/_available_`);
  }
  function planRoomRef(dateStr, rid) {
    return ref(db, `boards/${deptCode}/${planDateKey(dateStr)}/${rid}`);
  }
  function planHistRef(dateStr, name) {
    const key = "_hist_" + name.replace(/[^a-zA-Z0-9]/g, "_");
    return ref(db, `boards/${deptCode}/${planDateKey(dateStr)}/${key}`);
  }
  function planCallRef(dateStr, idx) {
    return ref(db, `boards/${deptCode}/${planDateKey(dateStr)}/_call_/${idx}`);
  }
  function planPostCallRef(dateStr, idx) {
    return ref(db, `boards/${deptCode}/${planDateKey(dateStr)}/_postcall_/${idx}`);
  }
  function planHeaderRef() {
    return ref(db, `deptAdmin/${deptCode}/planHeader`);
  }

  async function saveAvailable() {
    const obj = {};
    availableList.forEach((n, i) => { obj[i] = n; });
    await set(planAvailRef(selectedDate), Object.keys(obj).length ? obj : null);
  }

  async function savePlanNote(name, noteObj) {
    const r = planHistRef(selectedDate, name);
    const snap = await get(r);
    const current = snap.val() || {};
    await set(r, { ...current, provider: name, note: noteObj || null });
    if (noteObj) planNotes[name] = noteObj;
    else delete planNotes[name];
  }

  async function savePlanLate(name, isLate) {
    const r = planHistRef(selectedDate, name);
    const snap = await get(r);
    const current = snap.val() || {};
    await set(r, { ...current, provider: name, late: isLate || null });
    if (isLate) planLate[name] = true;
    else delete planLate[name];
  }

  async function savePlanRoom(loc, data) {
    const rid = roomId(loc);
    planData[rid] = data;
    if (data && Object.keys(data).some(k => data[k] != null && data[k] !== false)) {
      await set(planRoomRef(selectedDate, rid), data);
    } else {
      await remove(planRoomRef(selectedDate, rid));
      delete planData[rid];
    }
  }

  async function savePlanCallAssignment(idx, name) {
    if (name) {
      planCallData[idx] = name;
      await set(planCallRef(selectedDate, idx), name);
    } else {
      delete planCallData[idx];
      await remove(planCallRef(selectedDate, idx));
    }
  }

  async function savePlanPostCallAssignment(idx, name) {
    if (name) {
      planPostCallData[idx] = name;
      await set(planPostCallRef(selectedDate, idx), name);
    } else {
      delete planPostCallData[idx];
      await remove(planPostCallRef(selectedDate, idx));
    }
  }

  // ── Get assigned providers (from plan room assignments) ──
  function getAssignedProviders() {
    const assigned = new Set();
    const realLocs = locations.filter(l => !isDivider(l));
    realLocs.forEach(loc => {
      const d = planData[roomId(loc)] || {};
      if (d.provider) assigned.add(d.provider);
    });
    noBreakSlots.forEach(slot => {
      const d = planData[roomId("nb_" + slot)] || {};
      if (d.provider) assigned.add(d.provider);
    });
    return assigned;
  }

  function getUnassignedAvailable() {
    // Only exclude providers already in a regular OR room — core positions (no-break
    // slots) are separate and don't disqualify someone from Working Tomorrow randomize.
    const assignedToRooms = new Set();
    locations.forEach(l => {
      if (isDivider(l)) return;
      const d = planData[roomId(l)] || {};
      if (d.provider) assignedToRooms.add(d.provider);
    });
    return availableList.filter(n => !assignedToRooms.has(n));
  }

  // ── Load data ──
  async function loadPlanData(dateStr) {
    selectedDate = dateStr;
    planData = {};
    availableList = [];
    planNotes = {};
    planLate  = {};
    planCallData = {};
    planPostCallData = {};

    try {
      const [boardSnap, headerSnap, emailConfigSnap] = await Promise.all([
        get(planBoardRef(dateStr)),
        get(planHeaderRef()),
        get(ref(db, `deptAdmin/${deptCode}/emailConfig`)),
      ]);

      planHeaderText = headerSnap.val() || "";
      emailConfig    = emailConfigSnap.val() || {};

      const bval = boardSnap.val() || {};

      // available list
      if (bval._available_) {
        availableList = Object.values(bval._available_).filter(Boolean);
      }

      // room assignments
      Object.entries(bval).forEach(([k, v]) => {
        if (k.startsWith("_")) return;
        if (v && typeof v === "object") planData[k] = v;
      });

      // Default-empty rooms: mark them empty once per plan date. The _emptydefaults_
      // marker means it runs a single time, so a later manual un-empty (which removes
      // the room node) isn't re-defaulted on the next load.
      if (defaultEmptyRooms.length && !bval._emptydefaults_) {
        const emptyWrites = [];
        defaultEmptyRooms.forEach(loc => {
          const rid = roomId(loc);
          const d = planData[rid];
          if (d && (d.provider || d.empty)) return; // already assigned or already empty
          planData[rid] = { empty: true };
          emptyWrites.push(set(planRoomRef(dateStr, rid), { empty: true }));
        });
        emptyWrites.push(set(ref(db, `boards/${deptCode}/${planDateKey(dateStr)}/_emptydefaults_`), true));
        await Promise.all(emptyWrites);
      }

      // notes and late flag from _hist_ keys
      Object.entries(bval).forEach(([k, v]) => {
        if (k.startsWith("_hist_") && v && v.provider) {
          if (v.note) planNotes[v.provider] = v.note;
          if (v.late) planLate[v.provider]  = true;
        }
      });

      // call assignments
      if (bval._call_) {
        Object.entries(bval._call_).forEach(([i, n]) => { planCallData[i] = n; });
      }

      // post-call: use plan date's _postcall_ if present; else load from today's _call_
      if (bval._postcall_ && Object.keys(bval._postcall_).length) {
        Object.entries(bval._postcall_).forEach(([i, n]) => { planPostCallData[i] = n; });
      } else {
        // auto-fill from today's call data
        const todaySnap = await get(ref(db, `boards/${deptCode}/${tsDay()}/_call_`));
        const todayCall = todaySnap.val() || {};
        planPostCallData = { ...todayCall };
        // save them to plan date
        const saves = Object.entries(todayCall).map(([i, n]) => set(planPostCallRef(dateStr, i), n));
        if (saves.length) await Promise.all(saves);
      }
    } catch(e) {
      console.warn("Plan load error:", e);
    }
  }

  // ── Render ──
  async function render(dateStr) {
    await loadPlanData(dateStr);
    buildUI();
  }

  function buildUI() {
    app.innerHTML = "";

    // ── Header ──
    const fridayWarn = isWeekend(selectedDate)
      ? el("span", { class: "plan-friday-warn" }, "Heads up: consider picking Monday")
      : null;

    const dateInput = el("input", {
      class: "plan-date-input",
      type: "date",
      value: selectedDate,
    });
    dateInput.addEventListener("change", () => {
      const newDate = dateInput.value;
      if (newDate) render(newDate);
    });

    const headerInput = el("input", {
      class: "plan-header-input",
      type: "text",
      placeholder: "PDF header (e.g. SJMC Daily OR Assignments)",
      value: planHeaderText,
    });
    headerInput.addEventListener("blur", async () => {
      planHeaderText = headerInput.value.trim();
      await set(planHeaderRef(), planHeaderText || null);
    });
    headerInput.addEventListener("keydown", e => {
      if (e.key === "Enter") headerInput.blur();
    });

    const bannerDiv = el("div", { class: "plan-day-banner" }, formatDateBanner(selectedDate));

    const leftCol   = el("div", { class: "plan-col-left" });
    const centerCol = el("div", { class: "plan-col-center" });
    const rightCol  = el("div", { class: "plan-col-right" });

    buildLeftColumn(leftCol);
    buildCenterColumn(centerCol);
    buildRightColumn(rightCol);

    const bottomBar = el("div", { class: "plan-bottom-bar" },
      el("button", { class: "btn-primary", style: { fontSize:"13px" }, onClick: printPlan }, "🖨 View Schedule PDF"),
      el("button", { class: "btn-ghost",   style: { fontSize:"13px" }, onClick: clearSchedule }, "🧹 Clear Schedule"),
      el("div", { style: { flex: "1" } }),
      el("button", { class: "btn-ghost",   style: { fontSize:"13px" }, onClick: showEmailModal }, "📧 Email Plan"),
    );

    app.appendChild(el("div", {},
      el("header", { class: "header" },
        el("div", { class: "header-inner" },
          el("button", { class: "admin-back-btn", onClick: () => renderAdminPage(deptCode, fromDisplay) }, fromDisplay ? "← Display Board" : "← Back"),
          el("div", { class: "plan-title" }, "Plan Tomorrow"),
          el("div", { class: "header-right" },
            el("div", { class: "sync-pip" }),
          ),
        )
      ),
      el("div", { class: "plan-root" },
        el("div", { class: "plan-header-row" },
          dateInput,
          fridayWarn,
          el("button", { class: "btn-ghost", style: { fontSize: "13px", marginLeft: "auto" }, onClick: importFromSchedule }, "📥 Import from Schedule"),
        ),
        bannerDiv,
        headerInput,
        el("div", { class: "plan-columns" }, leftCol, centerCol, rightCol),
        bottomBar,
      ),
    ));
  }

  // ─── Left column: Working Tomorrow ──────────────────────────────────────────
  function buildLeftColumn(col) {
    col.innerHTML = "";

    const section = el("div", { class: "plan-section" });

    const countBadge = el("span", { style: { fontSize:"12px", fontWeight:"700", color:"#7c6c62", background:"#f1ede8", borderRadius:"10px", padding:"1px 9px", minWidth:"18px", textAlign:"center" } }, "0");
    section.appendChild(
      el("div", { class: "plan-section-title", style: { display:"flex", alignItems:"center", gap:"8px" } },
        el("span", {}, "Working Tomorrow"), countBadge)
    );

    // Sort controls
    const sortRow = el("div", { style: { display:"flex", gap:"6px", marginBottom:"8px" } },
      el("button", { class: "btn-ghost", style: { fontSize:"11px", padding:"3px 12px" }, title: "Sort alphabetically", onClick: async () => {
        availableList = [...availableList].sort((a, b) => a.localeCompare(b));
        await saveAvailable();
        rebuildList();
      }}, "A–Z"),
      el("button", { class: "btn-ghost", style: { fontSize:"11px", padding:"3px 12px" }, title: "Move late-tagged providers to the bottom", onClick: async () => {
        const notLate = availableList.filter(n => !planLate[n]);
        const late    = availableList.filter(n => planLate[n]);
        availableList = [...notLate, ...late];
        await saveAvailable();
        rebuildList();
      }}, "Late ↓"),
    );
    section.appendChild(sortRow);

    const listContainer = el("div", {});
    let dragSrc = null;

    function rebuildList() {
      countBadge.textContent = String(availableList.length);
      listContainer.innerHTML = "";
      availableList.forEach((name, idx) => {
        const noteObj = planNotes[name] || null;
        const row = el("div", { class: "plan-provider-row" });
        row.setAttribute("draggable", "true");
        row.dataset.idx = idx;

        // Drag handle + name
        const dragHandle = el("span", { class: "drag-handle", style: { fontSize:"14px" } }, "⠿");
        const nameEl = el("span", { class: "plan-provider-name" }, name);

        // Note badge / add note
        let noteEl;
        let editingNote = false;

        function renderNote() {
          if (noteEl) noteEl.remove();
          const currentNoteObj = planNotes[name] || null;
          const currentLate    = !!planLate[name];
          if (editingNote) {
            let selectedColor = currentNoteObj ? currentNoteObj.color : "blue";
            const noteInput = el("input", { class: "plan-note-input", type:"text", placeholder:"Short note…", maxlength:"15" });
            noteInput.value = currentNoteObj ? currentNoteObj.text : "";
            const NOTE_COLORS = [
              { id:"blue",  cls:"dot-blue"  },
              { id:"amber", cls:"dot-amber" },
              { id:"green", cls:"dot-green" },
              { id:"rose",  cls:"dot-rose"  },
            ];
            const colorRow = el("div", { class: "plan-note-color-row" });
            NOTE_COLORS.forEach(c => {
              const dot = el("div", {
                class: "plan-note-color-dot " + c.cls + (selectedColor === c.id ? " selected" : ""),
                title: c.id,
              });
              dot.addEventListener("mousedown", e => {
                e.preventDefault();
                selectedColor = c.id;
                colorRow.querySelectorAll(".plan-note-color-dot").forEach(d => d.classList.remove("selected"));
                dot.classList.add("selected");
              });
              colorRow.appendChild(dot);
            });
            const lateCheck = el("input", { type: "checkbox" });
            lateCheck.checked = currentLate;
            const lateRow = el("div", { style: { display:"flex", alignItems:"center", gap:"5px", fontSize:"11px", fontWeight:"700", color:"#2d2420", cursor:"pointer" } },
              lateCheck, " Late (12-hr)"
            );
            lateRow.addEventListener("mousedown", e => e.preventDefault());
            const saveNote = async () => {
              const val = noteInput.value.trim().slice(0, 15);
              const obj = val ? { text: val, color: selectedColor } : null;
              await savePlanNote(name, obj);
              await savePlanLate(name, lateCheck.checked);
              editingNote = false;
              rebuildList();
            };
            noteInput.addEventListener("keydown", e => {
              if (e.key === "Enter") { e.preventDefault(); saveNote(); }
              if (e.key === "Escape") { editingNote = false; rebuildList(); }
            });
            noteInput.addEventListener("blur", () => setTimeout(() => { if (editingNote) saveNote(); }, 200));
            noteEl = el("div", { class: "plan-note-editor" }, noteInput, colorRow, lateRow);
            row.insertBefore(noteEl, dragHandle.nextSibling);
            setTimeout(() => noteInput.focus(), 20);
          } else {
            const badgeWrap = el("div", { style: { display:"flex", gap:"4px", alignItems:"center", flexShrink:"0" } });
            if (currentNoteObj) {
              badgeWrap.appendChild(el("span", { class: "plan-note-badge note-" + currentNoteObj.color, onClick: () => { editingNote = true; renderNote(); } }, currentNoteObj.text));
            } else {
              badgeWrap.appendChild(el("span", { class: "plan-note-add", onClick: () => { editingNote = true; renderNote(); } }, "+ note"));
            }
            if (currentLate) {
              badgeWrap.appendChild(el("span", { class: "plan-note-badge note-blue", onClick: () => { editingNote = true; renderNote(); } }, "Late"));
            }
            noteEl = badgeWrap;
            row.insertBefore(noteEl, removeBtn);
          }
        }

        const removeBtn = el("button", { class: "plan-remove-btn", title: "Remove", onClick: async () => {
          availableList = availableList.filter((_, i) => i !== idx);
          await saveAvailable();
          rebuildList();
          refreshCenterColumn();
        }}, "✕");

        row.appendChild(dragHandle);
        row.appendChild(nameEl);
        row.appendChild(removeBtn);

        // Drag-and-drop reorder
        row.addEventListener("dragstart", e => {
          dragSrc = idx;
          e.dataTransfer.setData("text/plain", "available:" + name);
          e.dataTransfer.effectAllowed = "move";
          setTimeout(() => row.classList.add("dragging"), 0);
        });
        row.addEventListener("dragend", () => {
          row.classList.remove("dragging");
          document.querySelectorAll(".plan-provider-row.drag-over").forEach(r => r.classList.remove("drag-over"));
        });
        row.addEventListener("dragover", e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
          row.classList.add("drag-over");
        });
        row.addEventListener("dragleave", e => {
          if (!row.contains(e.relatedTarget)) row.classList.remove("drag-over");
        });
        row.addEventListener("drop", async e => {
          e.preventDefault();
          row.classList.remove("drag-over");
          const data = e.dataTransfer.getData("text/plain");
          if (data.startsWith("available:") && dragSrc !== null && dragSrc !== idx) {
            const newList = [...availableList];
            const [moved] = newList.splice(dragSrc, 1);
            newList.splice(idx, 0, moved);
            availableList = newList;
            dragSrc = null;
            await saveAvailable();
            rebuildList();
          }
        });

        renderNote();
        listContainer.appendChild(row);
      });

      // Add input row
      const addWrap = buildAvailableAddInput();
      listContainer.appendChild(addWrap);
    }

    section.appendChild(listContainer);
    section.appendChild(
      el("button", {
        class: "btn-ghost",
        style: { fontSize:"12px", marginTop:"8px", width:"100%" },
        onClick: randomizeRemaining,
      }, "🎲 Randomize Remaining")
    );
    col.appendChild(section);

    // Also make left col a drop target (unassign provider from room by dropping here)
    section.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
    });
    section.addEventListener("drop", async e => {
      e.preventDefault();
      const data = e.dataTransfer.getData("text/plain");
      if (data.startsWith("room:")) {
        const loc = data.slice(5);
        const rid = roomId(loc);
        const current = planData[rid] || {};
        const wasProvider = current.provider || null;
        await savePlanRoom(loc, { ...current, provider: null, supervisor: null });
        // Add displaced provider back to Working Tomorrow if not a noBreak room
        const isNbRoom = loc.startsWith("nb_");
        if (!isNbRoom && wasProvider && !availableList.includes(wasProvider)) {
          availableList = [...availableList, wasProvider];
          await saveAvailable();
        }
        refreshCenterColumn();
        const leftCol = document.querySelector(".plan-col-left");
        if (leftCol) buildLeftColumn(leftCol);
      }
    });

    rebuildList();
  }

  function buildAvailableAddInput() {
    const wrap = el("div", { class: "plan-add-input-wrap" });
    const input = el("input", {
      class: "plan-add-input",
      type: "text",
      placeholder: "Add provider…",
      autocomplete: "off",
    });
    let dropdown = null;

    function closeDropdown() {
      if (dropdown) { dropdown.remove(); dropdown = null; }
    }

    function showDropdown(query) {
      closeDropdown();
      // Filter out already-in-available providers
      const alreadyIn = new Set(availableList);
      const filtered = roster.filter(e => !alreadyIn.has(e.name) && rosterMatches(e, query));
      if (!filtered.length && !query) return;
      dropdown = el("div", { class: "roster-dropdown" });
      filtered.slice(0, 12).forEach(entry => {
        const opt = el("button", { class: "roster-option", type: "button" }, entry.name);
        opt.addEventListener("mousedown", async ev => {
          ev.preventDefault();
          closeDropdown();
          availableList = [...availableList, entry.name];
          input.value = "";
          await saveAvailable();
          // rebuild left col
          const leftCol = document.querySelector(".plan-col-left");
          if (leftCol) buildLeftColumn(leftCol);
          refreshCenterColumn();
        });
        dropdown.appendChild(opt);
      });
      if (!filtered.length) {
        dropdown.appendChild(el("div", { style: { padding:"8px 12px", fontSize:"12px", color:"#a39688" } }, "No matches in roster."));
      }
      wrap.appendChild(dropdown);
    }

    let highlightedIdx = -1;
    input.addEventListener("focus", () => showDropdown(input.value));
    input.addEventListener("input", () => showDropdown(input.value));
    input.addEventListener("blur", () => setTimeout(() => { closeDropdown(); }, 150));
    input.addEventListener("keydown", async e => {
      const opts = dropdown ? Array.from(dropdown.querySelectorAll(".roster-option")) : [];
      if (e.key === "ArrowDown") {
        e.preventDefault();
        highlightedIdx = Math.min(highlightedIdx + 1, opts.length - 1);
        opts.forEach((o, i) => o.classList.toggle("highlighted", i === highlightedIdx));
        return;
      }
      if (e.key === "ArrowUp") {
        e.preventDefault();
        highlightedIdx = Math.max(highlightedIdx - 1, 0);
        opts.forEach((o, i) => o.classList.toggle("highlighted", i === highlightedIdx));
        return;
      }
      if (e.key === "Enter" || e.key === "Tab") {
        e.preventDefault();
        let selected = null;
        if (highlightedIdx >= 0 && opts[highlightedIdx]) {
          selected = opts[highlightedIdx].textContent.trim();
        } else if (input.value.trim()) {
          const alreadyIn = new Set(availableList);
          const matches = roster.filter(en => !alreadyIn.has(en.name) && rosterMatches(en, input.value.trim()));
          if (matches.length) selected = matches[0].name;
        }
        if (selected) {
          availableList = [...availableList, selected];
          input.value = "";
          closeDropdown();
          await saveAvailable();
          const leftCol = document.querySelector(".plan-col-left");
          if (leftCol) buildLeftColumn(leftCol);
          refreshCenterColumn();
          setTimeout(() => document.querySelector(".plan-col-left .plan-add-input")?.focus(), 0);
        }
      }
    });

    wrap.appendChild(input);
    return wrap;
  }

  // ─── Center column: Room assignments ────────────────────────────────────────
  function buildCenterColumn(col) {
    col.innerHTML = "";

    // No-break slots section
    if (noBreakSlots.length) {
      const nbSection = el("div", { class: "plan-section" });
      nbSection.appendChild(el("div", { class: "plan-section-title" }, "Core Positions"));
      noBreakSlots.forEach(slot => {
        nbSection.appendChild(buildPlanRoomCard("nb_" + slot, slot, true));
      });
      col.appendChild(nbSection);
    }

    // Main room sections
    const mainSection = el("div", { class: "plan-section" });
    const needCount = locations.filter(l => !isDivider(l)
      && !(planData[roomId(l)] || {}).provider
      && !(planData[roomId(l)] || {}).empty).length;
    const needBadge = el("span", {
      style: { fontSize:"12px", fontWeight:"700", color: needCount ? "#b45309" : "#16a34a", background: needCount ? "#fef3c7" : "#f0fdf4", borderRadius:"10px", padding:"1px 9px", minWidth:"18px", textAlign:"center" },
      title: "Rooms still needing a provider",
    }, String(needCount));
    mainSection.appendChild(
      el("div", { class: "plan-section-title", style: { display:"flex", alignItems:"center", gap:"8px" } },
        el("span", {}, "Room Assignments"), needBadge)
    );

    let currentDividerLabel = null;
    locations.forEach(loc => {
      if (isDivider(loc)) {
        // Extract divider name from key
        const divLabel = loc.replace(/^__divider__\d*$/, "").replace(/^__divider__/, "") || "Section";
        const labelEl = el("span", { class: "plan-section-divider-label" }, divLabel || "—");
        mainSection.appendChild(labelEl);
        currentDividerLabel = divLabel;
        return;
      }
      mainSection.appendChild(buildPlanRoomCard(loc, loc, false));
    });

    col.appendChild(mainSection);
  }

  function refreshCenterColumn() {
    const centerCol = document.querySelector(".plan-col-center");
    if (centerCol) buildCenterColumn(centerCol);
  }

  // Sync the Working Tomorrow list when a provider is assigned to a room:
  // remove the incoming name, return the displaced occupant (if any).
  async function syncAvailableForAssignment(incomingName, rid, isNoBreak) {
    if (isNoBreak) return;
    const displaced = (planData[rid] || {}).provider || null;
    let listChanged = false;
    if (availableList.includes(incomingName)) {
      availableList = availableList.filter(n => n !== incomingName);
      listChanged = true;
    }
    if (displaced && displaced !== incomingName && !availableList.includes(displaced)) {
      availableList = [...availableList, displaced];
      listChanged = true;
    }
    if (listChanged) {
      await saveAvailable();
      const leftCol = document.querySelector(".plan-col-left");
      if (leftCol) buildLeftColumn(leftCol);
    }
  }

  function buildPlanRoomCard(locKey, displayLabel, isNoBreak) {
    const rid = roomId(locKey);
    const roomDat = planData[rid] || {};
    const provider = roomDat.provider || null;
    const supervisor = roomDat.supervisor || null;
    const isEmpty = !!roomDat.empty;

    // Fetch room assignment history once per card DOM lifetime (tracked rooms only)
    const isTracked = !isNoBreak && trackedRooms.includes(locKey);
    let roomHistory = null;
    let onRoomHistoryLoaded = null; // set by buildPlanProviderInput while the input is open
    if (isTracked) {
      get(ref(db, `deptAdmin/${deptCode}/roomHistory/${rid}`)).then(snap => {
        roomHistory = snap.val() || {};
        delete roomHistory["_done_"];
        if (onRoomHistoryLoaded) onRoomHistoryLoaded();
      });
    }

    const card = el("div", {
      class: "plan-room-card" + (isEmpty ? " plan-empty-room" : ""),
      "data-loc-key": locKey,
    });

    // Make card a drop target
    card.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      card.classList.add("drag-over");
    });
    card.addEventListener("dragleave", e => {
      if (!card.contains(e.relatedTarget)) card.classList.remove("drag-over");
    });
    card.addEventListener("drop", async e => {
      e.preventDefault();
      card.classList.remove("drag-over");
      const data = e.dataTransfer.getData("text/plain");
      if (data.startsWith("available:")) {
        const name = data.slice(10);
        const current = planData[rid] || {};
        await syncAvailableForAssignment(name, rid, isNoBreak);
        await savePlanRoom(locKey, { ...current, provider: name, supervisor: null, empty: false });
        refreshCenterColumn();
      } else if (data.startsWith("room:")) {
        const srcLoc = data.slice(5);
        const srcRid = roomId(srcLoc);
        const srcDat = planData[srcRid] || {};
        const srcProvider = srcDat.provider || null;
        if (!srcProvider || srcLoc === locKey) return;
        // Check if target has a provider (swap)
        const targetProvider = provider;
        if (targetProvider) {
          // Swap
          const srcCurrent = { ...srcDat };
          const targetCurrent = { ...planData[rid] || {} };
          await savePlanRoom(locKey, { ...targetCurrent, provider: srcProvider, supervisor: srcDat.supervisor || null });
          await savePlanRoom(srcLoc, { ...srcCurrent, provider: targetProvider, supervisor: targetCurrent.supervisor || null });
        } else {
          // Move
          await savePlanRoom(locKey, { ...planData[rid] || {}, provider: srcProvider, supervisor: srcDat.supervisor || null, empty: false });
          await savePlanRoom(srcLoc, { ...srcDat, provider: null, supervisor: null });
        }
        refreshCenterColumn();
      }
    });

    // Make card draggable if it has a provider
    if (provider) {
      card.setAttribute("draggable", "true");
      card.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/plain", "room:" + locKey);
        e.dataTransfer.effectAllowed = "move";
        setTimeout(() => card.classList.add("dragging"), 0);
      });
      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
        document.querySelectorAll(".plan-room-card.drag-over").forEach(c => c.classList.remove("drag-over"));
      });
    }

    const row = el("div", { class: "plan-room-row" });

    // Room label
    row.appendChild(el("span", { class: "plan-room-label" }, displayLabel));

    // Provider area
    let editingProvider = false;
    let editingSupervisor = false;
    let editingRoomNote = false;
    const providerArea = el("div", { style: { flex:"1", minWidth:"0", display:"flex", flexDirection:"column" } });

    function renderProviderArea() {
      providerArea.innerHTML = "";
      if (editingProvider) {
        providerArea.appendChild(buildPlanProviderInput());
      } else if (editingRoomNote && provider) {
        // ── Inline note editor for assigned provider ──
        const NOTE_COLORS = [
          { id:"blue",  cls:"dot-blue"  },
          { id:"amber", cls:"dot-amber" },
          { id:"green", cls:"dot-green" },
          { id:"rose",  cls:"dot-rose"  },
        ];
        const currentNote = planNotes[provider] || null;
        let selectedColor = currentNote ? currentNote.color : "blue";
        const noteInput = el("input", { class: "plan-note-input", type:"text", placeholder:"Short note…", maxlength:"15" });
        noteInput.value = currentNote ? currentNote.text : "";
        const colorRow = el("div", { class: "plan-note-color-row" });
        NOTE_COLORS.forEach(c => {
          const dot = el("div", { class: "plan-note-color-dot " + c.cls + (selectedColor === c.id ? " selected" : ""), title: c.id });
          dot.addEventListener("mousedown", e => {
            e.preventDefault();
            selectedColor = c.id;
            colorRow.querySelectorAll(".plan-note-color-dot").forEach(d => d.classList.remove("selected"));
            dot.classList.add("selected");
          });
          colorRow.appendChild(dot);
        });
        const lateCheck = el("input", { type: "checkbox" });
        lateCheck.checked = !!planLate[provider];
        const lateRow = el("div", { style: { display:"flex", alignItems:"center", gap:"5px", fontSize:"11px", fontWeight:"700", color:"#2d2420", cursor:"pointer" } },
          lateCheck, " Late (12-hr)"
        );
        lateRow.addEventListener("mousedown", e => e.preventDefault());
        const saveRoomNote = async () => {
          const val = noteInput.value.trim().slice(0, 15);
          const obj = val ? { text: val, color: selectedColor } : null;
          await savePlanNote(provider, obj);
          await savePlanLate(provider, lateCheck.checked);
          editingRoomNote = false;
          renderProviderArea();
        };
        noteInput.addEventListener("keydown", e => {
          if (e.key === "Enter") { e.preventDefault(); saveRoomNote(); }
          if (e.key === "Escape") { editingRoomNote = false; renderProviderArea(); }
        });
        noteInput.addEventListener("blur", () => setTimeout(() => { if (editingRoomNote) saveRoomNote(); }, 200));
        providerArea.appendChild(el("div", { class: "plan-note-editor" }, noteInput, colorRow, lateRow));
        setTimeout(() => noteInput.focus(), 20);
      } else {
        const nameRow = el("div", { style: { display:"flex", alignItems:"center", gap:"6px", minWidth:"0" } });
        const btn = el("button", {
          class: "plan-room-provider-btn" + (!provider ? " empty" : ""),
          onClick: () => { editingProvider = true; renderProviderArea(); }
        }, provider || "Assign provider…");
        nameRow.appendChild(btn);
        if (provider) {
          const noteObj = planNotes[provider] || null;
          const isLate  = !!planLate[provider];
          if (noteObj) {
            nameRow.appendChild(el("span", { class: "plan-note-badge note-" + noteObj.color, onClick: () => { editingRoomNote = true; renderProviderArea(); } }, noteObj.text));
          } else {
            nameRow.appendChild(el("span", { class: "plan-note-add", onClick: () => { editingRoomNote = true; renderProviderArea(); } }, "+ note"));
          }
          if (isLate) {
            nameRow.appendChild(el("span", { class: "plan-note-badge note-blue", onClick: () => { editingRoomNote = true; renderProviderArea(); } }, "Late"));
          }
        }
        providerArea.appendChild(nameRow);

        // Attending row if needed
        const needsSuper = provider && normalizeRosterEntry(roster.find(e => e.name === provider) || provider).role !== "attending";
        if (needsSuper) {
          if (editingSupervisor) {
            providerArea.appendChild(buildPlanAttendingInput());
          } else {
            const supRow = el("div", { class: "plan-attending-row" },
              el("span", { class: "plan-attending-label" }, "Attending"),
              el("button", {
                class: "plan-attending-btn" + (!supervisor ? " empty" : ""),
                onClick: () => { editingSupervisor = true; renderProviderArea(); }
              }, supervisor || "assign attending…")
            );
            providerArea.appendChild(supRow);
          }
        }
      }
    }

    function buildPlanProviderInput() {
      const inputWrap = el("div", { class: "plan-room-input-wrap" });
      const input = el("input", {
        class: "plan-room-input",
        type: "text",
        placeholder: "Search roster…",
        autocomplete: "off",
      });
      let dropdown = null;
      let hiIdx = -1;
      // Register callback so the hoisted fetch can refresh the dropdown when history arrives
      onRoomHistoryLoaded = () => { if (dropdown) showDropdown(input.value); };

      function getLastAssigned(name) {
        if (!roomHistory) return null;
        const dates = Object.entries(roomHistory)
          .filter(([, n]) => n === name)
          .map(([k]) => k);
        if (!dates.length) return null;
        return dates.reduce((best, k) => parseDateKey(k) > parseDateKey(best) ? k : best);
      }

      function closeDropdown() { if (dropdown) { dropdown.remove(); dropdown = null; } }

      function showDropdown(query) {
        closeDropdown();
        // Filter to available providers, unassigned elsewhere (or this room's current provider)
        // Core positions (isNoBreak) always use the full roster — providers don't have to be "working tomorrow"
        const assigned = getAssignedProviders();
        assigned.delete(provider || ""); // allow reassigning same room
        const pool = (availableList.length > 0 && !isNoBreak)
          ? roster.filter(e => availableList.includes(e.name) && !assigned.has(e.name))
          : roster.filter(e => !assigned.has(e.name));
        let filtered = query ? pool.filter(e => rosterMatches(e, query)) : pool;

        // For tracked rooms with history loaded, sort oldest-first (never assigned = top)
        if (isTracked && roomHistory) {
          filtered = [...filtered].sort((a, b) => {
            const da = getLastAssigned(a.name);
            const db_ = getLastAssigned(b.name);
            if (!da && !db_) return 0;
            if (!da) return -1;
            if (!db_) return 1;
            return parseDateKey(da) - parseDateKey(db_);
          });
        }

        dropdown = el("div", { class: "roster-dropdown" });
        if (isTracked && !roomHistory) {
          dropdown.appendChild(el("div", { style:{ padding:"8px 12px", fontSize:"12px", color:"#a39688" } }, "Loading history…"));
        }

        if (provider) {
          const clearOpt = el("button", { class: "roster-option clear-opt", type: "button" }, "✕ Remove provider");
          clearOpt.addEventListener("mousedown", async ev => {
            ev.preventDefault();
            closeDropdown();
            editingProvider = false;
            const removedName = provider;
            await savePlanRoom(locKey, { ...(planData[rid] || {}), provider: null, supervisor: null });
            if (!isNoBreak && removedName && !availableList.includes(removedName)) {
              availableList = [...availableList, removedName];
              await saveAvailable();
              const leftCol = document.querySelector(".plan-col-left");
              if (leftCol) buildLeftColumn(leftCol);
            }
            refreshCenterColumn();
          });
          dropdown.appendChild(clearOpt);
        }

        filtered.slice(0, 16).forEach(entry => {
          const lastDate = (isTracked && roomHistory) ? getLastAssigned(entry.name) : null;
          const label = lastDate ? entry.name + " — " + formatHistDate(lastDate) : entry.name;
          const opt = el("button", { class: "roster-option", type: "button", "data-name": entry.name }, label);
          opt.addEventListener("mousedown", async ev => {
            ev.preventDefault();
            closeDropdown();
            editingProvider = false;
            await syncAvailableForAssignment(entry.name, rid, isNoBreak);
            const current = planData[rid] || {};
            await savePlanRoom(locKey, { ...current, provider: entry.name, supervisor: null, empty: false });
            refreshCenterColumn();
          });
          dropdown.appendChild(opt);
        });

        if (!filtered.length) {
          const msg = (availableList.length > 0 && !isNoBreak)
            ? "No available providers match. Add providers to the Working list first."
            : "No matches in roster.";
          dropdown.appendChild(el("div", { style:{ padding:"8px 12px", fontSize:"12px", color:"#a39688" } }, msg));
        }
        inputWrap.appendChild(dropdown);
      }

      input.addEventListener("focus", () => showDropdown(input.value));
      input.addEventListener("input", () => showDropdown(input.value));
      input.addEventListener("blur", () => setTimeout(() => {
        closeDropdown();
        editingProvider = false;
        renderProviderArea();
      }, 150));
      input.addEventListener("keydown", async e => {
        const opts = dropdown ? Array.from(dropdown.querySelectorAll(".roster-option:not(.clear-opt)")) : [];
        if (e.key === "Escape") { closeDropdown(); editingProvider = false; renderProviderArea(); return; }
        if (e.key === "ArrowDown") { e.preventDefault(); hiIdx = Math.min(hiIdx+1,opts.length-1); opts.forEach((o,i)=>o.classList.toggle("highlighted",i===hiIdx)); return; }
        if (e.key === "ArrowUp")   { e.preventDefault(); hiIdx = Math.max(hiIdx-1,0); opts.forEach((o,i)=>o.classList.toggle("highlighted",i===hiIdx)); return; }
        if (e.key === "Enter" || e.key === "Tab") {
          e.preventDefault();
          const isTab = e.key === "Tab";
          let selected = null;
          if (hiIdx >= 0 && opts[hiIdx]) selected = opts[hiIdx].dataset.name || opts[hiIdx].textContent.trim();
          else if (input.value.trim()) {
            const assigned = getAssignedProviders(); assigned.delete(provider || "");
            const pool = (availableList.length > 0 && !isNoBreak)
              ? roster.filter(en => availableList.includes(en.name) && !assigned.has(en.name))
              : roster.filter(en => !assigned.has(en.name));
            const m = pool.filter(en => rosterMatches(en, input.value.trim()));
            if (m.length) selected = m[0].name;
          }
          if (selected) {
            closeDropdown();
            editingProvider = false;
            await syncAvailableForAssignment(selected, rid, isNoBreak);
            const current = planData[rid] || {};
            await savePlanRoom(locKey, { ...current, provider: selected, supervisor: null, empty: false });
            refreshCenterColumn();
            // Tab: advance focus to the next room card
            if (isTab) {
              const allCards = Array.from(document.querySelectorAll(".plan-room-card[data-loc-key]"));
              const idx = allCards.findIndex(c => c.dataset.locKey === locKey);
              if (idx >= 0 && idx + 1 < allCards.length) {
                const nextBtn = allCards[idx + 1].querySelector(".plan-room-provider-btn");
                if (nextBtn) setTimeout(() => nextBtn.click(), 60);
              }
            }
          } else {
            closeDropdown(); editingProvider = false; renderProviderArea();
          }
        }
      });
      inputWrap.appendChild(input);
      setTimeout(() => { input.focus(); showDropdown(""); }, 30);
      return inputWrap;
    }

    function buildPlanAttendingInput() {
      const inputWrap = el("div", { class: "plan-attending-row" });
      inputWrap.appendChild(el("span", { class: "plan-attending-label" }, "Attending"));
      const innerWrap = el("div", { style: { position:"relative", flex:"1" } });
      const input = el("input", {
        class: "plan-room-input",
        type: "text",
        placeholder: "Search attendings…",
        autocomplete: "off",
        style: { fontSize:"12px", padding:"3px 8px" },
      });
      let dropdown = null;
      let hiIdx = -1;

      const attendings = roster.filter(e => e.role === "attending");
      const planAttendingPool = availableList.length > 0
        ? attendings.filter(e => availableList.includes(e.name))
        : attendings;

      function closeDropdown() { if (dropdown) { dropdown.remove(); dropdown = null; } }
      function showDropdown(query) {
        closeDropdown();
        const filtered = query ? planAttendingPool.filter(e => rosterMatches(e, query)) : planAttendingPool;
        dropdown = el("div", { class: "roster-dropdown" });
        if (supervisor) {
          const clearOpt = el("button", { class: "roster-option clear-opt", type:"button" }, "✕ Remove attending");
          clearOpt.addEventListener("mousedown", async ev => {
            ev.preventDefault(); closeDropdown();
            editingSupervisor = false;
            await savePlanRoom(locKey, { ...(planData[rid]||{}), supervisor: null });
            renderProviderArea();
          });
          dropdown.appendChild(clearOpt);
        }
        filtered.slice(0,12).forEach(entry => {
          const opt = el("button", { class:"roster-option", type:"button" }, entry.name);
          opt.addEventListener("mousedown", async ev => {
            ev.preventDefault(); closeDropdown();
            editingSupervisor = false;
            await savePlanRoom(locKey, { ...(planData[rid]||{}), supervisor: entry.name });
            renderProviderArea();
          });
          dropdown.appendChild(opt);
        });
        if (!filtered.length) dropdown.appendChild(el("div", { style:{ padding:"8px 12px", fontSize:"12px", color:"#a39688" } }, "No attending matches."));
        innerWrap.appendChild(dropdown);
      }

      input.addEventListener("focus", () => showDropdown(input.value));
      input.addEventListener("input", () => showDropdown(input.value));
      input.addEventListener("blur", () => setTimeout(() => { closeDropdown(); editingSupervisor = false; renderProviderArea(); }, 150));
      input.addEventListener("keydown", async e => {
        const opts = dropdown ? Array.from(dropdown.querySelectorAll(".roster-option:not(.clear-opt)")) : [];
        if (e.key === "Escape") { closeDropdown(); editingSupervisor = false; renderProviderArea(); return; }
        if (e.key === "ArrowDown") { e.preventDefault(); hiIdx=Math.min(hiIdx+1,opts.length-1); opts.forEach((o,i)=>o.classList.toggle("highlighted",i===hiIdx)); return; }
        if (e.key === "ArrowUp")   { e.preventDefault(); hiIdx=Math.max(hiIdx-1,0); opts.forEach((o,i)=>o.classList.toggle("highlighted",i===hiIdx)); return; }
        if (e.key === "Enter" || e.key === "Tab") {
          e.preventDefault();
          let selected = null;
          if (hiIdx>=0&&opts[hiIdx]) selected=opts[hiIdx].textContent.trim();
          else if (input.value.trim()) {
            const m = planAttendingPool.filter(en => rosterMatches(en, input.value.trim()));
            if (m.length) selected=m[0].name;
          }
          if (selected) {
            closeDropdown(); editingSupervisor=false;
            await savePlanRoom(locKey, { ...(planData[rid]||{}), supervisor: selected });
            renderProviderArea();
          } else {
            closeDropdown(); editingSupervisor=false; renderProviderArea();
          }
        }
      });
      innerWrap.appendChild(input);
      setTimeout(() => { input.focus(); showDropdown(""); }, 30);
      inputWrap.appendChild(innerWrap);
      return inputWrap;
    }

    renderProviderArea();
    row.appendChild(providerArea);

    // Empty checkbox
    if (!isNoBreak) {
      const emptyWrap = el("div", { style: { display:"flex", alignItems:"center", gap:"3px", flexShrink:"0" } });
      const cb = el("input", { class: "plan-empty-cb", type: "checkbox" });
      cb.checked = isEmpty;
      cb.addEventListener("change", async () => {
        const current = planData[rid] || {};
        await savePlanRoom(locKey, { ...current, empty: cb.checked, provider: cb.checked ? null : current.provider, supervisor: cb.checked ? null : current.supervisor });
        refreshCenterColumn();
      });
      emptyWrap.appendChild(el("label", { class: "plan-empty-label" }, "Empty"));
      emptyWrap.appendChild(cb);
      row.appendChild(emptyWrap);
    }

    card.appendChild(row);
    return card;
  }

  function buildPlanCallRow(position, posIdx, isPostCall) {
    const row = el("div", { class: "plan-call-row" });
    row.appendChild(el("span", { class: "plan-call-label" }, position));

    const cellWrap = el("div", { style: { flex:"1", minWidth:"0", position:"relative" } });
    let editing = false;
    let dropdown = null;

    const getData = () => isPostCall ? planPostCallData : planCallData;
    const saveData = isPostCall ? savePlanPostCallAssignment : savePlanCallAssignment;

    function closeDropdown() { if (dropdown) { dropdown.remove(); dropdown = null; } }

    function renderCell() {
      closeDropdown();
      cellWrap.innerHTML = "";
      editing = false;
      const liveProvider = getData()[posIdx] || null;

      const btn = el("button", {
        class: "plan-call-btn" + (!liveProvider ? " empty" : ""),
      }, liveProvider || "—");

      btn.addEventListener("mousedown", e => {
        e.preventDefault();
        editing = true;
        cellWrap.innerHTML = "";
        const inputEl = el("input", {
          class: "plan-room-input",
          type: "text",
          placeholder: "Search…",
          autocomplete: "off",
          style: { fontSize:"12px", padding:"3px 8px", width:"100%" },
        });
        let hiIdx = -1;

        const pool = roster;

        function showDd(query) {
          closeDropdown();
          const matches = query ? pool.filter(en => rosterMatches(en, query)) : pool;
          const dd = el("div", { class: "roster-dropdown", style: { zIndex:"9999" } });
          if (liveProvider) {
            const clearOpt = el("button", { class:"roster-option clear-opt", type:"button" }, "✕ Remove");
            clearOpt.addEventListener("mousedown", async ev => {
              ev.preventDefault(); closeDropdown();
              await saveData(posIdx, null);
              renderCell();
            });
            dd.appendChild(clearOpt);
          }
          matches.slice(0,12).forEach(en => {
            const opt = el("button", { class:"roster-option", type:"button" }, en.name);
            opt.addEventListener("mousedown", async ev => {
              ev.preventDefault(); closeDropdown();
              await saveData(posIdx, en.name);
              renderCell();
            });
            dd.appendChild(opt);
          });
          if (!matches.length && !liveProvider) dd.appendChild(el("div", { style:{ padding:"8px 12px", fontSize:"12px", color:"#a39688" } }, "No matches."));
          document.body.appendChild(dd);
          dropdown = dd;
          requestAnimationFrame(() => {
            const r = inputEl.getBoundingClientRect();
            dd.style.position = "fixed";
            dd.style.top  = (r.bottom + 2) + "px";
            dd.style.left = r.left + "px";
            dd.style.width = r.width + "px";
          });
        }

        inputEl.addEventListener("focus", () => showDd(inputEl.value));
        inputEl.addEventListener("input", () => showDd(inputEl.value));
        inputEl.addEventListener("blur", () => setTimeout(() => { closeDropdown(); renderCell(); }, 150));
        inputEl.addEventListener("keydown", async e => {
          const opts = dropdown ? Array.from(dropdown.querySelectorAll(".roster-option:not(.clear-opt)")) : [];
          if (e.key === "Escape") { closeDropdown(); renderCell(); return; }
          if (e.key === "ArrowDown") { e.preventDefault(); hiIdx=Math.min(hiIdx+1,opts.length-1); opts.forEach((o,i)=>o.classList.toggle("highlighted",i===hiIdx)); return; }
          if (e.key === "ArrowUp")   { e.preventDefault(); hiIdx=Math.max(hiIdx-1,0); opts.forEach((o,i)=>o.classList.toggle("highlighted",i===hiIdx)); return; }
          if (e.key === "Enter" || e.key === "Tab") {
            e.preventDefault();
            let selected = null;
            if (hiIdx>=0&&opts[hiIdx]) selected=opts[hiIdx].textContent.trim();
            else if (inputEl.value.trim()) {
              const m = pool.filter(en => rosterMatches(en, inputEl.value.trim()));
              if (m.length) selected = m[0].name;
            }
            if (selected) { await saveData(posIdx, selected); }
            closeDropdown();
            renderCell();
            // Advance to the next call position in this section
            const section = row.closest(".plan-section");
            if (section) {
              const allRows = Array.from(section.querySelectorAll(".plan-call-row"));
              const nextRow = allRows[allRows.indexOf(row) + 1];
              if (nextRow) {
                const nextBtn = nextRow.querySelector(".plan-call-btn");
                if (nextBtn) setTimeout(() => nextBtn.dispatchEvent(new MouseEvent("mousedown", { bubbles: true, cancelable: true })), 30);
              }
            }
          }
        });
        cellWrap.appendChild(inputEl);
        setTimeout(() => inputEl.focus(), 20);
      });

      cellWrap.appendChild(btn);
    }

    renderCell();
    row.appendChild(cellWrap);
    return row;
  }
