// Dept accounts: <CODE>@gasbreaker.app  password = the code
// Admin account: admin@gasbreaker.app  password = admin passcode
function deptEmail(code) { return code.toLowerCase() + "@gasbreaker.app"; }
const ADMIN_EMAIL = "admin@gasbreaker.app";

async function signInAs(email, password) {
  const cred = await signInWithEmailAndPassword(auth, email, password);
  return cred.user;
}

// ─── Render: Code screen ─────────────────────────────────────────────────────
function renderCodeScreen(errorMsg = "") {
  const input = el("input", { class: "text-input code-input", placeholder: "Enter code", type: "text", autocomplete: "off" });
  const btn   = el("button", { class: "btn-primary mt" }, "Enter →");
  let busy = false;

  async function tryCode() {
    if (busy) return;
    const code = input.value.trim().toUpperCase();
    if (!code) return;
    busy = true;
    btn.textContent = "Checking…"; btn.disabled = true;

    try {
      // Always try admin first (same password, different email), then dept
      let user, isAdmin = false;
      try {
        user = await signInAs(ADMIN_EMAIL, code);
        isAdmin = true;
      } catch { /* not admin — try as dept */ }

      if (!user) {
        user = await signInAs(deptEmail(code), code);
      }

      if (isAdmin) {
        window._adminPass = code; // store for re-auth after dept account operations
        session = { isAdmin: true };
        subscribeToDepartments(() => renderAdminDeptSelect());
      } else {
        // Dept login — load departments to get name
        await new Promise(resolve => {
          if (Object.keys(departments).length) { resolve(); return; }
          subscribeToDepartments(resolve);
        });
        const deptName = departments[code];
        if (!deptName) throw new Error("Dept not found");
        session = { deptCode: code, deptName };
        await loadConfig(code);
        const explicitDisplay = window._postLoginDisplay || new URLSearchParams(window.location.search).has("display");
        if (explicitDisplay || !isMobile) isDisplayMode = true;
        subscribeToBoard(code);
      }
    } catch (err) {
      console.error("Login error:", err.code, err.message);
      const authFail = ["auth/invalid-credential","auth/user-not-found","auth/wrong-password","auth/invalid-email"].includes(err.code);
      const msg = authFail
        ? "Incorrect code. Check the department board."
        : `Error: ${err.code || err.message}`;
      btn.textContent = "Enter →"; btn.disabled = false;
      busy = false;
      renderCodeScreen(msg);
    }
  }

  input.addEventListener("keydown", e => { if (e.key === "Enter") tryCode(); });
  btn.addEventListener("click", tryCode);

  document.getElementById("app").innerHTML = "";
  document.getElementById("app").appendChild(
    el("div", { class: "auth-root" },
      el("div", { class: "auth-card" },
        el("div", { style: { fontSize: "48px", marginBottom: "8px" } }, "💨"),
        el("div", { class: "auth-title" }, "Gas Breaker"),
        el("div", { class: "auth-sub"   }, "Anesthesia Break Coordination"),
        el("div", { class: "auth-divider" }),
        el("label", { class: "field-label" }, "Department Code"),
        input,
        errorMsg ? el("div", { class: "error-msg" }, errorMsg) : null,
        btn,
      )
    )
  );
  input.focus();
}

async function loadConfig(code) {
  return new Promise(resolve => {
    let done = false;
    const unsub = onValue(configRef(code), snap => {
      const cfg = snap.val() || {};
      locations     = cfg.locations     ? Object.values(cfg.locations)     : [...DEFAULT_LOCATIONS];
      noBreakSlots  = cfg.noBreakSlots  ? Object.values(cfg.noBreakSlots)  : [];
      callPositions  = cfg.callPositions  ? Object.values(cfg.callPositions).map(normalizeCallPosition)  : [];
      roster         = cfg.roster         ? Object.values(cfg.roster).map(normalizeRosterEntry).sort((a,b) => a.name.localeCompare(b.name)) : [];
      if (!done) { done = true; unsub(); resolve(); }
    });
    setTimeout(() => { if (!done) { done = true; unsub(); resolve(); } }, 5000);
  });
}

function adminSection(storageKey, title, sub, ...body) {
  const lsKey  = "gas-breaker-admin-open-" + storageKey;
  let isOpen   = storageKey === "plan-tomorrow" ? localStorage.getItem(lsKey) !== "0" : localStorage.getItem(lsKey) === "1";

  const chevron = el("span", { class: "admin-section-chevron" });
  chevron.style.transform = isOpen ? "" : "rotate(-90deg)";
  chevron.textContent = "▾";

  const bodyDiv = el("div", { class: "admin-section-body" });
  if (sub) bodyDiv.appendChild(el("div", { class: "admin-section-sub" }, sub));
  body.forEach(b => { if (b) bodyDiv.appendChild(b); });
  bodyDiv.style.display = isOpen ? "" : "none";

  const titleEl = el("div", { class: "admin-section-title" }, title, chevron);

// ─── Tracked-room history viewer/editor (admin) ──────────────────────────────
// Shows the per-day assignment history for a tracked room and lets you add/edit/
// remove entries. Adding an entry keeps that provider out of the room in the Plan
// Tomorrow rotation sort (e.g. a second person who covered the room that day).
function openRoomHistoryModal(deptCode, loc) {
  const rid     = roomId(loc);
  const histRef = ref(db, `deptAdmin/${deptCode}/roomHistory/${rid}`);

  // <input type="date"> gives "YYYY-MM-DD"; roomHistory keys use tsDay()'s "Y-M-D".
  function dateInputToKey(v) {
    if (!v) return null;
    const [y, m, d] = v.split("-").map(Number);
    if (!y || !m || !d) return null;
    return `${y}-${m}-${d}`;
  }

  const overlay = el("div", { class: "sched-modal-overlay" });
  const box     = el("div", { class: "sched-modal-box" });
  overlay.appendChild(box);
  function close() { overlay.remove(); }
  overlay.addEventListener("click", e => { if (e.target === overlay) close(); });

  async function rebuild() {
    box.innerHTML = "";
    box.appendChild(el("div", { class: "sched-modal-title" }, "Room History — " + loc));
    box.appendChild(el("div", { class: "sched-modal-sub" }, "Days this room was assigned. The Plan Tomorrow picker sorts these providers to the bottom for a while. Add an entry to keep someone out of this room (e.g. a second person who covered it)."));

    const snap = await get(histRef);
    const data = snap.val() || {};
    delete data["_done_"];
    const entries = Object.entries(data)
      .filter(([, v]) => v && typeof v === "string")
      .sort((a, b) => parseDateKey(b[0]) - parseDateKey(a[0]));

    const listWrap = el("div", { style: { maxHeight:"320px", overflowY:"auto", margin:"12px 0", border:"1px solid #f1ede8", borderRadius:"8px" } });
    if (!entries.length) {
      listWrap.appendChild(el("div", { style: { padding:"12px", fontSize:"13px", color:"#a39688", fontStyle:"italic" } }, "No history yet."));
    } else {
      entries.forEach(([key, name]) => {
        const rowWrap  = el("div", { style: { display:"flex", alignItems:"center", gap:"8px", padding:"7px 10px", borderBottom:"1px solid #f1ede8" } });
        const dateSpan = el("span", { style: { fontSize:"12px", color:"#7c6c62", minWidth:"66px", flexShrink:"0" } }, formatHistDate(key));
        const nameSpan = el("span", { style: { flex:"1", fontSize:"13px", fontWeight:"600", color:"#2d2420" } }, name);
        let editing = false, inp = null;
        const editBtn   = el("button", { class: "btn-ghost",  style: { fontSize:"11px", padding:"2px 8px" } }, "Edit");
        const removeBtn = el("button", { class: "btn-danger", style: { fontSize:"11px", padding:"2px 8px" }, onClick: async () => {
          await remove(ref(db, `deptAdmin/${deptCode}/roomHistory/${rid}/${key}`));
          rebuild();
        }}, "Remove");
        editBtn.addEventListener("click", async () => {
          if (editing) {
            const val = inp.value.trim();
            if (val) await set(ref(db, `deptAdmin/${deptCode}/roomHistory/${rid}/${key}`), val);
            rebuild();
            return;
          }
          editing = true;
          inp = el("input", { class: "admin-add-input", type: "text", value: name, style: { flex:"1", fontSize:"13px", padding:"4px 8px" } });
          nameSpan.replaceWith(inp);
          inp.focus(); inp.select();
          editBtn.textContent = "Save";
          inp.addEventListener("keydown", e => { if (e.key === "Enter") editBtn.click(); });
        });
        rowWrap.appendChild(dateSpan);
        rowWrap.appendChild(nameSpan);
        rowWrap.appendChild(editBtn);
        rowWrap.appendChild(removeBtn);
        listWrap.appendChild(rowWrap);
      });
    }
    box.appendChild(listWrap);

    // Add-entry row — default to today (the day someone actually covered the room)
    const t = new Date();
    const todayStr = `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, "0")}-${String(t.getDate()).padStart(2, "0")}`;
    const dateIn  = el("input", { type: "date", class: "admin-add-input", value: todayStr, style: { fontSize:"13px", padding:"4px 8px" } });
    const datalist = el("datalist", { id: "roomhist-roster" });
    roster.forEach(r => datalist.appendChild(el("option", { value: r.name })));
    const nameIn  = el("input", { type: "text", class: "admin-add-input", placeholder: "Provider name…", list: "roomhist-roster", style: { flex:"1", fontSize:"13px", padding:"4px 8px" } });
    const addBtn  = el("button", { class: "btn-primary", style: { fontSize:"12px", padding:"5px 12px" }, onClick: async () => {
      const name = nameIn.value.trim();
      let key    = dateInputToKey(dateIn.value);
      if (!name || !key) { showToast("Pick a date and enter a name."); return; }
      // Don't overwrite a different name already on that day — suffix with -N. parseDateKey
      // and formatHistDate ignore the extra part, so it still reads as the same date.
      const existing = (await get(histRef)).val() || {};
      if (existing[key] !== undefined && existing[key] !== name) {
        let n = 2;
        while (existing[`${key}-${n}`] !== undefined) n++;
        key = `${key}-${n}`;
      }
      await set(ref(db, `deptAdmin/${deptCode}/roomHistory/${rid}/${key}`), name);
      nameIn.value = "";
      rebuild();
    }}, "Add");
    box.appendChild(el("div", { style: { display:"flex", gap:"8px", alignItems:"center", flexWrap:"wrap", marginBottom:"14px" } }, dateIn, nameIn, addBtn, datalist));

    box.appendChild(el("div", { style: { display:"flex", justifyContent:"flex-end" } },
      el("button", { class: "btn-ghost", style: { fontSize:"13px" }, onClick: close }, "Close")));
  }

  document.body.appendChild(overlay);
  rebuild();
}

// ─── Admin page ───────────────────────────────────────────────────────────────
function renderAdminPage(deptCode, fromDisplay = false) {
  const isDept = !!deptCode;
  document.body.classList.remove("display-mode"); // allow normal scroll in admin
  const app = document.getElementById("app");
  app.innerHTML = "";

  // ── Drag list builder ──
  function buildDraggableList(items, onReorder, renderItem) {
    const list = el("div", { class: "admin-list" });
    let dragSrc = null;

    function rebuild(arr) {
      list.innerHTML = "";
      if (!arr.length) {
        // empty state — no items to show, leave blank (parent handles empty msg)
        return;
      }
      arr.forEach((item, i) => {
        const row = el("div", { class: "admin-list-item" });
        row.setAttribute("draggable", "true");
        const handle = el("span", { class: "drag-handle" }, "⠿");
        row.appendChild(handle);
        const content = renderItem(item, arr, (a) => rebuild(a ?? arr));
        row.appendChild(content);
        row.addEventListener("dragstart", e => { dragSrc = i; setTimeout(() => row.classList.add("dragging"), 0); e.dataTransfer.effectAllowed = "move"; });
        row.addEventListener("dragend",   () => row.classList.remove("dragging"));
        row.addEventListener("dragover",  e => { e.preventDefault(); row.classList.add("drag-over"); });
        row.addEventListener("dragleave", () => row.classList.remove("drag-over"));
        row.addEventListener("drop", e => {
          e.preventDefault(); row.classList.remove("drag-over");
          if (dragSrc === null || dragSrc === i) return;
          const newArr = [...arr];
          const [moved] = newArr.splice(dragSrc, 1);
          newArr.splice(i, 0, moved);
          dragSrc = null;
          onReorder(newArr);
          rebuild(newArr);
        });
        list.appendChild(row);
      });
    }
    rebuild(items);
    return { list, rebuild };
  }

  // ── Departments section ──
  function buildDeptSection() {
    const { list } = buildDraggableList(
      Object.entries(departments),
      () => {},
      ([code, name], arr, rebuild) => {
        // Single "Edit" panel — changes both the code (DB identifier) and the passcode together
        const editWrap  = el("div", { style: { display:"none", flexDirection:"column", gap:"6px" } });
        const newCodeIn = el("input", { class: "admin-add-input", type: "text", placeholder: "New code (e.g. CARDIAC)", style: { fontSize:"12px", padding:"6px 8px" } });
        const newPassIn2 = el("input", { class: "admin-add-input", type: "text", placeholder: "New passcode (leave blank = same as code)", style: { fontSize:"12px", padding:"6px 8px" } });
        newCodeIn.addEventListener("input",  () => { const s = newCodeIn.selectionStart;  newCodeIn.value  = newCodeIn.value.toUpperCase();  newCodeIn.setSelectionRange(s,s); });
        newPassIn2.addEventListener("input", () => { const s = newPassIn2.selectionStart; newPassIn2.value = newPassIn2.value.toUpperCase(); newPassIn2.setSelectionRange(s,s); });
        const saveEditBtn = el("button", { class: "btn-primary", style: { fontSize:"11px", padding:"5px 10px", alignSelf:"flex-start" } }, "Save");
        editWrap.appendChild(newCodeIn);
        editWrap.appendChild(newPassIn2);
        editWrap.appendChild(saveEditBtn);

        const editBtn = el("button", { class: "btn-ghost", style: { fontSize:"11px", padding:"4px 8px" }, onClick: () => {
          const open = editWrap.style.display !== "none";
          editWrap.style.display = open ? "none" : "flex";
          if (!open) { newCodeIn.value = code; newPassIn2.value = ""; newCodeIn.focus(); }
        }}, "Edit");

        async function doSaveEdit() {
          const newCode = newCodeIn.value.trim().toUpperCase();
          const newPass = newPassIn2.value.trim().toUpperCase() || newCode;
          if (!newCode) { showToast("Code cannot be empty"); return; }
          if (newCode !== code && departments[newCode]) { showToast("Code already exists"); return; }
          if (newPass.length < 4) { showToast("Passcode must be at least 4 characters"); return; }
          saveEditBtn.disabled = true; saveEditBtn.textContent = "Saving…";
          try {
            if (newCode !== code) {
              await renameDepartmentCode(code, newCode, name);
            }
            // Change the passcode for the (possibly renamed) account
            await changeDeptPasscode(newCode, newPass);
            showToast(`${name} updated — code: ${newCode}, passcode: ${newPass}`);
            setTimeout(() => renderAdminPage(null), 400);
          } catch (err) {
            showToast("Error: " + (err.message || "Could not save"));
            saveEditBtn.disabled = false; saveEditBtn.textContent = "Save";
          }
        }
        saveEditBtn.addEventListener("click", doSaveEdit);
        newPassIn2.addEventListener("keydown", e => { if (e.key === "Enter") doSaveEdit(); });

        return el("div", { style: { display:"flex", flexDirection:"column", flex:"1", gap:"6px" } },
          el("div", { style: { display:"flex", alignItems:"center", justifyContent:"space-between", gap:"8px" } },
            el("span", {}, name, el("span", { class: "dept-badge" }, code)),
            el("div", { style: { display:"flex", gap:"6px" } },
              editBtn,
              el("button", { class: "btn-danger", onClick: () => showConfirm(
                "Delete Department",
                `Permanently delete "${name}" (${code}) and ALL its board data? This cannot be undone.`,
                async () => { await deleteDepartment(code); showToast(`${name} deleted`); setTimeout(() => renderAdminPage(null), 400); }
              )}, "Delete"),
            ),
          ),
          editWrap,
        );
      }
    );

    const codeIn = el("input", { class: "admin-add-input", type: "text", placeholder: "Code (e.g. CARDIAC)", style: { flex:"1" } });
    const nameIn = el("input", { class: "admin-add-input", type: "text", placeholder: "Name (e.g. Cardiac OR)", style: { flex:"2" } });

    async function addDept() {
      const code = codeIn.value.trim().toUpperCase();
      const name = nameIn.value.trim();
      if (!code || !name) return;
      if (departments[code]) { showToast("Code already exists"); return; }
      try {
        await saveDepartment(code, name);
        showToast(`${name} added — passcode is "${code}"`);
        codeIn.value = ""; nameIn.value = "";
        setTimeout(() => renderAdminPage(null), 400);
      } catch (err) {
        showToast("Error: " + (err.message || "Could not create department"));
      }
    }
    nameIn.addEventListener("keydown", e => { if (e.key === "Enter") addDept(); });

    return adminSection("departments", "Departments",
      "Each department gets its own board and code.",
      Object.keys(departments).length ? list : el("div", { style: { color:"#a39688", fontSize:"13px", marginBottom:"14px" } }, "No departments yet."),
      el("div", { class: "admin-add-row" }, codeIn, nameIn, el("button", { class: "btn-primary", onClick: addDept }, "Add")),
    );
  }

  // ── Locations section ──
  function buildLocSection() {
    let locs = [...locations];
    const { list, rebuild } = buildDraggableList(
      locs,
      async (newOrder) => { locs = newOrder; await saveLocations(newOrder); },
      (loc, arr, rebuildFn) => {
        if (isDivider(loc)) {
          const after = loc.replace(/^__divider__/, "");
          const divLabel = /^\d+$/.test(after) ? "" : after;
          const rowDiv = el("div", { style: { display:"flex", alignItems:"center", flex:"1", gap:"8px" } });
          let divEditing = false;
          let divInput = null;

          const labelDisplay = el("span", { style: { fontSize:"11px", color:"#a39688", fontStyle:"italic", flex:"1", display:"flex", alignItems:"center", gap:"6px" } },
            el("span", { style: { flex:"1", height:"2px", background:"#d4ccc6", display:"inline-block" } }),
            divLabel || "Section",
            el("span", { style: { flex:"1", height:"2px", background:"#d4ccc6", display:"inline-block" } }),
          );

          const editBtn = el("button", { class: "btn-ghost", style: { fontSize:"11px", padding:"4px 8px" } }, "Edit");
          const removeBtn = el("button", { class: "btn-danger", style: { fontSize:"11px", padding:"4px 8px" }, onClick: async () => {
            locs = locs.filter(l => l !== loc);
            await saveLocations(locs); rebuildFn(locs); showToast("Divider removed");
          }}, "Remove");

          async function saveDivEdit() {
            if (!divEditing) return;
            const val = divInput ? divInput.value.trim() : "";
            const newKey = val ? `__divider__${val}` : `__divider__${Date.now()}`;
            const idx = locs.indexOf(loc);
            divEditing = false;
            divInput = null;
            if (idx !== -1) { locs[idx] = newKey; await saveLocations(locs); rebuildFn(locs); showToast(val ? `Section labeled "${val}"` : "Label cleared"); return; }
            editBtn.textContent = "Edit";
          }

          editBtn.addEventListener("click", () => {
            if (divEditing) {
              divEditing = false;
              if (divInput) { divInput.replaceWith(labelDisplay); divInput = null; }
              editBtn.textContent = "Edit";
              return;
            }
            divEditing = true;
            divInput = el("input", { class: "admin-add-input", type:"text", placeholder:"Section name…", style: { flex:"1", fontSize:"13px", padding:"4px 8px" } });
            divInput.value = divLabel;
            labelDisplay.replaceWith(divInput);
            editBtn.textContent = "Cancel";
            divInput.focus(); divInput.select();
            divInput.addEventListener("keydown", e => {
              if (e.key === "Enter") { e.preventDefault(); saveDivEdit(); }
              if (e.key === "Escape") { divEditing = false; divInput.replaceWith(labelDisplay); divInput = null; editBtn.textContent = "Edit"; }
            });
            divInput.addEventListener("blur", () => setTimeout(() => { if (divEditing) saveDivEdit(); }, 150));
          });

          rowDiv.appendChild(labelDisplay);
          rowDiv.appendChild(editBtn);
          rowDiv.appendChild(removeBtn);
          return rowDiv;
        }
        // ── Editable location row ──
        const rowDiv = el("div", { style: { display:"flex", alignItems:"center", flex:"1", gap:"8px" } });
        const nameSpan = el("span", { style: { flex:"1" } }, loc);
        let editing = false;

        // Track toggle
        const TRACKED_STYLE   = { background:"#f0fdf4", color:"#16a34a", borderColor:"#86efac" };
        const UNTRACKED_STYLE = { background:"", color:"", borderColor:"" };
        const isTracked = () => trackedRooms.includes(loc);
        const trackBtn = el("button", {
          class: "btn-ghost",
          style: { fontSize:"11px", padding:"4px 8px", flexShrink:"0",
            ...(isTracked() ? TRACKED_STYLE : {}) },
          title: "Track assignments for rotation fairness",
        }, isTracked() ? "📊 Tracked" : "📊 Track");
        // History button — only meaningful for tracked rooms
        const histBtn = el("button", {
          class: "btn-ghost",
          style: { fontSize:"11px", padding:"4px 8px", flexShrink:"0", display: isTracked() ? "" : "none" },
          title: "View / edit this room's tracked assignment history",
          onClick: () => openRoomHistoryModal(session.deptCode, loc),
        }, "📋 History");

        trackBtn.addEventListener("click", async () => {
          let cur = trackedRooms.includes(loc)
            ? trackedRooms.filter(r => r !== loc)
            : [...trackedRooms, loc];
          trackedRooms = cur;
          await saveTrackedRooms(cur);
          trackBtn.textContent = isTracked() ? "📊 Tracked" : "📊 Track";
          Object.assign(trackBtn.style, isTracked() ? TRACKED_STYLE : UNTRACKED_STYLE);
          histBtn.style.display = isTracked() ? "" : "none";
        });

        // Default Empty toggle — room starts marked empty in Plan Tomorrow each new day
        const EMPTY_STYLE = { background:"#eef2ff", color:"#4f46e5", borderColor:"#c7d2fe" };
        const isDefaultEmpty = () => defaultEmptyRooms.includes(loc);
        const emptyBtn = el("button", {
          class: "btn-ghost",
          style: { fontSize:"11px", padding:"4px 8px", flexShrink:"0", ...(isDefaultEmpty() ? EMPTY_STYLE : {}) },
          title: "Start this room marked empty in Plan Tomorrow each day",
        }, isDefaultEmpty() ? "☑ Empty" : "⬜ Empty");
        emptyBtn.addEventListener("click", async () => {
          defaultEmptyRooms = defaultEmptyRooms.includes(loc)
            ? defaultEmptyRooms.filter(r => r !== loc)
            : [...defaultEmptyRooms, loc];
          await saveDefaultEmptyRooms(defaultEmptyRooms);
          emptyBtn.textContent = isDefaultEmpty() ? "☑ Empty" : "⬜ Empty";
          Object.assign(emptyBtn.style, isDefaultEmpty() ? EMPTY_STYLE : UNTRACKED_STYLE);
        });

        const editBtn = el("button", { class: "btn-ghost", style: { fontSize:"11px", padding:"4px 8px" } }, "Edit");
        const removeBtn = el("button", { class: "btn-danger", style: { fontSize:"11px", padding:"4px 8px" }, onClick: async () => {
          locs = locs.filter(l => l !== loc);
          // Remove from tracked / default-empty rooms too if present
          if (trackedRooms.includes(loc)) {
            trackedRooms = trackedRooms.filter(r => r !== loc);
            await saveTrackedRooms(trackedRooms);
          }
          if (defaultEmptyRooms.includes(loc)) {
            defaultEmptyRooms = defaultEmptyRooms.filter(r => r !== loc);
            await saveDefaultEmptyRooms(defaultEmptyRooms);
          }
          await saveLocations(locs); rebuildFn(locs); showToast(`${loc} removed`);
        }}, "Remove");

        editBtn.addEventListener("click", () => {
          if (editing) return;
          editing = true;
          const input = el("input", { class: "admin-add-input", type:"text", style: { flex:"1", fontSize:"13px", padding:"4px 8px" } });
          input.value = loc;
          nameSpan.replaceWith(input);
          editBtn.textContent = "Cancel";
          input.focus(); input.select();

          async function saveEdit() {
            const val = input.value.trim();
            if (val && val !== loc && !locs.includes(val)) {
              const idx = locs.indexOf(loc);
              if (idx !== -1) {
                // Update trackedRooms / defaultEmptyRooms if this room was in them
                if (trackedRooms.includes(loc)) {
                  trackedRooms = trackedRooms.map(r => r === loc ? val : r);
                  await saveTrackedRooms(trackedRooms);
                }
                if (defaultEmptyRooms.includes(loc)) {
                  defaultEmptyRooms = defaultEmptyRooms.map(r => r === loc ? val : r);
                  await saveDefaultEmptyRooms(defaultEmptyRooms);
                }
                locs[idx] = val; await saveLocations(locs); rebuildFn(locs); showToast(`Renamed to ${val}`); return;
              }
            }
            editing = false;
            input.replaceWith(nameSpan);
            editBtn.textContent = "Edit";
          }
          input.addEventListener("keydown", e => {
            if (e.key === "Enter") { e.preventDefault(); saveEdit(); }
            if (e.key === "Escape") { editing = false; input.replaceWith(nameSpan); editBtn.textContent = "Edit"; }
          });
          input.addEventListener("blur", () => setTimeout(() => { if (editing) saveEdit(); }, 150));

          editBtn.onclick = () => { editing = false; input.replaceWith(nameSpan); editBtn.textContent = "Edit"; editBtn.onclick = null; editBtn.addEventListener("click", arguments.callee); };
        });

        rowDiv.appendChild(nameSpan);
        rowDiv.appendChild(trackBtn);
        rowDiv.appendChild(histBtn);
        rowDiv.appendChild(emptyBtn);
        rowDiv.appendChild(editBtn);
        rowDiv.appendChild(removeBtn);
        return rowDiv;
      }
    );

    const locIn = el("input", { class: "admin-add-input", type: "text", placeholder: "e.g. Cardiac OR 1", style: { flex:"1" } });
    async function addLoc() {
      const val = locIn.value.trim();
      if (!val || locs.includes(val)) return;
      const newLocs = [...locs, val];
      await saveLocations(newLocs); locs = newLocs; rebuild(newLocs); locIn.value = ""; showToast(`${val} added`);
    }
    locIn.addEventListener("keydown", e => { if (e.key === "Enter") addLoc(); });

    async function addDivider() {
      // Use a unique key so multiple dividers can coexist
      const key = "__divider__" + Date.now();
      const newLocs = [...locs, key];
      await saveLocations(newLocs); locs = newLocs; rebuild(newLocs); showToast("Section divider added — drag to position");
    }

    return adminSection("locations", "Locations",
      "Drag ⠿ to reorder. Use dividers to separate sections on the board.",
      list,
      el("div", { class: "admin-add-row" }, locIn, el("button", { class: "btn-primary", onClick: addLoc }, "Add")),
      el("div", { class: "admin-add-row", style: { marginTop: "6px" } },
        el("button", { class: "btn-ghost", style: { fontSize:"12px", padding:"6px 12px" }, onClick: addDivider }, "＋ Add Section Divider"),
        el("span", { style: { fontSize:"11px", color:"#a39688", alignSelf:"center", flex:"1" } }, "Drag into position after adding"),
      ),
    );
  }

        const removeBtn = el("button", { class: "btn-danger", style: { fontSize:"11px", padding:"4px 8px" }, onClick: async () => {
          slots = slots.filter(s => s !== slot);
          await saveNoBreakSlots(slots); rebuildFn(slots); showToast(`${slot} removed`);
        }}, "Remove");
        editBtn.addEventListener("click", () => {
          if (editing) return;
          editing = true;

          }

            if (e.key === "Escape") { editing = false; input.replaceWith(nameSpan); editBtn.textContent = "Edit"; }

  // ── Call Positions section ──
  function buildCallPositionsSection() {
    let positions = [...callPositions];
    const { list, rebuild } = buildDraggableList(
      positions,
      async (newOrder) => { positions = newOrder; await saveCallPositions(newOrder); },
      (pos, arr, rebuildFn) => {
        const rowDiv = el("div", { style: { display:"flex", alignItems:"center", flex:"1", gap:"8px" } });

        function showView() {
          rowDiv.innerHTML = "";
          rowDiv.style.display = "flex";
          rowDiv.style.flexDirection = "row";
          rowDiv.style.alignItems = "center";
          rowDiv.style.flex = "1";
          rowDiv.style.gap = "8px";
          const iconBadge = el("span", { style: { fontSize:"12px", color:"#9c8a7e", whiteSpace:"nowrap" } },
            (pos.callIcon || "—") + " / " + (pos.postCallIcon || "—"));
          const nameSpan  = el("span", { style: { flex:"1" } }, pos.name);
          const editBtn   = el("button", { class:"btn-ghost",  style:{ fontSize:"11px", padding:"4px 8px" } }, "Edit");
          const removeBtn = el("button", { class:"btn-danger", style:{ fontSize:"11px", padding:"4px 8px" } }, "Remove");
          editBtn.addEventListener("click", showEdit);
          removeBtn.addEventListener("click", async () => {
            try {
              positions = positions.filter(p => p !== pos);
              await saveCallPositions(positions); rebuildFn(positions); showToast(`${pos.name} removed`);
            } catch(e) { showToast("Save failed — check permissions"); }
          });
          rowDiv.append(nameSpan, iconBadge, editBtn, removeBtn);
        }

        function showEdit() {
          rowDiv.innerHTML = "";
          rowDiv.style.display = "flex";
          rowDiv.style.flexDirection = "column";
          rowDiv.style.alignItems = "stretch";
          rowDiv.style.flex = "1";
          rowDiv.style.gap = "6px";

          const nameInput = el("input", { class:"admin-add-input", type:"text",
            style:{ width:"100%", fontSize:"13px", padding:"4px 8px", boxSizing:"border-box" } });
          nameInput.value = pos.name;

          function makeIconInput(val) {
            const inp = el("input", { class:"admin-add-input", type:"text",
              style:{ width:"52px", fontSize:"18px", textAlign:"center", padding:"2px 4px" } });
            inp.value = val || "";
            return inp;
          }
          const callIn = makeIconInput(pos.callIcon);
          const postIn = makeIconInput(pos.postCallIcon);

          const iconRow = el("div", { style:{ display:"flex", gap:"8px", alignItems:"center", flexWrap:"wrap", marginTop:"2px" } },
            el("span", { style:{ fontSize:"12px", color:"#7c6c62" } }, "Tonight icon:"),
            callIn,
            el("button", { class:"btn-ghost", style:{ fontSize:"11px", padding:"2px 6px" },
              onClick:() => { callIn.value = ""; } }, "None"),
            el("span", { style:{ fontSize:"12px", color:"#7c6c62", marginLeft:"6px" } }, "Post-call icon:"),
            postIn,
            el("button", { class:"btn-ghost", style:{ fontSize:"11px", padding:"2px 6px" },
              onClick:() => { postIn.value = ""; } }, "None"),
          );

          const saveBtn   = el("button", { class:"btn-primary", style:{ fontSize:"12px", padding:"4px 12px" } }, "Save");
          const cancelBtn = el("button", { class:"btn-ghost",   style:{ fontSize:"12px", padding:"4px 12px" } }, "Cancel");
          const btnRow    = el("div", { style:{ display:"flex", gap:"8px", justifyContent:"flex-end" } }, cancelBtn, saveBtn);

          cancelBtn.addEventListener("click", showView);
          saveBtn.addEventListener("click", async () => {
            const newName = nameInput.value.trim();
            if (!newName) { showView(); return; }
            const i = positions.indexOf(pos);
            if (i === -1) { showView(); return; }
            try {
              positions[i] = { name: newName, callIcon: callIn.value.trim(), postCallIcon: postIn.value.trim() };
              await saveCallPositions(positions); rebuildFn(positions); showToast("Updated");
            } catch(e) { showToast("Save failed — check permissions"); showView(); }
          });

          rowDiv.append(nameInput, iconRow, btnRow);
          nameInput.focus(); nameInput.select();
          nameInput.addEventListener("keydown", e => {
            if (e.key === "Enter")  { e.preventDefault(); saveBtn.click(); }
            if (e.key === "Escape") showView();
          });
        }

        showView();
        return rowDiv;
      }
    );

    const posIn = el("input", { class: "admin-add-input", type: "text", placeholder: "e.g. First Call, OB Call", style: { flex:"1" } });
    async function addPosition() {
      const val = posIn.value.trim();
      if (!val || positions.some(p => p.name === val)) return;
      try {
        const newPositions = [...positions, { name: val, callIcon: "📞", postCallIcon: "🌙" }];
        await saveCallPositions(newPositions);
        positions = newPositions; rebuild(newPositions); posIn.value = ""; showToast(`${val} added`);
      } catch(e) { showToast("Save failed — check permissions"); }
    }
    posIn.addEventListener("keydown", e => { if (e.key === "Enter") addPosition(); });

    const emptyMsg = el("div", { style: { color:"#a39688", fontSize:"13px", marginBottom:"14px" } }, "No call positions yet.");
    if (!positions.length) list.appendChild(emptyMsg);
    return adminSection("call-positions", "On-Call Positions",
      "Define call positions (e.g. First Call, OB Call). Tap Edit to customize the Tonight and Post-call icons, or set to None.",
      list,
      el("div", { class: "admin-add-row" }, posIn, el("button", { class: "btn-primary", onClick: addPosition }, "Add")),
    );
  }

  // ── Roster section ──
  function buildRosterSection() {
    let ros = [...roster];
    const ROLES = [["attending","Attending"],["resident","Resident"],["anesthetist","Anesthetist"]];

    const { list, rebuild } = buildDraggableList(
      ros,
      () => {},
      (entry, arr, rebuildFn) => {
        const rowDiv = el("div", { style: { display:"flex", alignItems:"center", flex:"1", gap:"8px" } });
        const nameSpan = el("span", { style: { flex:"1" } }, entry.name);
        let editing = false;

        // Role selector
        const roleSelect = document.createElement("select");
        roleSelect.className = "role-select";
        ROLES.forEach(([val, label]) => {
          const opt = document.createElement("option");
          opt.value = val; opt.textContent = label;
          if (val === entry.role) opt.selected = true;
          roleSelect.appendChild(opt);
        });
        roleSelect.addEventListener("change", async () => {
          const newRole = roleSelect.value;
          try {
            await updateRosterEntryRole(entry.name, newRole);
            ros = ros.map(r => r.name === entry.name ? { ...r, role: newRole } : r);
          } catch(err) {
            showToast("Error saving role");
            roleSelect.value = entry.role;
          }
        });

        const editBtn = el("button", { class: "btn-ghost", style: { fontSize:"11px", padding:"4px 8px" } }, "Edit");
        const removeBtn = el("button", { class: "btn-danger", style: { fontSize:"11px", padding:"4px 8px" }, onClick: async () => {
          try {
            await deleteRosterEntry(entry.name);
            ros = ros.filter(e => e.name !== entry.name);
            rebuildFn([...ros]);
            showToast(`${entry.name} removed`);
          } catch(err) { showToast("Error removing provider"); }
        }}, "Remove");

        editBtn.addEventListener("click", () => {
          if (editing) return;
          editing = true;
          const input = el("input", { class: "admin-add-input", type:"text", style: { flex:"1", fontSize:"13px", padding:"4px 8px" } });
          input.value = entry.name;
          nameSpan.replaceWith(input);
          editBtn.textContent = "Cancel";
          input.focus(); input.select();
          async function saveEdit() {
            const val = input.value.trim();
            if (val && val !== entry.name && !ros.some(e => e.name === val)) {
              try {
                await deleteRosterEntry(entry.name);
                await saveRosterEntry(val, entry.role);
                ros = ros.filter(e => e.name !== entry.name).concat({ name: val, role: entry.role }).sort((a,b) => a.name.localeCompare(b.name));
                rebuildFn([...ros]);
                showToast(`Renamed to ${val}`);
              } catch(err) { showToast("Error renaming provider"); }
              return;
            }
            editing = false; input.replaceWith(nameSpan); editBtn.textContent = "Edit";
          }
          input.addEventListener("keydown", e => {
            if (e.key === "Enter") { e.preventDefault(); saveEdit(); }
            if (e.key === "Escape") { editing = false; input.replaceWith(nameSpan); editBtn.textContent = "Edit"; }
          });
          input.addEventListener("blur", () => setTimeout(() => { if (editing) saveEdit(); }, 150));
        });

        rowDiv.appendChild(nameSpan); rowDiv.appendChild(roleSelect); rowDiv.appendChild(editBtn); rowDiv.appendChild(removeBtn);
        return rowDiv;
      }
    );

    const nameIn = el("input", { class: "admin-add-input", type: "text", placeholder: "Last, First (e.g. Smith, John)", style: { flex:"1" } });
    async function addName() {
      const val = nameIn.value.trim();
      if (!val || ros.some(e => e.name === val)) return;
      try {
        await saveRosterEntry(val, "attending");
        ros = [...ros, { name: val, role: "attending" }].sort((a,b) => a.name.localeCompare(b.name));
        rebuild(ros); nameIn.value = ""; showToast(`${val} added`);
      } catch(err) { showToast("Error adding provider"); }
    }
    nameIn.addEventListener("keydown", e => { if (e.key === "Enter") addName(); });

    return adminSection("roster", "Provider Roster",
      "Names appear as suggestions when assigning a provider. Set role so supervisors can be tracked. Format: Last, First.",
      list,
      el("div", { class: "admin-add-row" }, nameIn, el("button", { class: "btn-primary", onClick: addName }, "Add")),
    );
  }

  // ── Admin passcode section (shown on departments page) ──
  function buildAdminPasscodeSection() {
    const newPassIn    = el("input", { class: "admin-add-input", type: "text", placeholder: "New admin passcode", style: { flex:"1" } });
    const confirmIn    = el("input", { class: "admin-add-input", type: "text", placeholder: "Confirm passcode", style: { flex:"1" } });
    newPassIn.addEventListener("input", () => { const s = newPassIn.selectionStart; newPassIn.value = newPassIn.value.toUpperCase(); newPassIn.setSelectionRange(s,s); });
    confirmIn.addEventListener("input", () => { const s = confirmIn.selectionStart; confirmIn.value = confirmIn.value.toUpperCase(); confirmIn.setSelectionRange(s,s); });
    const statusMsg    = el("div", { style: { fontSize:"12px", color:"#dc2626", marginTop:"4px", minHeight:"16px" } });

    async function doChange() {
      const np = newPassIn.value.trim();
      const cp = confirmIn.value.trim();
      if (!np || np.length < 6) { statusMsg.textContent = "Passcode must be at least 6 characters."; return; }
      if (np !== cp)             { statusMsg.textContent = "Passcodes do not match."; return; }
      statusMsg.textContent = "";
      try {
        await changeAdminPasscode(np);
        newPassIn.value = ""; confirmIn.value = "";
        showToast("Admin passcode updated ✓");
      } catch (err) {
        statusMsg.textContent = "Error: " + (err.message || "Could not update.");
      }
    }
    confirmIn.addEventListener("keydown", e => { if (e.key === "Enter") doChange(); });

    return adminSection("admin-passcode", "Admin Passcode",
      "Change the admin login passcode. You will need to use the new passcode next time.",
      el("div", { class: "admin-add-row" }, newPassIn, confirmIn, el("button", { class: "btn-primary", onClick: doChange }, "Update")),
      statusMsg,
    );
  }

    const newPassIn = el("input", { class: "admin-add-input", type: "password", placeholder: "New admin passcode (min 4 chars)", style: { flex: "1" } });
    const confirmIn = el("input", { class: "admin-add-input", type: "password", placeholder: "Confirm passcode", style: { flex: "1" } });
    const statusMsg = el("div", { style: { fontSize: "12px", color: "#dc2626", marginTop: "4px", minHeight: "16px" } });
    const subText   = el("div", { class: "admin-section-sub" }, "Loading…");
    const removeWrap = el("div", { style: { marginTop: "8px" } });

    // Async load — update sub-text and remove button once we know if a passcode is set
    getDeptAdminPasscode(session.deptCode).then(existing => {
      localStorage.removeItem(`gbadmin_${session.deptCode}`); // clean up any old local value
      subText.textContent = existing
        ? "A passcode is currently set. Enter a new one below to change it."
        : "No passcode set — the Admin button currently grants open access from the display board.";
      if (existing) {
        const removeBtn = el("button", { class: "btn-warn", onClick: () => showConfirm(
          "Remove Admin Passcode",
          "This will allow anyone at the display board to open Admin without a passcode. Continue?",
          async () => {
            try {
              await saveDeptAdminPasscode(session.deptCode, null);
              showToast("Admin passcode removed");
              subText.textContent = "No passcode set — the Admin button currently grants open access from the display board.";
              removeWrap.innerHTML = "";
            } catch(e) { showToast("Save failed. Check your connection."); }
          }
        )}, "Remove Passcode");
        removeWrap.appendChild(removeBtn);
      }
    }).catch(() => { subText.textContent = "Could not load passcode status."; });

    async function doChange() {
      const np = newPassIn.value.trim();
      const cp = confirmIn.value.trim();
      if (!np || np.length < 4) { statusMsg.textContent = "Passcode must be at least 4 characters."; return; }
      if (np !== cp)             { statusMsg.textContent = "Passcodes do not match."; return; }
      try {
        await saveDeptAdminPasscode(session.deptCode, np);
        newPassIn.value = ""; confirmIn.value = ""; statusMsg.textContent = "";
        subText.textContent = "A passcode is currently set. Enter a new one below to change it.";
        showToast("Admin passcode updated ✓");
      } catch(e) { statusMsg.textContent = "Save failed. Check your connection."; }
    }
    confirmIn.addEventListener("keydown", e => { if (e.key === "Enter") doChange(); });

    return adminSection("display-passcode", "Display Board Admin Passcode",
      "Protects the Admin button on the coordinator display board. Set once; required each time Admin is opened.",
      subText,
      el("div", { class: "admin-add-row" }, newPassIn, confirmIn, el("button", { class: "btn-primary", onClick: doChange }, "Update")),
      removeWrap,
      statusMsg,
    );
  }

  // ── Schedule import: role mappings section ──────────────────────────────────
  function buildScheduleImportSection() {
    const ROLE_KEYS = [
      { key: "ac",          label: "AC (Charge)" },
      { key: "obCSection",  label: "OB C-Section" },
      { key: "obLaborDeck", label: "OB Labor Deck" },

    const selects = {};
    const container = el("div");

    get(ref(db, `deptAdmin/${deptCode}/scheduleRoleMappings`)).then(snap => {
      const cur = snap.val() || {};
      container.innerHTML = "";
      ROLE_KEYS.forEach(({ key, label }) => {
        const sel = el("select", { class: "role-select", style: { minWidth: "150px", fontSize: "13px" } });

      ROLE_KEYS.forEach(({ key }) => { const v = selects[key]?.value; if (v) mappings[key] = v; });
      await set(ref(db, `deptAdmin/${deptCode}/scheduleRoleMappings`), Object.keys(mappings).length ? mappings : null);
      statusMsg.textContent = "Saved ✓";
      setTimeout(() => { statusMsg.textContent = ""; }, 2000);

    return adminSection("schedule-role-mappings", "Schedule Import: Role Mappings",
      "Map each QGenda schedule role to its Core Position in Gas Breaker. Set once, used on every import.",

  // ── Schedule import: name mappings section ──────────────────────────────────
  function buildScheduleNameMappingsSection() {
    const container = el("div");

    async function reloadMappings() {
      const snap = await get(ref(db, `deptAdmin/${deptCode}/scheduleMappings`));
      const mappings = snap.val() || {};
      container.innerHTML = "";
      const entries = Object.entries(mappings);

        container.appendChild(el("div", { style: { fontSize: "13px", color: "#a39688", fontStyle: "italic", padding: "8px 0" } }, "No saved mappings yet."));

      }
      entries.forEach(([key, rosterName]) => {
        const schedName = key.replace(/_/g, " ").trim();
