async function loadConfig(code) {
  return new Promise(resolve => {
    let done = false;
    const unsub = onValue(configRef(code), snap => {
      const cfg = snap.val() || {};
      locations     = cfg.locations     ? Object.values(cfg.locations)     : [...DEFAULT_LOCATIONS];
      noBreakSlots  = cfg.noBreakSlots  ? Object.values(cfg.noBreakSlots)  : [];
      callPositions  = cfg.callPositions  ? Object.values(cfg.callPositions)  : [];
      roster         = cfg.roster         ? Object.values(cfg.roster).map(normalizeRosterEntry).sort((a,b) => a.name.localeCompare(b.name)) : [];
      if (!done) { done = true; unsub(); resolve(); }
    });
    setTimeout(() => { if (!done) { done = true; unsub(); resolve(); } }, 5000);
  });
}

// ─── Admin page ───────────────────────────────────────────────────────────────
function renderAdminPage(deptCode, fromDisplay = false) {
  const isDept = !!deptCode;
  document.body.classList.remove("display-mode"); // allow normal scroll in admin
  const app = document.getElementById("app");
  app.innerHTML = "";

  // ── Drag list builder ──
  function buildDraggableList(items, onReorder, renderItem) {
    const list = el("div", { class: "admin-list" });
    let dragSrc = null;

    function rebuild(arr) {
      list.innerHTML = "";
      if (!arr.length) {
        // empty state — no items to show, leave blank (parent handles empty msg)
        return;
      }
      arr.forEach((item, i) => {
        const row = el("div", { class: "admin-list-item" });
        row.setAttribute("draggable", "true");
        const handle = el("span", { class: "drag-handle" }, "⠿");
        row.appendChild(handle);
        const content = renderItem(item, arr, (a) => rebuild(a ?? arr));
        row.appendChild(content);
        row.addEventListener("dragstart", e => { dragSrc = i; setTimeout(() => row.classList.add("dragging"), 0); e.dataTransfer.effectAllowed = "move"; });
        row.addEventListener("dragend",   () => row.classList.remove("dragging"));
        row.addEventListener("dragover",  e => { e.preventDefault(); row.classList.add("drag-over"); });
        row.addEventListener("dragleave", () => row.classList.remove("drag-over"));
        row.addEventListener("drop", e => {
          e.preventDefault(); row.classList.remove("drag-over");
          if (dragSrc === null || dragSrc === i) return;
          const newArr = [...arr];
          const [moved] = newArr.splice(dragSrc, 1);
          newArr.splice(i, 0, moved);
          dragSrc = null;
          onReorder(newArr);
          rebuild(newArr);
        });
        list.appendChild(row);
      });
    }
    rebuild(items);
    return { list, rebuild };
  }

  // ── Departments section ──
  function buildDeptSection() {
    const { list } = buildDraggableList(
      Object.entries(departments),
      () => {},
      ([code, name], arr, rebuild) => {
        // Single "Edit" panel — changes both the code (DB identifier) and the passcode together
        const editWrap  = el("div", { style: { display:"none", flexDirection:"column", gap:"6px" } });
        const newCodeIn = el("input", { class: "admin-add-input", type: "text", placeholder: "New code (e.g. CARDIAC)", style: { fontSize:"12px", padding:"6px 8px" } });
        const newPassIn2 = el("input", { class: "admin-add-input", type: "text", placeholder: "New passcode (leave blank = same as code)", style: { fontSize:"12px", padding:"6px 8px" } });
        newCodeIn.addEventListener("input",  () => { const s = newCodeIn.selectionStart;  newCodeIn.value  = newCodeIn.value.toUpperCase();  newCodeIn.setSelectionRange(s,s); });
        newPassIn2.addEventListener("input", () => { const s = newPassIn2.selectionStart; newPassIn2.value = newPassIn2.value.toUpperCase(); newPassIn2.setSelectionRange(s,s); });
        const saveEditBtn = el("button", { class: "btn-primary", style: { fontSize:"11px", padding:"5px 10px", alignSelf:"flex-start" } }, "Save");
        editWrap.appendChild(newCodeIn);
        editWrap.appendChild(newPassIn2);
        editWrap.appendChild(saveEditBtn);

        const editBtn = el("button", { class: "btn-ghost", style: { fontSize:"11px", padding:"4px 8px" }, onClick: () => {
          const open = editWrap.style.display !== "none";
          editWrap.style.display = open ? "none" : "flex";
          if (!open) { newCodeIn.value = code; newPassIn2.value = ""; newCodeIn.focus(); }
        }}, "Edit");

        async function doSaveEdit() {
          const newCode = newCodeIn.value.trim().toUpperCase();
          const newPass = newPassIn2.value.trim().toUpperCase() || newCode;
          if (!newCode) { showToast("Code cannot be empty"); return; }
          if (newCode !== code && departments[newCode]) { showToast("Code already exists"); return; }
          if (newPass.length < 4) { showToast("Passcode must be at least 4 characters"); return; }
          saveEditBtn.disabled = true; saveEditBtn.textContent = "Saving…";
          try {
            if (newCode !== code) {
              await renameDepartmentCode(code, newCode, name);
            }
            // Change the passcode for the (possibly renamed) account
            await changeDeptPasscode(newCode, newPass);
            showToast(`${name} updated — code: ${newCode}, passcode: ${newPass}`);
            setTimeout(() => renderAdminPage(null), 400);
          } catch (err) {
            showToast("Error: " + (err.message || "Could not save"));
            saveEditBtn.disabled = false; saveEditBtn.textContent = "Save";
          }
        }
        saveEditBtn.addEventListener("click", doSaveEdit);
        newPassIn2.addEventListener("keydown", e => { if (e.key === "Enter") doSaveEdit(); });

        return el("div", { style: { display:"flex", flexDirection:"column", flex:"1", gap:"6px" } },
          el("div", { style: { display:"flex", alignItems:"center", justifyContent:"space-between", gap:"8px" } },
            el("span", {}, name, el("span", { class: "dept-badge" }, code)),
            el("div", { style: { display:"flex", gap:"6px" } },
              editBtn,
              el("button", { class: "btn-danger", onClick: () => showConfirm(
                "Delete Department",
                `Permanently delete "${name}" (${code}) and ALL its board data? This cannot be undone.`,
                async () => { await deleteDepartment(code); showToast(`${name} deleted`); setTimeout(() => renderAdminPage(null), 400); }
              )}, "Delete"),
            ),
          ),
          editWrap,
        );
      }
    );

    const codeIn = el("input", { class: "admin-add-input", type: "text", placeholder: "Code (e.g. CARDIAC)", style: { flex:"1" } });
    const nameIn = el("input", { class: "admin-add-input", type: "text", placeholder: "Name (e.g. Cardiac OR)", style: { flex:"2" } });

    async function addDept() {
      const code = codeIn.value.trim().toUpperCase();
      const name = nameIn.value.trim();
      if (!code || !name) return;
      if (departments[code]) { showToast("Code already exists"); return; }
      try {
        await saveDepartment(code, name);
        showToast(`${name} added — passcode is "${code}"`);
        codeIn.value = ""; nameIn.value = "";
        setTimeout(() => renderAdminPage(null), 400);
      } catch (err) {
        showToast("Error: " + (err.message || "Could not create department"));
      }
    }
    nameIn.addEventListener("keydown", e => { if (e.key === "Enter") addDept(); });

    return el("div", { class: "admin-section" },
      el("div", { class: "admin-section-title" }, "Departments"),
      el("div", { class: "admin-section-sub"   }, "Each department gets its own board and code."),
      Object.keys(departments).length ? list : el("div", { style: { color:"#a39688", fontSize:"13px", marginBottom:"14px" } }, "No departments yet."),
      el("div", { class: "admin-add-row" }, codeIn, nameIn, el("button", { class: "btn-primary", onClick: addDept }, "Add")),
    );
  }

  // ── Locations section ──
  function buildLocSection() {
    let locs = [...locations];
    const { list, rebuild } = buildDraggableList(
      locs,
      async (newOrder) => { locs = newOrder; await saveLocations(newOrder); },
      (loc, arr, rebuildFn) => {
        if (isDivider(loc)) {
          const after = loc.replace(/^__divider__/, "");
          const divLabel = /^\d+$/.test(after) ? "" : after;
          const rowDiv = el("div", { style: { display:"flex", alignItems:"center", flex:"1", gap:"8px" } });
          let divEditing = false;
          let divInput = null;

          const labelDisplay = el("span", { style: { fontSize:"11px", color:"#a39688", fontStyle:"italic", flex:"1", display:"flex", alignItems:"center", gap:"6px" } },
            el("span", { style: { flex:"1", height:"2px", background:"#d4ccc6", display:"inline-block" } }),
            divLabel || "Section",
            el("span", { style: { flex:"1", height:"2px", background:"#d4ccc6", display:"inline-block" } }),
          );

          const editBtn = el("button", { class: "btn-ghost", style: { fontSize:"11px", padding:"4px 8px" } }, "Edit");
          const removeBtn = el("button", { class: "btn-danger", style: { fontSize:"11px", padding:"4px 8px" }, onClick: async () => {
            locs = locs.filter(l => l !== loc);
            await saveLocations(locs); rebuildFn(locs); showToast("Divider removed");
          }}, "Remove");

          async function saveDivEdit() {
            if (!divEditing) return;
            const val = divInput ? divInput.value.trim() : "";
            const newKey = val ? `__divider__${val}` : `__divider__${Date.now()}`;
            const idx = locs.indexOf(loc);
            divEditing = false;
            divInput = null;
            if (idx !== -1) { locs[idx] = newKey; await saveLocations(locs); rebuildFn(locs); showToast(val ? `Section labeled "${val}"` : "Label cleared"); return; }
            editBtn.textContent = "Edit";
          }

          editBtn.addEventListener("click", () => {
            if (divEditing) {
              divEditing = false;
              if (divInput) { divInput.replaceWith(labelDisplay); divInput = null; }
              editBtn.textContent = "Edit";
              return;
            }
            divEditing = true;
            divInput = el("input", { class: "admin-add-input", type:"text", placeholder:"Section name…", style: { flex:"1", fontSize:"13px", padding:"4px 8px" } });
            divInput.value = divLabel;
            labelDisplay.replaceWith(divInput);
            editBtn.textContent = "Cancel";
            divInput.focus(); divInput.select();
            divInput.addEventListener("keydown", e => {
              if (e.key === "Enter") { e.preventDefault(); saveDivEdit(); }
              if (e.key === "Escape") { divEditing = false; divInput.replaceWith(labelDisplay); divInput = null; editBtn.textContent = "Edit"; }
            });
            divInput.addEventListener("blur", () => setTimeout(() => { if (divEditing) saveDivEdit(); }, 150));
          });

          rowDiv.appendChild(labelDisplay);
          rowDiv.appendChild(editBtn);
          rowDiv.appendChild(removeBtn);
          return rowDiv;
        }
        // ── Editable location row ──
        const rowDiv = el("div", { style: { display:"flex", alignItems:"center", flex:"1", gap:"8px" } });
        const nameSpan = el("span", { style: { flex:"1" } }, loc);
        let editing = false;

        const editBtn = el("button", { class: "btn-ghost", style: { fontSize:"11px", padding:"4px 8px" } }, "Edit");
        const removeBtn = el("button", { class: "btn-danger", style: { fontSize:"11px", padding:"4px 8px" }, onClick: async () => {
          locs = locs.filter(l => l !== loc);
          await saveLocations(locs); rebuildFn(locs); showToast(`${loc} removed`);
        }}, "Remove");

        editBtn.addEventListener("click", () => {
          if (editing) return;
          editing = true;
          const input = el("input", { class: "admin-add-input", type:"text", style: { flex:"1", fontSize:"13px", padding:"4px 8px" } });
          input.value = loc;
          nameSpan.replaceWith(input);
          editBtn.textContent = "Cancel";
          input.focus(); input.select();

          async function saveEdit() {
            const val = input.value.trim();
            if (val && val !== loc && !locs.includes(val)) {
              const idx = locs.indexOf(loc);
              if (idx !== -1) { locs[idx] = val; await saveLocations(locs); rebuildFn(locs); showToast(`Renamed to ${val}`); return; }
            }
            editing = false;
            input.replaceWith(nameSpan);
            editBtn.textContent = "Edit";
          }
          input.addEventListener("keydown", e => {
            if (e.key === "Enter") { e.preventDefault(); saveEdit(); }
            if (e.key === "Escape") { editing = false; input.replaceWith(nameSpan); editBtn.textContent = "Edit"; }
          });
          input.addEventListener("blur", () => setTimeout(() => { if (editing) saveEdit(); }, 150));

          editBtn.onclick = () => { editing = false; input.replaceWith(nameSpan); editBtn.textContent = "Edit"; editBtn.onclick = null; editBtn.addEventListener("click", arguments.callee); };
        });

        rowDiv.appendChild(nameSpan);
        rowDiv.appendChild(editBtn);
        rowDiv.appendChild(removeBtn);
        return rowDiv;
      }
    );

    const locIn = el("input", { class: "admin-add-input", type: "text", placeholder: "e.g. Cardiac OR 1", style: { flex:"1" } });
    async function addLoc() {
      const val = locIn.value.trim();
      if (!val || locs.includes(val)) return;
      const newLocs = [...locs, val];
      await saveLocations(newLocs); locs = newLocs; rebuild(newLocs); locIn.value = ""; showToast(`${val} added`);
    }
    locIn.addEventListener("keydown", e => { if (e.key === "Enter") addLoc(); });

    async function addDivider() {
      // Use a unique key so multiple dividers can coexist
      const key = "__divider__" + Date.now();
      const newLocs = [...locs, key];
      await saveLocations(newLocs); locs = newLocs; rebuild(newLocs); showToast("Section divider added — drag to position");
    }

    return el("div", { class: "admin-section" },
      el("div", { class: "admin-section-title" }, "Locations"),
      el("div", { class: "admin-section-sub"   }, "Drag ⠿ to reorder. Use dividers to separate sections on the board."),
      list,
      el("div", { class: "admin-add-row" }, locIn, el("button", { class: "btn-primary", onClick: addLoc }, "Add")),
      el("div", { class: "admin-add-row", style: { marginTop: "6px" } },
        el("button", { class: "btn-ghost", style: { fontSize:"12px", padding:"6px 12px" }, onClick: addDivider }, "＋ Add Section Divider"),
        el("span", { style: { fontSize:"11px", color:"#a39688", alignSelf:"center", flex:"1" } }, "Drag into position after adding"),
      ),
    );
  }

  // ── No-break slots section ──
  function buildNoBreakSection() {
    let slots = [...noBreakSlots];
    const { list, rebuild } = buildDraggableList(
      slots,
      async (newOrder) => { slots = newOrder; await saveNoBreakSlots(newOrder); },
      (slot, arr, rebuildFn) => {
        const rowDiv = el("div", { style: { display:"flex", alignItems:"center", flex:"1", gap:"8px" } });
        const nameSpan = el("span", { style: { flex:"1" } }, slot);
        let editing = false;
        const editBtn = el("button", { class: "btn-ghost", style: { fontSize:"11px", padding:"4px 8px" } }, "Edit");
        const removeBtn = el("button", { class: "btn-danger", style: { fontSize:"11px", padding:"4px 8px" }, onClick: async () => {
          slots = slots.filter(s => s !== slot);
          await saveNoBreakSlots(slots); rebuildFn(slots); showToast(`${slot} removed`);
        }}, "Remove");
        editBtn.addEventListener("click", () => {
          if (editing) return;
          editing = true;
          const input = el("input", { class: "admin-add-input", type:"text", style: { flex:"1", fontSize:"13px", padding:"4px 8px" } });
          input.value = slot;
          nameSpan.replaceWith(input);
          editBtn.textContent = "Cancel";
          input.focus(); input.select();
          async function saveEdit() {
            const val = input.value.trim();
            if (val && val !== slot && !slots.includes(val)) {
              const i = slots.indexOf(slot);
              if (i !== -1) { slots[i] = val; await saveNoBreakSlots(slots); rebuildFn(slots); showToast(`Renamed to ${val}`); return; }
            }
            editing = false; input.replaceWith(nameSpan); editBtn.textContent = "Edit";
          }
          input.addEventListener("keydown", e => {
            if (e.key === "Enter") { e.preventDefault(); saveEdit(); }
            if (e.key === "Escape") { editing = false; input.replaceWith(nameSpan); editBtn.textContent = "Edit"; }
          });
          input.addEventListener("blur", () => setTimeout(() => { if (editing) saveEdit(); }, 150));
        });
        rowDiv.appendChild(nameSpan); rowDiv.appendChild(editBtn); rowDiv.appendChild(removeBtn);
        return rowDiv;
      }
    );

    const slotIn = el("input", { class: "admin-add-input", type: "text", placeholder: "e.g. Breaker 1, Float", style: { flex:"1" } });
    async function addSlot() {
      const val = slotIn.value.trim();
      if (!val || slots.includes(val)) return;
      const newSlots = [...slots, val];
      await saveNoBreakSlots(newSlots); slots = newSlots; rebuild(newSlots); slotIn.value = ""; showToast(`${val} added`);
    }
    slotIn.addEventListener("keydown", e => { if (e.key === "Enter") addSlot(); });

    const emptyMsg = el("div", { style: { color:"#a39688", fontSize:"13px", marginBottom:"14px" } }, "No slots yet.");
    if (!slots.length) list.appendChild(emptyMsg);
    return el("div", { class: "admin-section" },
      el("div", { class: "admin-section-title" }, "Core Positions"),
      el("div", { class: "admin-section-sub" }, "Roles like Breaker or Float that appear at the top of the coordinator display. Assignable in Plan Tomorrow."),
      list,
      el("div", { class: "admin-add-row" }, slotIn, el("button", { class: "btn-primary", onClick: addSlot }, "Add")),
    );
  }

  // ── Roster section ──
  function buildRosterSection() {
    let ros = [...roster];
    const ROLES = [["attending","Attending"],["resident","Resident"],["anesthetist","Anesthetist"]];

    const { list, rebuild } = buildDraggableList(
      ros,
      () => {},
      (entry, arr, rebuildFn) => {
        const rowDiv = el("div", { style: { display:"flex", alignItems:"center", flex:"1", gap:"8px" } });
        const nameSpan = el("span", { style: { flex:"1" } }, entry.name);
        let editing = false;

        // Role selector
        const roleSelect = document.createElement("select");
        roleSelect.className = "role-select";
        ROLES.forEach(([val, label]) => {
          const opt = document.createElement("option");
          opt.value = val; opt.textContent = label;
          if (val === entry.role) opt.selected = true;
          roleSelect.appendChild(opt);
        });
        roleSelect.addEventListener("change", async () => {
          const newRole = roleSelect.value;
          try {
            await updateRosterEntryRole(entry.name, newRole);
            ros = ros.map(r => r.name === entry.name ? { ...r, role: newRole } : r);
          } catch(err) {
            showToast("Error saving role");
            roleSelect.value = entry.role;
          }
        });

        const editBtn = el("button", { class: "btn-ghost", style: { fontSize:"11px", padding:"4px 8px" } }, "Edit");
        const removeBtn = el("button", { class: "btn-danger", style: { fontSize:"11px", padding:"4px 8px" }, onClick: async () => {
          try {
            await deleteRosterEntry(entry.name);
            ros = ros.filter(e => e.name !== entry.name);
            rebuildFn([...ros]);
            showToast(`${entry.name} removed`);
          } catch(err) { showToast("Error removing provider"); }
        }}, "Remove");

        editBtn.addEventListener("click", () => {
          if (editing) return;
          editing = true;
          const input = el("input", { class: "admin-add-input", type:"text", style: { flex:"1", fontSize:"13px", padding:"4px 8px" } });
          input.value = entry.name;
          nameSpan.replaceWith(input);
          editBtn.textContent = "Cancel";
          input.focus(); input.select();
          async function saveEdit() {
            const val = input.value.trim();
            if (val && val !== entry.name && !ros.some(e => e.name === val)) {
              try {
                await deleteRosterEntry(entry.name);
                await saveRosterEntry(val, entry.role);
                ros = ros.filter(e => e.name !== entry.name).concat({ name: val, role: entry.role }).sort((a,b) => a.name.localeCompare(b.name));
                rebuildFn([...ros]);
                showToast(`Renamed to ${val}`);
              } catch(err) { showToast("Error renaming provider"); }
              return;
            }
            editing = false; input.replaceWith(nameSpan); editBtn.textContent = "Edit";
          }
          input.addEventListener("keydown", e => {
            if (e.key === "Enter") { e.preventDefault(); saveEdit(); }
            if (e.key === "Escape") { editing = false; input.replaceWith(nameSpan); editBtn.textContent = "Edit"; }
          });
          input.addEventListener("blur", () => setTimeout(() => { if (editing) saveEdit(); }, 150));
        });

        rowDiv.appendChild(nameSpan); rowDiv.appendChild(roleSelect); rowDiv.appendChild(editBtn); rowDiv.appendChild(removeBtn);
        return rowDiv;
      }
    );

    const nameIn = el("input", { class: "admin-add-input", type: "text", placeholder: "Last, First (e.g. Smith, John)", style: { flex:"1" } });
    async function addName() {
      const val = nameIn.value.trim();
      if (!val || ros.some(e => e.name === val)) return;
      try {
        await saveRosterEntry(val, "attending");
        ros = [...ros, { name: val, role: "attending" }].sort((a,b) => a.name.localeCompare(b.name));
        rebuild(ros); nameIn.value = ""; showToast(`${val} added`);
      } catch(err) { showToast("Error adding provider"); }
    }
    nameIn.addEventListener("keydown", e => { if (e.key === "Enter") addName(); });

    return el("div", { class: "admin-section" },
      el("div", { class: "admin-section-title" }, "Provider Roster"),
      el("div", { class: "admin-section-sub"   }, "Names appear as suggestions when assigning a provider. Set role so supervisors can be tracked. Format: Last, First."),
      list,
      el("div", { class: "admin-add-row" }, nameIn, el("button", { class: "btn-primary", onClick: addName }, "Add")),
    );
  }

    const newPassIn    = el("input", { class: "admin-add-input", type: "text", placeholder: "New admin passcode", style: { flex:"1" } });

// ─── Plan Tomorrow ────────────────────────────────────────────────────────────
function renderPlanPage() {
  document.body.classList.remove("display-mode");
  const app = document.getElementById("app");
  app.innerHTML = "";

  const deptCode = session.deptCode;

  // ── Date helpers ──
  function planDateKey(dateStr) {
    // dateStr: "YYYY-MM-DD"
    const [y, m, d] = dateStr.split("-").map(Number);
    return `${y}-${m}-${d}`;
  }
  function getTomorrow() {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }
  function formatDateBanner(dateStr) {
    const [y, m, d] = dateStr.split("-").map(Number);
    const dt = new Date(y, m - 1, d);
    return dt.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric", year: "numeric" });
  }
  function isWeekend(dateStr) {
    const [y, m, d] = dateStr.split("-").map(Number);
    const day = new Date(y, m - 1, d).getDay();
    return day === 0 || day === 6;
  }

  // ── State ──
  let selectedDate = getTomorrow();
  let planData = {};        // { [roomId]: { provider, supervisor, empty } }
  let availableList = [];   // ordered array of names
  let planNotes = {};       // { [nameKey]: { text, color } }
  let planCallData = {};    // { [posIdx]: name }
  let planPostCallData = {}; // { [posIdx]: name }
  let planHeaderText = "";

  // ── Firebase helpers ──
  function planBoardRef(dateStr) {
    return ref(db, `boards/${deptCode}/${planDateKey(dateStr)}`);
  }
  function planAvailRef(dateStr) {
    return ref(db, `boards/${deptCode}/${planDateKey(dateStr)}/_available_`);
  }
  function planRoomRef(dateStr, rid) {
    return ref(db, `boards/${deptCode}/${planDateKey(dateStr)}/${rid}`);
  }
  function planHistRef(dateStr, name) {
    const key = "_hist_" + name.replace(/[^a-zA-Z0-9]/g, "_");
    return ref(db, `boards/${deptCode}/${planDateKey(dateStr)}/${key}`);
  }
  function planCallRef(dateStr, idx) {
    return ref(db, `boards/${deptCode}/${planDateKey(dateStr)}/_call_/${idx}`);
  }
  function planPostCallRef(dateStr, idx) {
    return ref(db, `boards/${deptCode}/${planDateKey(dateStr)}/_postcall_/${idx}`);
  }
  function planHeaderRef() {
    return ref(db, `deptAdmin/${deptCode}/planHeader`);
  }

  async function saveAvailable() {
    const obj = {};
    availableList.forEach((n, i) => { obj[i] = n; });
    await set(planAvailRef(selectedDate), Object.keys(obj).length ? obj : null);
  }

  async function savePlanNote(name, noteObj) {
    const r = planHistRef(selectedDate, name);
    const snap = await get(r);
    const current = snap.val() || {};
    await set(r, { ...current, provider: name, note: noteObj || null });
    if (noteObj) planNotes[name] = noteObj;
    else delete planNotes[name];
  }

  async function savePlanRoom(loc, data) {
    const rid = roomId(loc);
    planData[rid] = data;
    if (data && Object.keys(data).some(k => data[k] != null && data[k] !== false)) {
      await set(planRoomRef(selectedDate, rid), data);
    } else {
      await remove(planRoomRef(selectedDate, rid));
      delete planData[rid];
    }
  }

  async function savePlanCallAssignment(idx, name) {
    if (name) {
      planCallData[idx] = name;
      await set(planCallRef(selectedDate, idx), name);
    } else {
      delete planCallData[idx];
      await remove(planCallRef(selectedDate, idx));
    }
  }

  async function savePlanPostCallAssignment(idx, name) {
    if (name) {
      planPostCallData[idx] = name;
      await set(planPostCallRef(selectedDate, idx), name);
    } else {
      delete planPostCallData[idx];
      await remove(planPostCallRef(selectedDate, idx));
    }
  }

  // ── Get assigned providers (from plan room assignments) ──
  function getAssignedProviders() {
    const assigned = new Set();
    const realLocs = locations.filter(l => !isDivider(l));
    realLocs.forEach(loc => {
      const d = planData[roomId(loc)] || {};
      if (d.provider) assigned.add(d.provider);
    });
    noBreakSlots.forEach(slot => {
      const d = planData[roomId(slot)] || {};
      if (d.provider) assigned.add(d.provider);
    });
    return assigned;
  }

  function getUnassignedAvailable() {
    const assigned = getAssignedProviders();
    return availableList.filter(n => !assigned.has(n));
  }

  // ── Load data ──
  async function loadPlanData(dateStr) {
    selectedDate = dateStr;
    planData = {};
    availableList = [];
    planNotes = {};
    planCallData = {};
    planPostCallData = {};

    try {
      const [boardSnap, headerSnap] = await Promise.all([
        get(planBoardRef(dateStr)),
        get(planHeaderRef()),
      ]);

      planHeaderText = headerSnap.val() || "";

      const bval = boardSnap.val() || {};

      // available list
      if (bval._available_) {
        availableList = Object.values(bval._available_).filter(Boolean);
      }

      // room assignments
      Object.entries(bval).forEach(([k, v]) => {
        if (k.startsWith("_")) return;
        if (v && typeof v === "object") planData[k] = v;
      });

      // notes from _hist_ keys
      Object.entries(bval).forEach(([k, v]) => {
        if (k.startsWith("_hist_") && v && v.provider && v.note) {
          planNotes[v.provider] = v.note;
        }
      });

      // call assignments
      if (bval._call_) {
        Object.entries(bval._call_).forEach(([i, n]) => { planCallData[i] = n; });
      }

      // post-call: use plan date's _postcall_ if present; else load from today's _call_
      if (bval._postcall_ && Object.keys(bval._postcall_).length) {
        Object.entries(bval._postcall_).forEach(([i, n]) => { planPostCallData[i] = n; });
      } else {
        // auto-fill from today's call data
        const todaySnap = await get(ref(db, `boards/${deptCode}/${tsDay()}/_call_`));
        const todayCall = todaySnap.val() || {};
        planPostCallData = { ...todayCall };
        // save them to plan date
        const saves = Object.entries(todayCall).map(([i, n]) => set(planPostCallRef(dateStr, i), n));
        if (saves.length) await Promise.all(saves);
      }
    } catch(e) {
      console.warn("Plan load error:", e);
    }
  }

  // ── Render ──
  async function render(dateStr) {
    await loadPlanData(dateStr);
    buildUI();
  }

  // ─── Left column: Working Tomorrow ──────────────────────────────────────────
  function buildLeftColumn(col) {
    col.innerHTML = "";

    const section = el("div", { class: "plan-section" });
    section.appendChild(el("div", { class: "plan-section-title" }, "Working Tomorrow"));

    const listContainer = el("div", {});
    let dragSrc = null;

    function rebuildList() {
      listContainer.innerHTML = "";
      availableList.forEach((name, idx) => {
        const noteObj = planNotes[name] || null;
        const row = el("div", { class: "plan-provider-row" });
        row.setAttribute("draggable", "true");
        row.dataset.idx = idx;

        // Drag handle + name
        const dragHandle = el("span", { class: "drag-handle", style: { fontSize:"14px" } }, "⠿");
        const nameEl = el("span", { class: "plan-provider-name" }, name);

        // Note badge / add note
        let noteEl;
        let editingNote = false;

        function renderNote() {
          if (noteEl) noteEl.remove();
          if (editingNote) {
            const currentNote = planNotes[name] || null;
            let selectedColor = currentNote ? currentNote.color : "blue";
            const noteInput = el("input", { class: "plan-note-input", type:"text", placeholder:"Short note…", maxlength:"15" });
            noteInput.value = currentNote ? currentNote.text : "";
            const NOTE_COLORS = [
              { id:"blue",  cls:"dot-blue"  },
              { id:"amber", cls:"dot-amber" },
              { id:"green", cls:"dot-green" },
              { id:"rose",  cls:"dot-rose"  },
            ];
            const colorRow = el("div", { class: "plan-note-color-row" });
            NOTE_COLORS.forEach(c => {
              const dot = el("div", {
                class: "plan-note-color-dot " + c.cls + (selectedColor === c.id ? " selected" : ""),
                title: c.id,
              });
              dot.addEventListener("mousedown", e => {
                e.preventDefault();
                selectedColor = c.id;
                colorRow.querySelectorAll(".plan-note-color-dot").forEach(d => d.classList.remove("selected"));
                dot.classList.add("selected");
              });
              colorRow.appendChild(dot);
            });
            const saveNote = async () => {
              const val = noteInput.value.trim().slice(0, 15);
              const obj = val ? { text: val, color: selectedColor } : null;
              await savePlanNote(name, obj);
              editingNote = false;
              rebuildList();
            };
            noteInput.addEventListener("keydown", e => {
              if (e.key === "Enter") { e.preventDefault(); saveNote(); }
              if (e.key === "Escape") { editingNote = false; rebuildList(); }
            });
            noteInput.addEventListener("blur", () => setTimeout(() => { if (editingNote) saveNote(); }, 200));
            noteEl = el("div", { class: "plan-note-editor" }, noteInput, colorRow);
            row.insertBefore(noteEl, dragHandle.nextSibling);
            setTimeout(() => noteInput.focus(), 20);
          } else if (noteObj) {
            noteEl = el("span", { class: "plan-note-badge note-" + noteObj.color, onClick: () => { editingNote = true; renderNote(); } }, noteObj.text);
            row.insertBefore(noteEl, removeBtn);
          } else {
            noteEl = el("span", { class: "plan-note-add", onClick: () => { editingNote = true; renderNote(); } }, "+ note");
            row.insertBefore(noteEl, removeBtn);
          }
        }

        const removeBtn = el("button", { class: "plan-remove-btn", title: "Remove", onClick: async () => {
          availableList = availableList.filter((_, i) => i !== idx);
          await saveAvailable();
          rebuildList();
          refreshCenterColumn();
        }}, "✕");

        row.appendChild(dragHandle);
        row.appendChild(nameEl);
        row.appendChild(removeBtn);

        // Drag-and-drop reorder
        row.addEventListener("dragstart", e => {
          dragSrc = idx;
          e.dataTransfer.setData("text/plain", "available:" + name);
          e.dataTransfer.effectAllowed = "move";
          setTimeout(() => row.classList.add("dragging"), 0);
        });
        row.addEventListener("dragend", () => {
          row.classList.remove("dragging");
          document.querySelectorAll(".plan-provider-row.drag-over").forEach(r => r.classList.remove("drag-over"));
        });
        row.addEventListener("dragover", e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
          row.classList.add("drag-over");
        });
        row.addEventListener("dragleave", e => {
          if (!row.contains(e.relatedTarget)) row.classList.remove("drag-over");
        });
        row.addEventListener("drop", async e => {
          e.preventDefault();
          row.classList.remove("drag-over");
          const data = e.dataTransfer.getData("text/plain");
          if (data.startsWith("available:") && dragSrc !== null && dragSrc !== idx) {
            const newList = [...availableList];
            const [moved] = newList.splice(dragSrc, 1);
            newList.splice(idx, 0, moved);
            availableList = newList;
            dragSrc = null;
            await saveAvailable();
            rebuildList();
          }
        });

        renderNote();
        listContainer.appendChild(row);
      });

      // Add input row
      const addWrap = buildAvailableAddInput();
      listContainer.appendChild(addWrap);
    }

    section.appendChild(listContainer);
    col.appendChild(section);

    // Also make left col a drop target (unassign provider from room by dropping here)
    section.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
    });
    section.addEventListener("drop", async e => {
      e.preventDefault();
      const data = e.dataTransfer.getData("text/plain");
      if (data.startsWith("room:")) {
        const loc = data.slice(5);
        const rid = roomId(loc);
        const current = planData[rid] || {};
        await savePlanRoom(loc, { ...current, provider: null, supervisor: null });
        refreshCenterColumn();
      }
    });

    rebuildList();
  }

  function buildAvailableAddInput() {
    const wrap = el("div", { class: "plan-add-input-wrap" });
    const input = el("input", {
      class: "plan-add-input",
      type: "text",
      placeholder: "Add provider…",
      autocomplete: "off",
    });
    let dropdown = null;

    function closeDropdown() {
      if (dropdown) { dropdown.remove(); dropdown = null; }
    }

    function showDropdown(query) {
      closeDropdown();
      // Filter out already-in-available providers
      const alreadyIn = new Set(availableList);
      const filtered = roster.filter(e => !alreadyIn.has(e.name) && rosterMatches(e, query));
      if (!filtered.length && !query) return;
      dropdown = el("div", { class: "roster-dropdown" });
      filtered.slice(0, 12).forEach(entry => {
        const opt = el("button", { class: "roster-option", type: "button" }, entry.name);
        opt.addEventListener("mousedown", async ev => {
          ev.preventDefault();
          closeDropdown();
          availableList = [...availableList, entry.name];
          input.value = "";
          await saveAvailable();
          // rebuild left col
          const leftCol = document.querySelector(".plan-col-left");
          if (leftCol) buildLeftColumn(leftCol);
          refreshCenterColumn();
        });
        dropdown.appendChild(opt);
      });
      if (!filtered.length) {
        dropdown.appendChild(el("div", { style: { padding:"8px 12px", fontSize:"12px", color:"#a39688" } }, "No matches in roster."));
      }
      wrap.appendChild(dropdown);
    }

    let highlightedIdx = -1;
    input.addEventListener("focus", () => showDropdown(input.value));
    input.addEventListener("input", () => showDropdown(input.value));
    input.addEventListener("blur", () => setTimeout(() => { closeDropdown(); }, 150));
    input.addEventListener("keydown", async e => {
      const opts = dropdown ? Array.from(dropdown.querySelectorAll(".roster-option")) : [];
      if (e.key === "ArrowDown") {
        e.preventDefault();
        highlightedIdx = Math.min(highlightedIdx + 1, opts.length - 1);
        opts.forEach((o, i) => o.classList.toggle("highlighted", i === highlightedIdx));
        return;
      }
      if (e.key === "ArrowUp") {
        e.preventDefault();
        highlightedIdx = Math.max(highlightedIdx - 1, 0);
        opts.forEach((o, i) => o.classList.toggle("highlighted", i === highlightedIdx));
        return;
      }
      if (e.key === "Enter" || e.key === "Tab") {
        e.preventDefault();
        let selected = null;
        if (highlightedIdx >= 0 && opts[highlightedIdx]) {
          selected = opts[highlightedIdx].textContent.trim();
        } else if (input.value.trim()) {
          const alreadyIn = new Set(availableList);
          const matches = roster.filter(en => !alreadyIn.has(en.name) && rosterMatches(en, input.value.trim()));
          if (matches.length) selected = matches[0].name;
        }
        if (selected) {
          availableList = [...availableList, selected];
          input.value = "";
          closeDropdown();
          await saveAvailable();
          const leftCol = document.querySelector(".plan-col-left");
          if (leftCol) buildLeftColumn(leftCol);
          refreshCenterColumn();
          setTimeout(() => document.querySelector(".plan-col-left .plan-add-input")?.focus(), 0);
        }
      }
    });

    wrap.appendChild(input);
    return wrap;
  }

  // ─── Center column: Room assignments ────────────────────────────────────────
  function buildCenterColumn(col) {
    col.innerHTML = "";

    // No-break slots section
    if (noBreakSlots.length) {
      const nbSection = el("div", { class: "plan-section" });
      nbSection.appendChild(el("div", { class: "plan-section-title" }, "Core Positions"));
      noBreakSlots.forEach(slot => {
        nbSection.appendChild(buildPlanRoomCard(slot, slot, true));
      });
      col.appendChild(nbSection);
    }

    // Main room sections
    const mainSection = el("div", { class: "plan-section" });
    mainSection.appendChild(el("div", { class: "plan-section-title" }, "Room Assignments"));

    let currentDividerLabel = null;
    locations.forEach(loc => {
      if (isDivider(loc)) {
        // Extract divider name from key
        const divLabel = loc.replace(/^__divider__\d*$/, "").replace(/^__divider__/, "") || "Section";
        const labelEl = el("span", { class: "plan-section-divider-label" }, divLabel || "—");
        mainSection.appendChild(labelEl);
        currentDividerLabel = divLabel;
        return;
      }
      mainSection.appendChild(buildPlanRoomCard(loc, loc, false));
    });

    col.appendChild(mainSection);
  }

  function refreshCenterColumn() {
    const centerCol = document.querySelector(".plan-col-center");
    if (centerCol) buildCenterColumn(centerCol);
  }

  function buildPlanRoomCard(locKey, displayLabel, isNoBreak) {
    const rid = roomId(locKey);
    const roomDat = planData[rid] || {};
    const provider = roomDat.provider || null;
    const supervisor = roomDat.supervisor || null;
    const isEmpty = !!roomDat.empty;

    const card = el("div", {
      class: "plan-room-card" + (isEmpty ? " plan-empty-room" : ""),
    });

    // Make card a drop target
    card.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      card.classList.add("drag-over");
    });
    card.addEventListener("dragleave", e => {
      if (!card.contains(e.relatedTarget)) card.classList.remove("drag-over");
    });
    card.addEventListener("drop", async e => {
      e.preventDefault();
      card.classList.remove("drag-over");
      const data = e.dataTransfer.getData("text/plain");
      if (data.startsWith("available:")) {
        const name = data.slice(10);
        if (!isNoBreak && availableList.includes(name)) {
          availableList = availableList.filter(n => n !== name);
          await saveAvailable();
          const leftCol = document.querySelector(".plan-col-left");
          if (leftCol) buildLeftColumn(leftCol);
        }
        const current = planData[rid] || {};
        await savePlanRoom(locKey, { ...current, provider: name, supervisor: null, empty: false });
        refreshCenterColumn();
      } else if (data.startsWith("room:")) {
        const srcLoc = data.slice(5);
        const srcRid = roomId(srcLoc);
        const srcDat = planData[srcRid] || {};
        const srcProvider = srcDat.provider || null;
        if (!srcProvider || srcLoc === locKey) return;
        // Check if target has a provider (swap)
        const targetProvider = provider;
        if (targetProvider) {
          // Swap
          const srcCurrent = { ...srcDat };
          const targetCurrent = { ...planData[rid] || {} };
          await savePlanRoom(locKey, { ...targetCurrent, provider: srcProvider, supervisor: srcDat.supervisor || null });
          await savePlanRoom(srcLoc, { ...srcCurrent, provider: targetProvider, supervisor: targetCurrent.supervisor || null });
        } else {
          // Move
          await savePlanRoom(locKey, { ...planData[rid] || {}, provider: srcProvider, supervisor: srcDat.supervisor || null, empty: false });
          await savePlanRoom(srcLoc, { ...srcDat, provider: null, supervisor: null });
        }
        refreshCenterColumn();
      }
    });

    // Make card draggable if it has a provider
    if (provider) {
      card.setAttribute("draggable", "true");
      card.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/plain", "room:" + locKey);
        e.dataTransfer.effectAllowed = "move";
        setTimeout(() => card.classList.add("dragging"), 0);
      });
      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
        document.querySelectorAll(".plan-room-card.drag-over").forEach(c => c.classList.remove("drag-over"));
      });
    }

    const row = el("div", { class: "plan-room-row" });

    // Room label
    row.appendChild(el("span", { class: "plan-room-label" }, displayLabel));

    // Provider area
    let editingProvider = false;
    let editingSupervisor = false;
    let editingRoomNote = false;
    const providerArea = el("div", { style: { flex:"1", minWidth:"0", display:"flex", flexDirection:"column" } });

    function renderProviderArea() {
      providerArea.innerHTML = "";
      if (editingProvider) {
        providerArea.appendChild(buildPlanProviderInput());
      } else if (editingRoomNote && provider) {
        // ── Inline note editor for assigned provider ──
        const NOTE_COLORS = [
          { id:"blue",  cls:"dot-blue"  },
          { id:"amber", cls:"dot-amber" },
          { id:"green", cls:"dot-green" },
          { id:"rose",  cls:"dot-rose"  },
        ];
        const currentNote = planNotes[provider] || null;
        let selectedColor = currentNote ? currentNote.color : "blue";
        const noteInput = el("input", { class: "plan-note-input", type:"text", placeholder:"Short note…", maxlength:"15" });
        noteInput.value = currentNote ? currentNote.text : "";
        const colorRow = el("div", { class: "plan-note-color-row" });
        NOTE_COLORS.forEach(c => {
          const dot = el("div", { class: "plan-note-color-dot " + c.cls + (selectedColor === c.id ? " selected" : ""), title: c.id });
          dot.addEventListener("mousedown", e => {
            e.preventDefault();
            selectedColor = c.id;
            colorRow.querySelectorAll(".plan-note-color-dot").forEach(d => d.classList.remove("selected"));
            dot.classList.add("selected");
          });
          colorRow.appendChild(dot);
        });
        const saveRoomNote = async () => {
          const val = noteInput.value.trim().slice(0, 15);
          const obj = val ? { text: val, color: selectedColor } : null;
          await savePlanNote(provider, obj);
          editingRoomNote = false;
          renderProviderArea();
        };
        noteInput.addEventListener("keydown", e => {
          if (e.key === "Enter") { e.preventDefault(); saveRoomNote(); }
          if (e.key === "Escape") { editingRoomNote = false; renderProviderArea(); }
        });
        noteInput.addEventListener("blur", () => setTimeout(() => { if (editingRoomNote) saveRoomNote(); }, 200));
        providerArea.appendChild(el("div", { class: "plan-note-editor" }, noteInput, colorRow));
        setTimeout(() => noteInput.focus(), 20);
      } else {
        const nameRow = el("div", { style: { display:"flex", alignItems:"center", gap:"6px", minWidth:"0" } });
        const btn = el("button", {
          class: "plan-room-provider-btn" + (!provider ? " empty" : ""),
          onClick: () => { editingProvider = true; renderProviderArea(); }
        }, provider || "Assign provider…");
        nameRow.appendChild(btn);
        if (provider) {
          const noteObj = planNotes[provider] || null;
          if (noteObj) {
            nameRow.appendChild(el("span", { class: "plan-note-badge note-" + noteObj.color, onClick: () => { editingRoomNote = true; renderProviderArea(); } }, noteObj.text));
          } else {
            nameRow.appendChild(el("span", { class: "plan-note-add", onClick: () => { editingRoomNote = true; renderProviderArea(); } }, "+ note"));
          }
        }
        providerArea.appendChild(nameRow);

        // Attending row if needed
        const needsSuper = provider && normalizeRosterEntry(roster.find(e => e.name === provider) || provider).role !== "attending";
        if (needsSuper) {
          if (editingSupervisor) {
            providerArea.appendChild(buildPlanAttendingInput());
          } else {
            const supRow = el("div", { class: "plan-attending-row" },
              el("span", { class: "plan-attending-label" }, "Attending"),
              el("button", {
                class: "plan-attending-btn" + (!supervisor ? " empty" : ""),
                onClick: () => { editingSupervisor = true; renderProviderArea(); }
              }, supervisor || "assign attending…")
            );
            providerArea.appendChild(supRow);
          }
        }
      }
    }

    function buildPlanProviderInput() {
      const inputWrap = el("div", { class: "plan-room-input-wrap" });
      const input = el("input", {
        class: "plan-room-input",
        type: "text",
        placeholder: "Search roster…",
        autocomplete: "off",
      });
      let dropdown = null;
      let hiIdx = -1;

      function closeDropdown() { if (dropdown) { dropdown.remove(); dropdown = null; } }

      function showDropdown(query) {
        closeDropdown();
        // Filter to available providers, unassigned elsewhere (or this room's current provider)
        // Core positions (isNoBreak) always use the full roster — providers don't have to be "working tomorrow"
        const assigned = getAssignedProviders();
        assigned.delete(provider || ""); // allow reassigning same room
        const pool = (availableList.length > 0 && !isNoBreak)
          ? roster.filter(e => availableList.includes(e.name) && !assigned.has(e.name))
          : roster.filter(e => !assigned.has(e.name));
        const filtered = query ? pool.filter(e => rosterMatches(e, query)) : pool;
        dropdown = el("div", { class: "roster-dropdown" });

        if (provider) {
          const clearOpt = el("button", { class: "roster-option clear-opt", type: "button" }, "✕ Remove provider");
          clearOpt.addEventListener("mousedown", async ev => {
            ev.preventDefault();
            closeDropdown();
            editingProvider = false;
            const removedName = provider;
            await savePlanRoom(locKey, { ...(planData[rid] || {}), provider: null, supervisor: null });
            if (!isNoBreak && removedName && !availableList.includes(removedName)) {
              availableList = [...availableList, removedName];
              await saveAvailable();
              const leftCol = document.querySelector(".plan-col-left");
              if (leftCol) buildLeftColumn(leftCol);
            }
            refreshCenterColumn();
          });
          dropdown.appendChild(clearOpt);
        }

        filtered.slice(0, 12).forEach(entry => {
          const opt = el("button", { class: "roster-option", type: "button" }, entry.name);
          opt.addEventListener("mousedown", async ev => {
            ev.preventDefault();
            closeDropdown();
            editingProvider = false;
            if (!isNoBreak && availableList.includes(entry.name)) {
              availableList = availableList.filter(n => n !== entry.name);
              await saveAvailable();
              const leftCol = document.querySelector(".plan-col-left");
              if (leftCol) buildLeftColumn(leftCol);
            }
            const current = planData[rid] || {};

      input.addEventListener("keydown", async e => {

        if (e.key === "Escape") { closeDropdown(); editingSupervisor = false; renderProviderArea(); return; }

        if (e.key === "ArrowUp")   { e.preventDefault(); hiIdx=Math.max(hiIdx-1,0); opts.forEach((o,i)=>o.classList.toggle("highlighted",i===hiIdx)); return; }

    const row = el("div", { class: "plan-call-row" });
    row.appendChild(el("span", { class: "plan-call-label" }, position));

    const cellWrap = el("div", { style: { flex:"1", minWidth:"0", position:"relative" } });
    let editing = false;
    let dropdown = null;

    const getData = () => isPostCall ? planPostCallData : planCallData;
    const saveData = isPostCall ? savePlanPostCallAssignment : savePlanCallAssignment;

    function closeDropdown() { if (dropdown) { dropdown.remove(); dropdown = null; } }

    function renderCell() {
      closeDropdown();
      cellWrap.innerHTML = "";
      editing = false;
      const liveProvider = getData()[posIdx] || null;

      const btn = el("button", {
        class: "plan-call-btn" + (!liveProvider ? " empty" : ""),
      }, liveProvider || "—");

      btn.addEventListener("mousedown", e => {
        e.preventDefault();
        editing = true;
        cellWrap.innerHTML = "";
        const inputEl = el("input", {
          class: "plan-room-input",
          type: "text",
          placeholder: "Search…",
          autocomplete: "off",
          style: { fontSize:"12px", padding:"3px 8px", width:"100%" },
        });
        let hiIdx = -1;

        const pool = roster;

        function showDd(query) {
          closeDropdown();
          const matches = query ? pool.filter(en => rosterMatches(en, query)) : pool;
          const dd = el("div", { class: "roster-dropdown", style: { zIndex:"9999" } });
          if (liveProvider) {
            const clearOpt = el("button", { class:"roster-option clear-opt", type:"button" }, "✕ Remove");
            clearOpt.addEventListener("mousedown", async ev => {
              ev.preventDefault(); closeDropdown();
              await saveData(posIdx, null);
              renderCell();
            });
            dd.appendChild(clearOpt);
          }
          matches.slice(0,12).forEach(en => {
            const opt = el("button", { class:"roster-option", type:"button" }, en.name);
            opt.addEventListener("mousedown", async ev => {
              ev.preventDefault(); closeDropdown();
              await saveData(posIdx, en.name);
              renderCell();
            });
            dd.appendChild(opt);
          });
          if (!matches.length && !liveProvider) dd.appendChild(el("div", { style:{ padding:"8px 12px", fontSize:"12px", color:"#a39688" } }, "No matches."));
          document.body.appendChild(dd);
          dropdown = dd;
          requestAnimationFrame(() => {
            const r = inputEl.getBoundingClientRect();
            dd.style.position = "fixed";
            dd.style.top  = (r.bottom + 2) + "px";
            dd.style.left = r.left + "px";
            dd.style.width = r.width + "px";
          });
        }

        inputEl.addEventListener("focus", () => showDd(inputEl.value));
        inputEl.addEventListener("input", () => showDd(inputEl.value));
        inputEl.addEventListener("blur", () => setTimeout(() => { closeDropdown(); renderCell(); }, 150));
        inputEl.addEventListener("keydown", async e => {
          const opts = dropdown ? Array.from(dropdown.querySelectorAll(".roster-option:not(.clear-opt)")) : [];
          if (e.key === "Escape") { closeDropdown(); renderCell(); return; }
          if (e.key === "ArrowDown") { e.preventDefault(); hiIdx=Math.min(hiIdx+1,opts.length-1); opts.forEach((o,i)=>o.classList.toggle("highlighted",i===hiIdx)); return; }
          if (e.key === "ArrowUp")   { e.preventDefault(); hiIdx=Math.max(hiIdx-1,0); opts.forEach((o,i)=>o.classList.toggle("highlighted",i===hiIdx)); return; }
          if (e.key === "Enter" || e.key === "Tab") {
            e.preventDefault();
            let selected = null;
            if (hiIdx>=0&&opts[hiIdx]) selected=opts[hiIdx].textContent.trim();
            else if (inputEl.value.trim()) {
              const m = pool.filter(en => rosterMatches(en, inputEl.value.trim()));
              if (m.length) selected = m[0].name;
            }
            if (selected) { await saveData(posIdx, selected); }
            closeDropdown();
            renderCell();
            // Advance to the next call position in this section
            const section = row.closest(".plan-section");
            if (section) {
              const allRows = Array.from(section.querySelectorAll(".plan-call-row"));
              const nextRow = allRows[allRows.indexOf(row) + 1];
              if (nextRow) setTimeout(() => nextRow.querySelector(".plan-call-btn")?.click(), 30);
            }
          }
        });
        cellWrap.appendChild(inputEl);
        setTimeout(() => inputEl.focus(), 20);
      });

      cellWrap.appendChild(btn);
    }

    renderCell();
    row.appendChild(cellWrap);
    return row;
  }

  function promptOverwriteOrMerge() {
    return new Promise(resolve => {
      const overlay = el("div", { class: "confirm-overlay" },
        el("div", { class: "confirm-box" },
          el("div", { class: "confirm-title" }, "Import from Schedule"),
          el("div", { class: "confirm-msg" }, "Plan Tomorrow already has data. What would you like to do?"),
          el("div", { class: "btn-row", style: { flexDirection: "column", gap: "8px", marginTop: "4px" } },
            el("button", { class: "btn-warn", style: { width: "100%", textAlign: "left", padding: "10px 14px" },
              onClick: () => { overlay.remove(); resolve(false); } }, "Overwrite all existing assignments"),
            el("button", { class: "btn-primary", style: { width: "100%", textAlign: "left", padding: "10px 14px" },
              onClick: () => { overlay.remove(); resolve(true); } }, "Fill empty slots only"),
            el("button", { class: "btn-ghost", style: { width: "100%", textAlign: "left", padding: "10px 14px" },
              onClick: () => { overlay.remove(); resolve(null); } }, "Cancel"),
          ),
        )
      );
      document.body.appendChild(overlay);
    });
  }

  function showResolutionModal(names) {
    return new Promise(resolve => {
      const overlay = el("div", { class: "sched-modal-overlay" });
      const box = el("div", { class: "sched-modal-box" });

      box.appendChild(el("div", { class: "sched-modal-title" }, "Unmatched Names"));
      box.appendChild(el("div", { class: "sched-modal-sub" },
        `${names.length} name${names.length !== 1 ? "s" : ""} from the schedule weren't found in your roster. Choose what to do with each:`));

      const resolutions = {};
      const remembers = {};
      names.forEach(n => { resolutions[n] = ""; remembers[n] = true; });

      names.forEach(name => {
        const row = el("div", { class: "sched-name-row" });
        row.appendChild(el("div", { class: "sched-schedule-name" }, `"${name}"`));

        const sel = el("select", { class: "sched-map-select" });
        sel.appendChild(el("option", { value: "" }, "— choose —"));
        roster.forEach(entry => sel.appendChild(el("option", { value: entry.name }, entry.name)));
        sel.appendChild(el("option", { value: "__add__" }, "➕ Add to roster permanently"));
        sel.appendChild(el("option", { value: "__skip__" }, "✕ Skip (don't import)"));

        const remCb = el("input", { type: "checkbox" });
        remCb.checked = true;
        const remLabel = el("label", { class: "sched-remember", style: { display: "none" } }, remCb, " Remember");

        sel.addEventListener("change", () => {
          resolutions[name] = sel.value;
          const isMapped = sel.value && sel.value !== "__add__" && sel.value !== "__skip__";
          remLabel.style.display = isMapped ? "flex" : "none";
        });
        remCb.addEventListener("change", () => { remembers[name] = remCb.checked; });

        row.appendChild(el("div", { class: "sched-actions" }, sel, remLabel));
        box.appendChild(row);
      });

      const errMsg = el("div", { style: { fontSize: "12px", color: "#dc2626", minHeight: "16px", marginTop: "8px" } });
      box.appendChild(errMsg);
      box.appendChild(el("div", { class: "btn-row", style: { marginTop: "16px" } },
        el("button", { class: "btn-primary", style: { flex: "1", padding: "10px" }, onClick: () => {
          const missing = names.filter(n => !resolutions[n]);
          if (missing.length) {
            errMsg.textContent = `Please choose an action for all ${missing.length} unresolved name${missing.length !== 1 ? "s" : ""}.`;
            return;
          }
          overlay.remove();
          const result = {};
          names.forEach(name => {
            const v = resolutions[name];
            result[name] = {
              rosterName:  v === "__skip__" ? null : v === "__add__" ? name : v,
              remember:    v !== "__add__" && v !== "__skip__" && remembers[name],
              addToRoster: v === "__add__",
            };
          });
          resolve(result);
        }}, "Import"),
        el("button", { class: "btn-ghost", style: { flex: "1" }, onClick: () => { overlay.remove(); resolve(null); } }, "Cancel"),
      ));

      overlay.appendChild(box);
      document.body.appendChild(overlay);
    });
  }

  async function importFromSchedule() {
    try {
    console.log("[import] step 1: reading daily_schedule/" + selectedDate);
    const schedSnap = await get(ref(db, `daily_schedule/${selectedDate}`));
    console.log("[import] step 2: got schedule, val=", schedSnap.val());
    const sched = schedSnap.val();
    if (!sched) { showToast("No schedule found for " + selectedDate + "."); return; }

    const hasData = availableList.length > 0
      || Object.values(planData).some(d => d && (d.provider || d.supervisor))
      || Object.keys(planCallData).length > 0
      || Object.keys(planPostCallData).length > 0;

    let mergeMode = false;
    if (hasData) {
      const choice = await promptOverwriteOrMerge();
      if (choice === null) return;
      mergeMode = choice;
    }

    const roles      = sched.roles      || {};
    const dayShifts  = sched.dayShifts  || {};
    const nightCalls = sched.nightCalls || {};
    const postCall   = sched.postCall   || {};

    const allNames = new Set();
    Object.values(roles).forEach(n               => n && allNames.add(n));
    (dayShifts.tenHourDay    || []).forEach(n    => n && allNames.add(n));
    (dayShifts.twelveHourDay || []).forEach(n    => n && allNames.add(n));
    Object.values(nightCalls).forEach(n          => n && allNames.add(n));
    Object.values(postCall).forEach(n            => n && allNames.add(n));

    console.log("[import] step 3: reading deptAdmin/" + deptCode + "/scheduleMappings");
    const mappingsSnap = await get(ref(db, `deptAdmin/${deptCode}/scheduleMappings`));
    console.log("[import] step 4: got mappings");
    const savedMappings = mappingsSnap.val() || {};

    const resolved = {};
    const needsResolution = [];
    for (const name of allNames) {
      if (roster.find(r => r.name === name)) {
        resolved[name] = name;
      } else {
        const key = name.replace(/[^a-zA-Z0-9]/g, "_");
        if (savedMappings[key]) {
          resolved[name] = savedMappings[key];
        } else {
          needsResolution.push(name);
        }
      }
    }

    if (needsResolution.length) {
      const userRes = await showResolutionModal(needsResolution);
      if (userRes === null) return;

      const mappingWrites = [];
      for (const [schedName, res] of Object.entries(userRes)) {
        resolved[schedName] = res.rosterName;
        if (res.addToRoster && res.rosterName) {
          await saveRosterEntry(res.rosterName);
          roster.push({ name: res.rosterName, role: "attending" });
          roster.sort((a, b) => a.name.localeCompare(b.name));
        }
        if (res.remember && res.rosterName) {
          const key = schedName.replace(/[^a-zA-Z0-9]/g, "_");
          mappingWrites.push(set(ref(db, `deptAdmin/${deptCode}/scheduleMappings/${key}`), res.rosterName));
        }
      }
      if (mappingWrites.length) await Promise.all(mappingWrites);
    }

    console.log("[import] step 5: reading role mappings");
    const roleMappingsSnap = await get(ref(db, `deptAdmin/${deptCode}/scheduleRoleMappings`));
    console.log("[import] step 6: got role mappings");
    const roleMappings = roleMappingsSnap.val() || {};

    await applyScheduleImport(sched, resolved, roleMappings, mergeMode);
    } catch(err) {
      console.error("Import from schedule error:", err);
      showToast("Import error: " + (err.message || String(err)));
    }
  }

  async function applyScheduleImport(sched, resolved, roleMappings, mergeMode) {
    const roles      = sched.roles      || {};
    const dayShifts  = sched.dayShifts  || {};
    const nightCalls = sched.nightCalls || {};
    const postCall   = sched.postCall   || {};
    const nightCallKeys = ["nightOB", "nightOR", "nightTrauma", "nightCall1", "nightCall2"];

    const writes = [];
    const noteWrites = [];
    const coreAssigned = new Set();

    // Core positions (roles → noBreakSlots via roleMappings)
    for (const [roleKey, schedName] of Object.entries(roles)) {
      if (!schedName) continue;
      const rosterName = resolved[schedName];
      if (!rosterName) continue;
      const corePos = roleMappings[roleKey];
      if (!corePos || !noBreakSlots.includes(corePos)) continue;
      const rid = roomId(corePos);
      if (mergeMode && (planData[rid] || {}).provider) continue;
      planData[rid] = { ...(planData[rid] || {}), provider: rosterName };
      writes.push(savePlanRoom(corePos, planData[rid]));
      coreAssigned.add(rosterName);
    }

    // Working Tomorrow list
    const rolePeople  = Object.values(roles).map(n          => n && resolved[n]).filter(Boolean);
    const tenHour     = (dayShifts.tenHourDay    || []).map(n => n && resolved[n]).filter(Boolean);
    const twelveHour  = (dayShifts.twelveHourDay || []).map(n => n && resolved[n]).filter(Boolean);
    const allWorking  = new Set([...rolePeople, ...tenHour, ...twelveHour]);
    coreAssigned.forEach(n => allWorking.delete(n));

    if (mergeMode) {
      const existingSet = new Set(availableList);
      allWorking.forEach(n => { if (!existingSet.has(n)) availableList.push(n); });
    } else {
      availableList = [...allWorking];
    }
    writes.push(saveAvailable());

    // 12-hour notes
    for (const name of twelveHour) {
      if (!mergeMode || !(planNotes[name] || {}).text) {
        noteWrites.push(savePlanNote(name, { text: "7p", color: "blue" }));
      }
    }

    // Night calls
    nightCallKeys.forEach((key, idx) => {
      if (idx >= callPositions.length) return;
      const schedName = nightCalls[key];
      if (!schedName) return;
      const rosterName = resolved[schedName];
      if (!rosterName) return;
      if (mergeMode && planCallData[idx]) return;
      planCallData[idx] = rosterName;
      writes.push(savePlanCallAssignment(idx, rosterName));
    });

    // Post call
    nightCallKeys.forEach((key, idx) => {
      if (idx >= callPositions.length) return;
      const schedName = postCall[key];
      if (!schedName) return;
      const rosterName = resolved[schedName];
      if (!rosterName) return;
      if (mergeMode && planPostCallData[idx]) return;
      planPostCallData[idx] = rosterName;
      writes.push(savePlanPostCallAssignment(idx, rosterName));
    });

    await Promise.all([...writes, ...noteWrites]);

    const leftCol = document.querySelector(".plan-col-left");
    if (leftCol) buildLeftColumn(leftCol);
    refreshCenterColumn();
    refreshRightColumn();
    showToast("Schedule imported ✓");
  }

  // ─── Randomize remaining ─────────────────────────────────────────────────────
  async function randomizeRemaining() {
    const unassigned = getUnassignedAvailable();
    const emptyRooms = locations.filter(l => !isDivider(l) && !(planData[roomId(l)] || {}).provider && !(planData[roomId(l)] || {}).empty);

    if (!unassigned.length || !emptyRooms.length) {
      showToast("Nothing to randomize.");
      return;
    }

    const count = Math.min(unassigned.length, emptyRooms.length);
    const overlay = el("div", { class: "confirm-overlay" },
      el("div", { class: "confirm-box" },
        el("div", { class: "confirm-title" }, "Randomize Remaining"),
        el("div", { class: "confirm-msg" }, `Randomly assign ${count} provider${count !== 1 ? "s" : ""} to ${count} available room${count !== 1 ? "s" : ""}?`),
        el("div", { class: "btn-row" },
          el("button", { class: "btn-primary", style:{ flex:"1", padding:"10px" }, onClick: async () => {
            overlay.remove();
            // Shuffle unassigned
            const shuffled = [...unassigned].sort(() => Math.random() - 0.5);
            const shuffledRooms = [...emptyRooms].sort(() => Math.random() - 0.5);
            const writes = [];
            for (let i = 0; i < count; i++) {
              const loc = shuffledRooms[i];
              const name = shuffled[i];
              const current = planData[roomId(loc)] || {};
              writes.push(savePlanRoom(loc, { ...current, provider: name, supervisor: null, empty: false }));
            }
            await Promise.all(writes);
            // Remove assigned providers from the Working Tomorrow list
            const assignedNames = new Set(shuffled.slice(0, count));
            availableList = availableList.filter(n => !assignedNames.has(n));
            await saveAvailable();
            const leftCol = document.querySelector(".plan-col-left");
            if (leftCol) buildLeftColumn(leftCol);
            refreshCenterColumn();
            showToast(`Assigned ${count} provider${count !== 1 ? "s" : ""}`);
          }}, "Assign"),
          el("button", { class: "btn-ghost", style:{ flex:"1" }, onClick: () => overlay.remove() }, "Cancel"),
        ),
      )
    );
    document.body.appendChild(overlay);
  }

  // ─── Print PDF ───────────────────────────────────────────────────────────────
  function printPlan() {
    // Remove any existing print view
    const existing = document.getElementById("plan-print-view");
    if (existing) existing.remove();

    const dateLabel = formatDateBanner(selectedDate);
    const header = planHeaderText || "Daily OR Assignments";

    // Build left column content
    const leftContent = [];

    // No-break slots box
    if (noBreakSlots.length) {
      const rows = noBreakSlots.map(slot => {
        const d = planData[roomId(slot)] || {};
        return el("div", { class: "print-row" },
          el("div", { class: "print-row-label" }, slot),
          el("div", { class: "print-row-value" }, d.provider || ""),
        );
      });
      leftContent.push(el("div", { class: "print-box" },
        el("div", { class: "print-box-title" }, "Core Positions"),
        ...rows,
      ));
    }

    // Group rooms by section
    let currentSection = "Main";
    let currentRows = [];
    const sections = [];

    function flushSection() {
      if (currentRows.length) {
        sections.push({ title: currentSection, rows: [...currentRows] });
        currentRows = [];
      }
    }

    locations.forEach(loc => {
      if (isDivider(loc)) {
        flushSection();
        currentSection = loc.replace(/^__divider__\d*$/, "").replace(/^__divider__/, "") || "Section";
        return;
      }
      const d = planData[roomId(loc)] || {};
      if (!d.empty) {
        currentRows.push({ loc, provider: d.provider || "", supervisor: d.supervisor || "" });
      }
    });
    flushSection();

    sections.forEach(sec => {
      const rows = sec.rows.map(r => {
        const nameText = r.provider + (r.supervisor ? ` / ${r.supervisor}` : "");
        return el("div", { class: "print-row" },
          el("div", { class: "print-row-label" }, r.loc),
          el("div", { class: "print-row-value" }, nameText),
        );
      });
      leftContent.push(el("div", { class: "print-box" },
        el("div", { class: "print-box-title" }, sec.title),
        ...rows,
      ));
    });

    // Right column content
    const rightContent = [];

    // Post Call box
    if (callPositions.length) {
      const postRows = callPositions.map((pos, i) => el("div", { class: "print-row" },
        el("div", { class: "print-row-label" }, pos.name),
        el("div", { class: "print-row-value" }, planPostCallData[i] || ""),
      ));
      rightContent.push(el("div", { class: "print-box" },
        el("div", { class: "print-box-title" }, "Post Call"),
        ...postRows,
      ));

      // On Call box
      const callRows = callPositions.map((pos, i) => el("div", { class: "print-row" },
        el("div", { class: "print-row-label" }, pos.name),
        el("div", { class: "print-row-value" }, planCallData[i] || ""),
      ));
      rightContent.push(el("div", { class: "print-box" },
        el("div", { class: "print-box-title" }, "On Call"),
        ...callRows,
      ));
    }

    // 12-hour shift box: any provider anywhere in the plan whose note matches /^7\s*p(m)?$/i
    const allPlanProviders = new Set(availableList);
    locations.filter(l => !isDivider(l)).forEach(loc => {
      const d = planData[roomId(loc)] || {};
      if (d.provider) allPlanProviders.add(d.provider);
      if (d.supervisor) allPlanProviders.add(d.supervisor);
    });
    noBreakSlots.forEach(slot => {
      const d = planData[roomId(slot)] || {};
      if (d.provider) allPlanProviders.add(d.provider);
    });
    const twelveHourProviders = [...allPlanProviders].filter(name => {
      const note = planNotes[name];
      return note && /^7\s*p(m)?$/i.test(note.text);
    });
    if (twelveHourProviders.length) {
      const rows = twelveHourProviders.map((name, i) => el("div", { class: "print-row" },
        el("div", { class: "print-row-label" }, String(i + 1)),
        el("div", { class: "print-row-value" }, name),
      ));
      rightContent.push(el("div", { class: "print-box" },
        el("div", { class: "print-box-title" }, "12 Hour Shift"),
        ...rows,
      ));
    }

    const printView = el("div", { id: "plan-print-view" },
      el("div", { class: "print-header" }, header),
      el("div", { class: "print-date" }, dateLabel),
      el("div", { class: "print-body" },
        el("div", { class: "print-left" }, ...leftContent),
        el("div", { class: "print-right" }, ...rightContent),
      ),
    );

    document.body.appendChild(printView);
    window.print();
    // Remove after print dialog closes
    setTimeout(() => { if (printView.parentNode) printView.remove(); }, 3000);
  }

  // ─── Initial render ───────────────────────────────────────────────────────────
  // Show loading state
  app.appendChild(el("div", { style:{ display:"flex", alignItems:"center", justifyContent:"center", minHeight:"50vh", fontSize:"28px" } }, "💨"));
  render(selectedDate);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  const params    = new URLSearchParams(window.location.search);
  const isDisplay = params.has("display");
  const urlCode   = params.get("code");

  // Show a loading state immediately
  document.getElementById("app").innerHTML =
    "<div style='min-height:100vh;display:flex;align-items:center;justify-content:center;'>" +
    "<div style='font-size:32px'>💨</div></div>";

  // Firebase Auth persists the token — onAuthStateChanged fires on every load
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      // Not signed in — check for URL code (display auto-login)
      if (urlCode) {
        // Try admin first, then dept (mirrors tryCode logic)
        try {
          try {
            await signInAs(ADMIN_EMAIL, urlCode);
          } catch {
            await signInAs(deptEmail(urlCode), urlCode);
          }
          // onAuthStateChanged will fire again with the user
          return;
        } catch {
          // Invalid code in URL — fall through to code screen
        }
      }
      window._postLoginDisplay = isDisplay;
      renderCodeScreen();
      return;
    }

    // User is signed in — figure out who
    const email = user.email;

    if (email === ADMIN_EMAIL) {
      // Admin session restored
      session = { isAdmin: true };
      await new Promise(resolve => {
        subscribeToDepartments(resolve);
      });
      renderAdminDeptSelect();
      return;
    }

    // Dept session — derive code from email  (e.g. gaspass@gasbreaker.app → GASPASS)
    const code = email.split("@")[0].toUpperCase();

    // Load departments if not yet loaded
    if (!Object.keys(departments).length) {
      await new Promise(resolve => {
        subscribeToDepartments(resolve);
      });
    }

    const deptName = departments[code];
    if (!deptName) {
      // Dept no longer exists — sign out and show code screen
      await signOut(auth);
      renderCodeScreen();
      return;
    }

    // Guard: if already subscribed with this dept code, don't re-init.
    // Firebase fires onAuthStateChanged on token refresh (~hourly) which
    // would otherwise re-run loadConfig and reset all state.
    if (session && session.deptCode === code && unsubBoard) {
      return; // already running — token refresh, ignore
    }
    session = { deptCode: code, deptName };
    await loadConfig(code);
    if (isDisplay || !isMobile) isDisplayMode = true;
    subscribeToBoard(code);
  });
})();


</script>
