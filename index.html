  // ─── Schedule import ──────────────────────────────────────────────────────────

  function promptOverwriteOrMerge() {
    return new Promise(resolve => {
      const overlay = el("div", { class: "confirm-overlay" },
        el("div", { class: "confirm-box" },
          el("div", { class: "confirm-title" }, "Import from Schedule"),
          el("div", { class: "confirm-msg" }, "Plan Tomorrow already has data. What would you like to do?"),
          el("div", { class: "btn-row", style: { flexDirection: "column", gap: "8px", marginTop: "4px" } },
            el("button", { class: "btn-warn", style: { width: "100%", textAlign: "left", padding: "10px 14px" },
              onClick: () => { overlay.remove(); resolve(false); } }, "Overwrite all existing assignments"),
            el("button", { class: "btn-primary", style: { width: "100%", textAlign: "left", padding: "10px 14px" },
              onClick: () => { overlay.remove(); resolve(true); } }, "Fill empty slots only"),
            el("button", { class: "btn-ghost", style: { width: "100%", textAlign: "left", padding: "10px 14px" },
              onClick: () => { overlay.remove(); resolve(null); } }, "Cancel"),
          ),
        )
      );
      document.body.appendChild(overlay);
    });
  }

  function showResolutionModal(names) {
    return new Promise(resolve => {
      const overlay = el("div", { class: "sched-modal-overlay" });
      const box = el("div", { class: "sched-modal-box" });

      box.appendChild(el("div", { class: "sched-modal-title" }, "Unmatched Names"));
      box.appendChild(el("div", { class: "sched-modal-sub" },
        `${names.length} name${names.length !== 1 ? "s" : ""} from the schedule weren't found in your roster. Choose what to do with each:`));

      const resolutions = {};
      const remembers = {};
      names.forEach(n => { resolutions[n] = ""; remembers[n] = true; });

      names.forEach(name => {
        const row = el("div", { class: "sched-name-row" });
        row.appendChild(el("div", { class: "sched-schedule-name" }, `"${name}"`));

        const sel = el("select", { class: "sched-map-select" });
        sel.appendChild(el("option", { value: "" }, "— choose —"));
        roster.forEach(entry => sel.appendChild(el("option", { value: entry.name }, entry.name)));
        sel.appendChild(el("option", { value: "__add__" }, "➕ Add to roster permanently"));
        sel.appendChild(el("option", { value: "__skip__" }, "✕ Skip (don't import)"));

        const remCb = el("input", { type: "checkbox" });
        remCb.checked = true;
        const remLabel = el("label", { class: "sched-remember", style: { display: "none" } }, remCb, " Remember");

        sel.addEventListener("change", () => {
          resolutions[name] = sel.value;
          const isMapped = sel.value && sel.value !== "__add__" && sel.value !== "__skip__";
          remLabel.style.display = isMapped ? "flex" : "none";
        });
        remCb.addEventListener("change", () => { remembers[name] = remCb.checked; });

        row.appendChild(el("div", { class: "sched-actions" }, sel, remLabel));
        box.appendChild(row);
      });

      const errMsg = el("div", { style: { fontSize: "12px", color: "#dc2626", minHeight: "16px", marginTop: "8px" } });
      box.appendChild(errMsg);
      box.appendChild(el("div", { class: "btn-row", style: { marginTop: "16px" } },
        el("button", { class: "btn-primary", style: { flex: "1", padding: "10px" }, onClick: () => {
          const missing = names.filter(n => !resolutions[n]);
          if (missing.length) {
            errMsg.textContent = `Please choose an action for all ${missing.length} unresolved name${missing.length !== 1 ? "s" : ""}.`;
            return;
          }
          overlay.remove();
          const result = {};
          names.forEach(name => {
            const v = resolutions[name];
            result[name] = {
              rosterName:  v === "__skip__" ? null : v === "__add__" ? name : v,
              remember:    v !== "__add__" && v !== "__skip__" && remembers[name],
              addToRoster: v === "__add__",
            };
          });
          resolve(result);
        }}, "Import"),
        el("button", { class: "btn-ghost", style: { flex: "1" }, onClick: () => { overlay.remove(); resolve(null); } }, "Cancel"),
      ));

      overlay.appendChild(box);
      document.body.appendChild(overlay);
    });
  }

  async function importFromSchedule() {
    try {
    const schedSnap = await get(ref(db, `daily_schedule/${selectedDate}`));
    const sched = schedSnap.val();
    if (!sched) { showToast("No schedule found for " + selectedDate + "."); return; }

    const hasData = availableList.length > 0
      || Object.values(planData).some(d => d && (d.provider || d.supervisor))
      || Object.keys(planCallData).length > 0
      || Object.keys(planPostCallData).length > 0;

    let mergeMode = false;
    if (hasData) {
      const choice = await promptOverwriteOrMerge();
      if (choice === null) return;
      mergeMode = choice;
    }

    const roles      = sched.roles      || {};
    const dayShifts  = sched.dayShifts  || {};
    const nightCalls = sched.nightCalls || {};
    const postCall   = sched.postCall   || {};

    const allNames = new Set();
    Object.values(roles).forEach(n               => n && allNames.add(n));
    (dayShifts.tenHourDay    || []).forEach(n    => n && allNames.add(n));
    (dayShifts.twelveHourDay || []).forEach(n    => n && allNames.add(n));
    Object.values(nightCalls).forEach(n          => n && allNames.add(n));
    Object.values(postCall).forEach(n            => n && allNames.add(n));

    const mappingsSnap = await get(ref(db, `deptAdmin/${deptCode}/scheduleMappings`));
    const savedMappings = mappingsSnap.val() || {};

    const resolved = {};
    const needsResolution = [];
    for (const name of allNames) {
      if (roster.find(r => r.name === name)) {
        resolved[name] = name;
      } else {
        const key = name.replace(/[^a-zA-Z0-9]/g, "_");
        if (savedMappings[key]) {
          resolved[name] = savedMappings[key];
        } else {
          needsResolution.push(name);
        }
      }
    }

    if (needsResolution.length) {
      const userRes = await showResolutionModal(needsResolution);
      if (userRes === null) return;

      const mappingWrites = [];
      for (const [schedName, res] of Object.entries(userRes)) {
        resolved[schedName] = res.rosterName;
        if (res.addToRoster && res.rosterName) {
          await saveRosterEntry(res.rosterName);
          roster.push({ name: res.rosterName, role: "attending" });
          roster.sort((a, b) => a.name.localeCompare(b.name));
        }
        if (res.remember && res.rosterName) {
          const key = schedName.replace(/[^a-zA-Z0-9]/g, "_");
          mappingWrites.push(set(ref(db, `deptAdmin/${deptCode}/scheduleMappings/${key}`), res.rosterName));
        }
      }
      if (mappingWrites.length) await Promise.all(mappingWrites);
    }

    const roleMappingsSnap = await get(ref(db, `deptAdmin/${deptCode}/scheduleRoleMappings`));
    const roleMappings = roleMappingsSnap.val() || {};

    await applyScheduleImport(sched, resolved, roleMappings, mergeMode);
    } catch(err) {
      console.error("Import from schedule error:", err);
      showToast("Import error: " + (err.message || String(err)));
    }
  }

  async function applyScheduleImport(sched, resolved, roleMappings, mergeMode) {
    const roles      = sched.roles      || {};
    const dayShifts  = sched.dayShifts  || {};
    const nightCalls = sched.nightCalls || {};
    const postCall   = sched.postCall   || {};
    const nightCallKeys = ["nightOB", "nightOR", "nightTrauma", "nightCall1", "nightCall2"];

    const writes = [];
    const noteWrites = [];
    const coreAssigned = new Set();

    // Core positions (roles → noBreakSlots via roleMappings)
    for (const [roleKey, schedName] of Object.entries(roles)) {
      if (!schedName) continue;
      const rosterName = resolved[schedName];
      if (!rosterName) continue;
      const corePos = roleMappings[roleKey];
      if (!corePos || !noBreakSlots.includes(corePos)) continue;
      // Core positions are stored/read under the "nb_" + slot key everywhere in Plan
      // Tomorrow (buildPlanRoomCard, getAssignedProviders, print, email). The import must
      // use the same key or the assignment lands on a phantom room and never displays.
      const coreLocKey = "nb_" + corePos;
      const rid = roomId(coreLocKey);
      if (mergeMode && (planData[rid] || {}).provider) continue;
      planData[rid] = { ...(planData[rid] || {}), provider: rosterName };
      writes.push(savePlanRoom(coreLocKey, planData[rid]));
      coreAssigned.add(rosterName);
    }

    // Working Tomorrow list
    const rolePeople  = Object.values(roles).map(n          => n && resolved[n]).filter(Boolean);
    const tenHour     = (dayShifts.tenHourDay    || []).map(n => n && resolved[n]).filter(Boolean);
    const twelveHour  = (dayShifts.twelveHourDay || []).map(n => n && resolved[n]).filter(Boolean);
    const allWorking  = new Set([...rolePeople, ...tenHour, ...twelveHour]);
    coreAssigned.forEach(n => allWorking.delete(n));

    if (mergeMode) {
      const existingSet = new Set(availableList);
      allWorking.forEach(n => { if (!existingSet.has(n)) availableList.push(n); });
    } else {
      availableList = [...allWorking];
    }
    writes.push(saveAvailable());

    // 12-hour late flag
    for (const name of twelveHour) {
      if (!mergeMode || !planLate[name]) {
        noteWrites.push(savePlanLate(name, true));
      }
    }

    // Night calls
    nightCallKeys.forEach((key, idx) => {
      if (idx >= callPositions.length) return;
      const schedName = nightCalls[key];
      if (!schedName) return;
      const rosterName = resolved[schedName];
      if (!rosterName) return;
      if (mergeMode && planCallData[idx]) return;
      planCallData[idx] = rosterName;
      writes.push(savePlanCallAssignment(idx, rosterName));
    });

    // Post call
    nightCallKeys.forEach((key, idx) => {
      if (idx >= callPositions.length) return;
      const schedName = postCall[key];
      if (!schedName) return;
      const rosterName = resolved[schedName];
      if (!rosterName) return;
      if (mergeMode && planPostCallData[idx]) return;
      planPostCallData[idx] = rosterName;
      writes.push(savePlanPostCallAssignment(idx, rosterName));
    });

    await Promise.all([...writes, ...noteWrites]);

    const leftCol = document.querySelector(".plan-col-left");
    if (leftCol) buildLeftColumn(leftCol);
    refreshCenterColumn();
    refreshRightColumn();
    showToast("Schedule imported ✓");
  }

  // ─── Randomize remaining ─────────────────────────────────────────────────────
  async function clearSchedule() {
    const occupied = locations.filter(l => !isDivider(l) && (planData[roomId(l)] || {}).provider);
    if (!occupied.length) { showToast("No room assignments to clear."); return; }
    const n = occupied.length;
    const overlay = el("div", { class: "confirm-overlay" },
      el("div", { class: "confirm-box" },
        el("div", { class: "confirm-title" }, "Clear Schedule"),
        el("div", { class: "confirm-msg" }, `Move ${n} provider${n !== 1 ? "s" : ""} from their room assignments back to Working Tomorrow? Core positions and call assignments are not affected.`),
        el("div", { class: "btn-row" },
          el("button", { class: "btn-primary", style:{ flex:"1", padding:"10px" }, onClick: async () => {
            overlay.remove();
            const writes = [];
            occupied.forEach(loc => {
              const current = planData[roomId(loc)] || {};
              const name = current.provider;
              if (name && !availableList.includes(name)) availableList.push(name);
              writes.push(savePlanRoom(loc, { ...current, provider: null, supervisor: null }));
            });
            await Promise.all(writes);
            await saveAvailable();
            const leftCol = document.querySelector(".plan-col-left");
            if (leftCol) buildLeftColumn(leftCol);
            refreshCenterColumn();
            showToast(`Cleared ${n} room assignment${n !== 1 ? "s" : ""}`);
          }}, "Clear"),
          el("button", { class: "btn-ghost", style:{ flex:"1" }, onClick: () => overlay.remove() }, "Cancel"),
        ),
      )
    );
    document.body.appendChild(overlay);
  }

  async function randomizeRemaining() {
    const unassigned = getUnassignedAvailable();
    const emptyRooms = locations.filter(l => !isDivider(l) && !(planData[roomId(l)] || {}).provider && !(planData[roomId(l)] || {}).empty);

    if (!unassigned.length) {
      showToast("Nothing to randomize — all Working Tomorrow providers are already in rooms.");
      return;
    }
    if (!emptyRooms.length) {
      showToast("Nothing to randomize — no unoccupied rooms available.");
      return;
    }

    // Tracked rooms are filled first and by rotation (the provider who has gone the
    // longest since being in that room — or never), not randomly. Untracked rooms are
    // then filled randomly from whoever is left.
    const trackedEmpty   = emptyRooms.filter(l => trackedRooms.includes(l));
    const untrackedEmpty = emptyRooms.filter(l => !trackedRooms.includes(l));

    const count = Math.min(unassigned.length, emptyRooms.length);
    const trackedNote = trackedEmpty.length
      ? ` ${Math.min(trackedEmpty.length, unassigned.length)} tracked room${trackedEmpty.length !== 1 ? "s" : ""} filled by rotation (longest out of that room first); the rest at random.`
      : "";

    const overlay = el("div", { class: "confirm-overlay" },
      el("div", { class: "confirm-box" },
        el("div", { class: "confirm-title" }, "Randomize Remaining"),
        el("div", { class: "confirm-msg" }, `Assign ${count} provider${count !== 1 ? "s" : ""} to ${count} available room${count !== 1 ? "s" : ""}?` + trackedNote),
        el("div", { class: "btn-row" },
          el("button", { class: "btn-primary", style:{ flex:"1", padding:"10px" }, onClick: async () => {
            overlay.remove();

            // Fetch assignment history for each tracked empty room (rid → { dateKey: name })
            const histByLoc = {};
            await Promise.all(trackedEmpty.map(async loc => {
              const snap = await get(ref(db, `deptAdmin/${deptCode}/roomHistory/${roomId(loc)}`));
              const h = snap.val() || {};
              delete h["_done_"];
              histByLoc[loc] = h;
            }));

            // Most recent day `name` was in this room, in ms. -Infinity = never → top priority.
            const lastInRoom = (history, name) => {
              let best = -Infinity;
              for (const [k, n] of Object.entries(history)) {
                if (n === name) { const t = parseDateKey(k); if (t > best) best = t; }
              }
              return best;
            };

            const pool = [...unassigned];
            const assignments = []; // { loc, name }

            // Tracked rooms first, by longest-since-in-room (random tiebreak among equals)
            for (const loc of trackedEmpty) {
              if (!pool.length) break;
              const history = histByLoc[loc] || {};
              let bestMs = Infinity;
              pool.forEach(name => { const ms = lastInRoom(history, name); if (ms < bestMs) bestMs = ms; });
              const tied = pool.filter(name => lastInRoom(history, name) === bestMs);
              const chosen = tied[Math.floor(Math.random() * tied.length)];
              assignments.push({ loc, name: chosen });
              pool.splice(pool.indexOf(chosen), 1);
            }

            // Untracked rooms: random pairing from whoever's left
            const shuffledRooms = [...untrackedEmpty].sort(() => Math.random() - 0.5);
            const shuffledPool  = [...pool].sort(() => Math.random() - 0.5);
            for (let i = 0; i < shuffledRooms.length && i < shuffledPool.length; i++) {
              assignments.push({ loc: shuffledRooms[i], name: shuffledPool[i] });
            }

            const writes = assignments.map(({ loc, name }) => {
              const current = planData[roomId(loc)] || {};
              return savePlanRoom(loc, { ...current, provider: name, supervisor: null, empty: false });
            });
            await Promise.all(writes);

            const assignedNames = new Set(assignments.map(a => a.name));
            availableList = availableList.filter(n => !assignedNames.has(n));
            await saveAvailable();
            const leftCol = document.querySelector(".plan-col-left");
            if (leftCol) buildLeftColumn(leftCol);
            refreshCenterColumn();
            showToast(`Assigned ${assignments.length} provider${assignments.length !== 1 ? "s" : ""}`);
          }}, "Assign"),
          el("button", { class: "btn-ghost", style:{ flex:"1" }, onClick: () => overlay.remove() }, "Cancel"),
        ),
      )
    );
    document.body.appendChild(overlay);
  }

  // ─── Print PDF ───────────────────────────────────────────────────────────────
  // Working Tomorrow note shown in parentheses next to the provider name on the
  // printed/emailed schedule. Two variants: plain text for the PDF (el() makes safe
  // text nodes) and HTML-escaped for the email body.
  function planNoteSuffix(name) {
    const note = name && planNotes[name];
    return note && note.text ? ` (${note.text})` : "";
  }
  function planNoteSuffixHtml(name) {
    const note = name && planNotes[name];
    if (!note || !note.text) return "";
    const safe = note.text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    return ` (${safe})`;
  }

  // ─── Email Plan ──────────────────────────────────────────────────────────────
  function buildPlanEmailHtml(message) {
    const header    = planHeaderText || "Daily OR Assignments";
    const dateLabel = formatDateBanner(selectedDate);

    const s = {
      wrap:      "font-family:Arial,Helvetica,sans-serif;max-width:620px;margin:0 auto;color:#2d2420;",
      h1:        "font-size:20px;font-weight:700;margin:0 0 2px 0;color:#2d2420;",
      date:      "font-size:13px;color:#7c6c62;margin:0 0 16px 0;",
      msg:       "font-size:14px;line-height:1.6;white-space:pre-wrap;margin:0 0 20px 0;color:#2d2420;",
      hr:        "border:none;border-top:1px solid #e8e0d6;margin:0 0 20px 0;",
      boxWrap:   "margin-bottom:16px;",
      boxTitle:  "font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7c6c62;padding:6px 10px;background:#f5f0ea;border-radius:6px 6px 0 0;margin:0;",
      table:     "width:100%;border-collapse:collapse;border-radius:0 0 6px 6px;overflow:hidden;",
      tdLabel:   "padding:5px 10px;font-size:13px;color:#7c6c62;width:45%;border-bottom:1px solid #f1ede8;",
      tdValue:   "padding:5px 10px;font-size:13px;color:#2d2420;font-weight:600;border-bottom:1px solid #f1ede8;",
    };

    function box(title, rows) {
      if (!rows.length) return "";
      const rowHtml = rows.map(([label, value]) =>
        `<tr><td style="${s.tdLabel}">${label}</td><td style="${s.tdValue}">${value || ""}</td></tr>`
      ).join("");
      return `<div style="${s.boxWrap}"><div style="${s.boxTitle}">${title}</div>
<table style="${s.table}">${rowHtml}</table></div>`;
    }

    // Core Positions
    let coreHtml = "";
    if (noBreakSlots.length) {
      const rows = noBreakSlots.map(slot => {
        const p = (planData[roomId("nb_" + slot)] || {}).provider || "";
        return [slot, p ? p + planNoteSuffixHtml(p) : ""];
      });
      coreHtml = box("Core Positions", rows);
    }

    // OR rooms by section
    let currentSection = "Main";
    let currentRows = [];
    const sections = [];
    function flushSec() { if (currentRows.length) { sections.push({ title: currentSection, rows: [...currentRows] }); currentRows = []; } }
    locations.forEach(loc => {
      if (isDivider(loc)) {
        flushSec();
        currentSection = loc.replace(/^__divider__\d*$/, "").replace(/^__divider__/, "") || "Section";
        return;
      }
      const d = planData[roomId(loc)] || {};
      if (!d.empty) currentRows.push([loc, d.provider ? d.provider + planNoteSuffixHtml(d.provider) + (d.supervisor ? ` / ${d.supervisor}` : "") : ""]);
    });
    flushSec();
    const roomsHtml = sections.map(sec => box(sec.title, sec.rows)).join("");

    // On Call / Post Call
    let callHtml = "";
    if (callPositions.length) {
      const postRows = callPositions.map((p, i) => [p.name, planPostCallData[i] || ""]);
      const callRows = callPositions.map((p, i) => [p.name, planCallData[i] || ""]);
      callHtml = box("Post Call", postRows) + box("On Call", callRows);
    }

    // 12-hour shifts
    const allPlanNames = new Set(availableList);
    locations.filter(l => !isDivider(l)).forEach(loc => {
      const d = planData[roomId(loc)] || {};
      if (d.provider) allPlanNames.add(d.provider);
      if (d.supervisor) allPlanNames.add(d.supervisor);
    });
    noBreakSlots.forEach(slot => { const d = planData[roomId("nb_" + slot)] || {}; if (d.provider) allPlanNames.add(d.provider); });
    const twelveHour = [...allPlanNames].filter(n => planLate[n] || (planNotes[n] && /^7\s*p(m)?$/i.test(planNotes[n].text)));
    const twelveHtml = twelveHour.length ? box("12 Hour Shift", twelveHour.map((n, i) => [String(i + 1), n])) : "";

    const leftHtml  = coreHtml + roomsHtml;
    const rightHtml = callHtml + twelveHtml;
    const safeMsg   = message.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");

    return `<!DOCTYPE html><html><body style="margin:0;padding:16px;background:#fff;">
<div style="${s.wrap}">
  <p style="${s.h1}">${header}</p>
  <p style="${s.date}">${dateLabel}</p>
  <p style="${s.msg}">${safeMsg}</p>
  <hr style="${s.hr}">
  <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
    <tr>
      <td width="50%" valign="top" style="padding-right:10px;">${leftHtml}</td>
      <td width="50%" valign="top" style="padding-left:10px;">${rightHtml}</td>
    </tr>
  </table>
</div></body></html>`;
  }

  async function sendPlan(subject, message, files) {
    const html = buildPlanEmailHtml(message);
    const attachments = [];

    for (const f of (files || [])) {
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(f);
      });
      attachments.push({ filename: f.name, content: base64 });
    }

    const to      = emailConfig.to;
    const fromName = emailConfig.fromName || "";

    const resp = await fetch("/api/send-email", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ to, fromName, subject, html, attachments }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }
    return true;
  }

  function showEmailModal() {
    if (!emailConfig.to) {
      showToast("Set a recipient email in Admin → Email Settings first.");
      return;
    }

    const dateLabel = formatDateBanner(selectedDate);
    const defaultSubject = (emailConfig.defaultSubject || "OR Schedule — {date}").replace("{date}", dateLabel);

    let file1 = null, file2 = null;
    const fileLabel1 = el("span", { style:{ fontSize:"12px", color:"#a39688", fontStyle:"italic" } }, "No file selected");
    const fileLabel2 = el("span", { style:{ fontSize:"12px", color:"#a39688", fontStyle:"italic" } }, "No file selected");

    const subjectInput = el("input", {
      type:"text", class:"plan-header-input",
      value: defaultSubject,
      style: { marginBottom:"10px" },
    });

    const messageArea = el("textarea", {
      style: {
        width:"100%", boxSizing:"border-box", minHeight:"120px", padding:"10px",
        border:"1.5px solid #e8e0d6", borderRadius:"10px", fontSize:"14px",
        fontFamily:"inherit", resize:"vertical", color:"#2d2420", background:"#faf7f4",
      },
      placeholder: "Type your message here…",
    });
    messageArea.value = (emailConfig.defaultBody || "").replace("{date}", dateLabel);

    const fileInput1 = el("input", { type:"file", style:{ display:"none" } });
    fileInput1.addEventListener("change", () => {
      file1 = fileInput1.files[0] || null;
      fileLabel1.textContent = file1 ? file1.name : "No file selected";
    });
    const fileInput2 = el("input", { type:"file", style:{ display:"none" } });
    fileInput2.addEventListener("change", () => {
      file2 = fileInput2.files[0] || null;
      fileLabel2.textContent = file2 ? file2.name : "No file selected";
    });

    const sendBtn = el("button", { class:"btn-primary", style:{ fontSize:"13px" } }, "Send");
    const cancelBtn = el("button", { class:"btn-ghost", style:{ fontSize:"13px" } }, "Cancel");
    const errMsg = el("div", { style:{ fontSize:"12px", color:"#ef4444", marginTop:"6px", minHeight:"16px" } });

    const overlay = el("div", { class:"sched-modal-overlay" },
      el("div", { class:"sched-modal-box" },
        el("div", { class:"sched-modal-title" }, "📧 Email Plan"),
        el("div", { class:"sched-modal-sub" }, `To: ${emailConfig.to}`),
        el("div", { style:{ fontSize:"12px", fontWeight:"700", color:"#7c6c62", marginBottom:"4px" } }, "Subject"),
        subjectInput,
        el("div", { style:{ fontSize:"12px", fontWeight:"700", color:"#7c6c62", marginBottom:"4px" } }, "Message"),
        messageArea,
        el("div", { style:{ marginTop:"10px", display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap" } },
          el("button", {
            class:"btn-ghost", style:{ fontSize:"12px" },
            onClick: () => fileInput1.click(),
          }, "📎 Attachment 1"),
          fileLabel1,
          fileInput1,
        ),
        el("div", { style:{ marginTop:"6px", display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap" } },
          el("button", {
            class:"btn-ghost", style:{ fontSize:"12px" },
            onClick: () => fileInput2.click(),
          }, "📎 Attachment 2"),
          fileLabel2,
          fileInput2,
        ),
        el("div", { style:{ display:"flex", gap:"8px", marginTop:"16px", justifyContent:"flex-end" } },
          cancelBtn,
          sendBtn,
        ),
        errMsg,
      ),
    );

    cancelBtn.addEventListener("click", () => overlay.remove());
    overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });

    sendBtn.addEventListener("click", async () => {
      const subject = subjectInput.value.trim();
      const message = messageArea.value.trim();
      if (!subject) { errMsg.textContent = "Subject is required."; return; }
      if (!message) { errMsg.textContent = "Please enter a message."; return; }
      errMsg.textContent = "";
      sendBtn.disabled = true;
      sendBtn.textContent = "Sending…";
      try {
        await sendPlan(subject, message, [file1, file2].filter(Boolean));
        overlay.remove();
        showToast("Email sent ✓");
      } catch(err) {
        errMsg.textContent = "Failed: " + err.message;
        sendBtn.disabled = false;
        sendBtn.textContent = "Send";
      }
    });

    document.body.appendChild(overlay);
    setTimeout(() => messageArea.focus(), 50);
  }

  function printPlan() {
    // Remove any existing print view
    const existing = document.getElementById("plan-print-view");
    if (existing) existing.remove();

    const dateLabel = formatDateBanner(selectedDate);
    const header = planHeaderText || "Daily OR Assignments";

    // Build left column content
    const leftContent = [];

    // No-break slots box
    if (noBreakSlots.length) {
      const rows = noBreakSlots.map(slot => {
        const d = planData[roomId("nb_" + slot)] || {};
        return el("div", { class: "print-row" },
          el("div", { class: "print-row-label" }, slot),
          el("div", { class: "print-row-value" }, d.provider ? d.provider + planNoteSuffix(d.provider) : ""),
        );
      });
      leftContent.push(el("div", { class: "print-box" },
        el("div", { class: "print-box-title" }, "Core Positions"),
        ...rows,
      ));
    }

    // Group rooms by section
    let currentSection = "Main";
    let currentRows = [];
    const sections = [];

    function flushSection() {
      if (currentRows.length) {
        sections.push({ title: currentSection, rows: [...currentRows] });
        currentRows = [];
      }
    }

    locations.forEach(loc => {
      if (isDivider(loc)) {
        flushSection();
        currentSection = loc.replace(/^__divider__\d*$/, "").replace(/^__divider__/, "") || "Section";
        return;
      }
      const d = planData[roomId(loc)] || {};
      if (!d.empty) {
        currentRows.push({ loc, provider: d.provider || "", supervisor: d.supervisor || "" });
      }
    });
    flushSection();

    sections.forEach(sec => {
      const rows = sec.rows.map(r => {
        const nameText = r.provider + planNoteSuffix(r.provider) + (r.supervisor ? ` / ${r.supervisor}` : "");
        return el("div", { class: "print-row" },
          el("div", { class: "print-row-label" }, r.loc),
          el("div", { class: "print-row-value" }, nameText),
        );
      });
      leftContent.push(el("div", { class: "print-box" },
        el("div", { class: "print-box-title" }, sec.title),
        ...rows,
      ));
    });

    // Right column content
    const rightContent = [];

    // Post Call box
    if (callPositions.length) {
      const postRows = callPositions.map((pos, i) => el("div", { class: "print-row" },
        el("div", { class: "print-row-label" }, pos.name),
        el("div", { class: "print-row-value" }, planPostCallData[i] || ""),
      ));
      rightContent.push(el("div", { class: "print-box" },
        el("div", { class: "print-box-title" }, "Post Call"),
        ...postRows,
      ));

      // On Call box
      const callRows = callPositions.map((pos, i) => el("div", { class: "print-row" },
        el("div", { class: "print-row-label" }, pos.name),
        el("div", { class: "print-row-value" }, planCallData[i] || ""),
      ));
      rightContent.push(el("div", { class: "print-box" },
        el("div", { class: "print-box-title" }, "On Call"),
        ...callRows,
      ));
    }

    // 12-hour shift box: any provider anywhere in the plan whose note matches /^7\s*p(m)?$/i
    const allPlanProviders = new Set(availableList);
    locations.filter(l => !isDivider(l)).forEach(loc => {
      const d = planData[roomId(loc)] || {};
      if (d.provider) allPlanProviders.add(d.provider);
      if (d.supervisor) allPlanProviders.add(d.supervisor);
    });
    noBreakSlots.forEach(slot => {
      const d = planData[roomId("nb_" + slot)] || {};
      if (d.provider) allPlanProviders.add(d.provider);
    });
    const twelveHourProviders = [...allPlanProviders].filter(name =>
      planLate[name] || (planNotes[name] && /^7\s*p(m)?$/i.test(planNotes[name].text))
    );
    if (twelveHourProviders.length) {
      const rows = twelveHourProviders.map((name, i) => el("div", { class: "print-row" },
        el("div", { class: "print-row-label" }, String(i + 1)),
        el("div", { class: "print-row-value" }, name),
      ));
      rightContent.push(el("div", { class: "print-box" },
        el("div", { class: "print-box-title" }, "12 Hour Shift"),
        ...rows,
      ));
    }

    const printView = el("div", { id: "plan-print-view" },
      el("div", { class: "print-header" }, header),
      el("div", { class: "print-date" }, dateLabel),
      el("div", { class: "print-body" },
        el("div", { class: "print-left" }, ...leftContent),
        el("div", { class: "print-right" }, ...rightContent),
      ),
    );

    document.body.appendChild(printView);
    window.print();
    // Remove after print dialog closes
    setTimeout(() => { if (printView.parentNode) printView.remove(); }, 3000);
  }

  // ─── Initial render ───────────────────────────────────────────────────────────
  // Show loading state
  app.appendChild(el("div", { style:{ display:"flex", alignItems:"center", justifyContent:"center", minHeight:"50vh", fontSize:"28px" } }, "💨"));
  render(selectedDate);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  const params    = new URLSearchParams(window.location.search);
  const isDisplay = params.has("display");
  const urlCode   = params.get("code");

  // Show a loading state immediately
  document.getElementById("app").innerHTML =
    "<div style='min-height:100vh;display:flex;align-items:center;justify-content:center;'>" +
    "<div style='font-size:32px'>💨</div></div>";

  // Firebase Auth persists the token — onAuthStateChanged fires on every load
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      // Not signed in — check for URL code (display auto-login)
      if (urlCode) {
        // Try admin first, then dept (mirrors tryCode logic)
        try {
          try {
            await signInAs(ADMIN_EMAIL, urlCode);
          } catch {
            await signInAs(deptEmail(urlCode), urlCode);
          }
          // onAuthStateChanged will fire again with the user
          return;
        } catch {
          // Invalid code in URL — fall through to code screen
        }
      }
      window._postLoginDisplay = isDisplay;
      renderCodeScreen();
      return;
    }

    // User is signed in — figure out who
    const email = user.email;

    if (email === ADMIN_EMAIL) {
      // Admin session restored
      session = { isAdmin: true };
      await new Promise(resolve => {
        subscribeToDepartments(resolve);
      });
      renderAdminDeptSelect();
      return;
    }

    // Dept session — derive code from email  (e.g. gaspass@gasbreaker.app → GASPASS)
    const code = email.split("@")[0].toUpperCase();

    // Load departments if not yet loaded
    if (!Object.keys(departments).length) {
      await new Promise(resolve => {
        subscribeToDepartments(resolve);
      });
    }

    const deptName = departments[code];
    if (!deptName) {
      // Dept no longer exists — sign out and show code screen
      await signOut(auth);
      renderCodeScreen();
      return;
    }

    // Guard: if already subscribed with this dept code, don't re-init.
    // Firebase fires onAuthStateChanged on token refresh (~hourly) which
    // would otherwise re-run loadConfig and reset all state.
    if (session && session.deptCode === code && unsubBoard) {
      return; // already running — token refresh, ignore
    }
    session = { deptCode: code, deptName };
    await loadConfig(code);
    if (isDisplay || !isMobile) isDisplayMode = true;
    subscribeToBoard(code);
  });
})();


</script>
