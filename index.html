// ─── Render: No-break slot card (half-height, name only) ────────────────────
function renderNoBreakCard(slot, isDisplay = false, tabIdx = null) {
  const id       = roomId("nb_" + slot);
  const room     = boardData[id] || {};
  const provider = room.provider || null;

  const card = el("div", { class: "or-card no-break-card" + (isDisplay ? " display-card" : "") + (!provider ? " empty" : "") });
  if (tabIdx !== null) card.setAttribute("data-tab-idx", tabIdx);

  const body = el("div", { class: "card-body" });
  body.appendChild(el("div", { class: "room-label no-break-label" }, slot));
  // No-break slot cards are name-only — note/late badges are not shown here.

  let editingProvider = false;

  function openEdit() {
    if (editingProvider) return;
    editingProvider = true; renderProviderArea();
  }

  function onTab(reverse) {
    if (tabIdx === null || tabIdx === undefined) return;
    const targetBtn = document.querySelector(`[data-tab-idx="${reverse ? tabIdx - 1 : tabIdx + 1}"] .provider-name-btn`);
    if (targetBtn) setTimeout(() => targetBtn.click(), 60);
  }

  const nbLoc = "nb_" + slot;

  function renderProviderArea() {
    const existing = body.querySelector(".provider-name-btn, .provider-input-wrap");
    if (existing) existing.remove();
    // Always read live from boardData so out-of-band updates are reflected when editing opens
    const currentProvider = (boardData[id] || {}).provider || null;
    if (editingProvider) {
      body.appendChild(buildProviderInput(currentProvider, nbLoc, card, () => {
        editingProvider = false; renderProviderArea();
      }, onTab, isDisplay));
    } else {
      const nameBtn = el("button", {
        class: "provider-name-btn" + (!currentProvider ? " empty" : ""),
        onClick: openEdit
      }, currentProvider ? callStatusPrefix(currentProvider) + currentProvider : "Tap to assign");
      if (isDisplay && currentProvider) {
        // Buttons are non-draggable by default — attach drag directly on the button so the
        // user can drag from the provider name without needing to hit the small label area.
        nameBtn.setAttribute("draggable", "true");
        nameBtn.addEventListener("dragstart", e => {
          e.dataTransfer.setData("text/plain", nbLoc);
          e.dataTransfer.effectAllowed = "move";
          setTimeout(() => card.classList.add("dragging"), 0);
        });
        nameBtn.addEventListener("dragend", () => {
          card.classList.remove("dragging");
          document.querySelectorAll(".drag-over").forEach(c => c.classList.remove("drag-over"));
        });
      }
      body.appendChild(nameBtn);
    }
  }
  renderProviderArea();

  if (isDisplay) {
    card.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      card.classList.add("drag-over");
    });
    card.addEventListener("dragleave", e => {
      if (!card.contains(e.relatedTarget)) card.classList.remove("drag-over");
    });
    card.addEventListener("drop", async e => {
      e.preventDefault();
      card.classList.remove("drag-over");
      const srcLoc = e.dataTransfer.getData("text/plain");
      if (!srcLoc || srcLoc === nbLoc) return;
      const srcId = roomId(srcLoc);
      const srcProvider = (boardData[srcId] || {}).provider;
      if (!srcProvider) return;
      if (srcLoc.startsWith("nb_")) {
        // nb → nb: assignProvider skips nb sources, so swap manually. Use a single
        // atomic multi-path update — two separate set() writes fire the board listener
        // twice, and the intermediate snapshot (target not yet written) wipes the
        // optimistic provider off the destination card.
        const tgtId = roomId(nbLoc);
        const tgtProvider = (boardData[tgtId] || {}).provider || null;
        const newSrc = { ...(boardData[srcId] || {}), provider: tgtProvider };
        const newTgt = { ...(boardData[tgtId] || {}), provider: srcProvider };
        boardData[srcId] = newSrc;
        boardData[tgtId] = newTgt;
        if (document.querySelector(".display-outer")) patchDisplay();
        const bPath = `boards/${session.deptCode}/${tsDay()}`;
        await update(ref(db, bPath), { [srcId]: newSrc, [tgtId]: newTgt });
      } else {
        // OR → nb: move (or swap if the slot is occupied) in a single atomic update.
        // assignProvider does this in two sequential writes (clear the OR source, then
        // fill the slot); the board listener runs boardData = snap.val() between them and
        // the intermediate snapshot drops the provider, leaving the slot card un-rebuilt
        // and un-draggable ("stuck").
        const tgtId     = roomId(nbLoc);
        const displaced = (boardData[tgtId] || {}).provider || null; // current slot occupant, if any
        const newTgt = { ...(boardData[tgtId] || {}), provider: srcProvider, breaks: getProviderHistory(srcProvider), hold:false, holdAt:null, holdDuration:null, requesting:false };
        const newSrc = (displaced && displaced !== srcProvider)
          ? { ...(boardData[srcId] || {}), provider: displaced, breaks: getProviderHistory(displaced), hold:false, holdAt:null, holdDuration:null, requesting:false }
          : { ...(boardData[srcId] || {}), provider: null, supervisor: null, breaks: {}, hold:false, holdAt:null, holdDuration:null, requesting:false };
        boardData[srcId] = newSrc;
        boardData[tgtId] = newTgt;
        if (document.querySelector(".display-outer")) patchDisplay();
        const bPath = `boards/${session.deptCode}/${tsDay()}`;
        await update(ref(db, bPath), { [srcId]: newSrc, [tgtId]: newTgt });
      }
    });
    // Dragging from the card background (label area) — nameBtn has its own dragstart listener
    if (provider) {
      card.setAttribute("draggable", "true");
      card.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/plain", nbLoc);
        e.dataTransfer.effectAllowed = "move";
        setTimeout(() => card.classList.add("dragging"), 0);
      });
      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
        document.querySelectorAll(".drag-over").forEach(c => c.classList.remove("drag-over"));
      });
    }
  }

  card.appendChild(el("div", { class: "card-inner" }, body));
  return card;
}

// ─── Render: OR card ─────────────────────────────────────────────────────────
function renderCard(loc, isDisplay = false, tabIdx = null) {
  const id       = roomId(loc);
  const room     = boardData[id] || {};
  const provider = room.provider || null;
  const breaks   = room.breaks   || {};
  const isHold   = !!room.hold;
  const isReq    = !!room.requesting;
  const holdAt   = room.holdAt || null;
  const now      = Date.now();
  const holdDuration = room.holdDuration || HOLD_CLEAR_MS;
  const holdWarnMs   = Math.max(5 * 60 * 1000, holdDuration * 0.25); // warn at 25% remaining or 5 min
  const holdAge  = isHold && holdAt ? now - holdAt : 0;

  // If hold has already expired, treat as not on hold (Firebase will catch up)
  const holdExpired   = isHold && holdAt && holdAge >= holdDuration;
  const effectiveHold = isHold && !holdExpired;
  const effectiveWarn = effectiveHold && (holdDuration - holdAge) <= holdWarnMs;

  // Hold countdown label — shown inside the button itself
  let holdBtnLabel = "Hold";
  if (effectiveHold && holdAt) {
    const remaining = Math.max(0, holdDuration - holdAge);
    const mins = Math.ceil(remaining / 60000);
    holdBtnLabel = (effectiveWarn ? "⚠️ " : "✋ ") + mins + "m";
  }

  let cardClass = "or-card" + (isDisplay ? " display-card" : "");
  if (!provider)                                    cardClass += " empty";
  else if (effectiveHold && effectiveWarn && isReq) cardClass += " hold-warn requesting";
  else if (effectiveHold && effectiveWarn)          cardClass += " hold-warn";
  else if (effectiveHold && isReq)                  cardClass += " hold requesting";
  else if (effectiveHold)                           cardClass += " hold";
  else if (isReq)                                   cardClass += " requesting";

  const card = el("div", { class: cardClass });
  if (tabIdx !== null) card.setAttribute("data-tab-idx", tabIdx);

  // On mobile: show requesting banner. On display: just show green card + name suffix.

  // ── Side buttons ──
  const side = el("div", { class: "card-side" });

  if (provider) {
    // Hold button — first press shows duration picker below all buttons,
    //               second press (when already held) clears the hold.
    //               onClick reads live boardData to avoid stale-closure bug.
    let showingDurationPicker = false;
    const holdBtn = el("button", {
      class: "side-btn" + (effectiveHold ? (effectiveWarn ? " hold-warn" : " hold-on") : ""),
      "data-role": "hold",
      onClick: () => {
        // Read live state — don't trust closure variables which may be stale
        const liveRoom = boardData[roomId(loc)] || {};
        const liveHold = !!liveRoom.hold;
        const liveDur  = liveRoom.holdDuration || HOLD_CLEAR_MS;
        const liveAge  = liveHold && liveRoom.holdAt ? Date.now() - liveRoom.holdAt : 0;
        const liveExpired = liveHold && liveAge >= liveDur;
        const liveEffective = liveHold && !liveExpired;

        if (liveEffective) {
          // Already on hold — clear it
          toggleHold(loc);
        } else if (showingDurationPicker) {
          // Cancel picker — restore request/note buttons
          showingDurationPicker = false;
          holdBtn.textContent = "Hold";
          holdBtn.className = "side-btn";
          durationPicker.style.display = "none";
          if (reqBtn)  reqBtn.style.display  = "";
          if (noteBtn) noteBtn.style.display = "";
        } else {
          // Show duration picker — hide request/note to keep layout clean
          showingDurationPicker = true;
          holdBtn.textContent = "Hold?";
          holdBtn.className = "side-btn hold-on";
          durationPicker.style.display = "flex";
          if (reqBtn)  reqBtn.style.display  = "none";
          if (noteBtn) noteBtn.style.display = "none";
        }
      }
    }, holdBtnLabel);

    // Request button
    const reqBtn = el("button", {
      class: "side-btn" + (isReq ? " request-on" : ""),
      "data-role": "request",
      onClick: () => toggleRequesting(loc)
    }, isReq ? "🔔 Sent" : "Request");

    // Note button — display only
    let noteBtn = null;
    if (isDisplay) {
      noteBtn = el("button", {
        class: "side-btn",
        "data-role": "note",
        onClick: () => openNoteEdit()
      }, "Note");
    }

    // Duration picker — appended LAST so it never sits between main buttons
    const DURATIONS = [
      { label: "10m", ms: 10 * 60 * 1000 },
      { label: "20m", ms: 20 * 60 * 1000 },
      { label: "30m", ms: 30 * 60 * 1000 },
    ];
    const durationPicker = el("div", {
      style: { display: "none", flexDirection: "column", gap: "3px" }
    });
    DURATIONS.forEach(d => {
      const btn = el("button", {
        class: "side-btn",
        style: { fontSize: "0.8em" },
        "data-role": "duration",
        onClick: () => {
          setHold(loc, d.ms);
          durationPicker.style.display = "none";
          showingDurationPicker = false;
          if (reqBtn)  reqBtn.style.display  = "";
          if (noteBtn) noteBtn.style.display = "";
        }
      }, d.label);
      durationPicker.appendChild(btn);
    });

    side.appendChild(holdBtn);
    side.appendChild(reqBtn);
    if (noteBtn) side.appendChild(noteBtn);
    side.appendChild(durationPicker);
  }

  // ── Card body — vertical stack: room → provider → pills ──
  const body = el("div", { class: "card-body" });

  // Room label row — badges stack vertically on right (note on top, requesting below)
  const note = provider ? getProviderNote(provider) : null;
  const late = isDisplay && provider ? getProviderLate(provider) : false;
  const eodStatus = isDisplay ? (getEodTimes()[roomId(loc)] || null) : null;
  const eodBadge = isDisplay && (eodStatus === "ok" || eodStatus === "late")
    ? el("span", { class: "eod-status-badge " + eodStatus }, eodStatus === "ok" ? "✓" : "✗")
    : null;
  if (isDisplay && (note || late || isReq || eodBadge) && provider) {
    const badges = el("div", { class: "display-badges" });
    if (note) badges.appendChild(el("div", { class: "display-note-badge note-" + note.color, style: { cursor:"pointer" }, onClick: () => openNoteEdit() }, note.text));
    if (late) badges.appendChild(el("div", { class: "display-note-badge note-blue", style: { cursor:"pointer" }, onClick: () => openNoteEdit() }, "Late"));
    if (isReq) badges.appendChild(el("div", { class: "display-req-badge" }, "🔔 requesting"));
    body.appendChild(
      el("div", { style: { display:"flex", alignItems:"center", gap:"5px", marginBottom:"0", minWidth:"0" } },
        el("div", { class: "room-label", style: { flex:"1", minWidth:"0", marginBottom:"0" } }, loc),
        eodBadge,
        badges,
      )
    );
  } else if (isDisplay && eodBadge) {
    // Time badge but no other badges — simpler row
    body.appendChild(
      el("div", { style: { display:"flex", alignItems:"center", gap:"4px", marginBottom:"0", minWidth:"0" } },
        el("div", { class: "room-label", style: { flex:"1", minWidth:"0", marginBottom:"0" } }, loc),
        eodBadge,
      )
    );
  } else {
    body.appendChild(el("div", { class: "room-label" }, loc));
  }

  // Note editing (display only) — inline input shown when Note button clicked
  let editingNote = false;
  function openNoteEdit() {
    if (!isDisplay || editingNote) return;
    editingNote = true;
    // Disable card drag while editing so a click-drag selects note text instead of
    // dragging the whole card. Restored when the editor closes.
    card.setAttribute("draggable", "false");
    const existing = body.querySelector(".note-input-wrap");
    if (existing) existing.remove();

    const currentNoteObj = getProviderNote(provider);
    let selectedColor = currentNoteObj ? currentNoteObj.color : "blue";

    const noteInput = el("input", {
      class: "note-input",
      type: "text",
      placeholder: "Short note…",
      maxlength: "15",
    });
    noteInput.value = currentNoteObj ? currentNoteObj.text : "";

    // Color picker dots
    const NOTE_COLORS = [
      { id: "blue",  cls: "dot-blue",  label: "Blue"  },
      { id: "amber", cls: "dot-amber", label: "Amber" },
      { id: "green", cls: "dot-green", label: "Green" },
      { id: "rose",  cls: "dot-rose",  label: "Rose"  },
    ];
    const colorRow = el("div", { class: "note-color-row" });
    NOTE_COLORS.forEach(c => {
      const dot = el("button", {
        class: "note-color-dot " + c.cls + (selectedColor === c.id ? " selected" : ""),
        type: "button",
        title: c.label,
      });
      dot.addEventListener("mousedown", e => {
        e.preventDefault();   // prevent blur on input
        selectedColor = c.id;
        colorRow.querySelectorAll(".note-color-dot").forEach(d => d.classList.remove("selected"));
        dot.classList.add("selected");
      });
      colorRow.appendChild(dot);
    });

    const lateCheck = el("input", { type: "checkbox" });
    lateCheck.checked = getProviderLate(provider);
    const lateRow = el("div", { style: { display:"flex", alignItems:"center", gap:"0.4em", fontSize:"0.95em", fontWeight:"700", color:"#d0c8c0", cursor:"pointer" } },
      lateCheck, " Late"
    );
    lateRow.addEventListener("mousedown", e => e.preventDefault());

    const saveNote = async () => {
      const val = noteInput.value.trim().slice(0, 15);
      await saveProviderNote(provider, val ? { text: val, color: selectedColor } : null);
      await saveProviderLate(provider, lateCheck.checked);
      editingNote = false;
      wrap.remove();
      card.setAttribute("draggable", "true");
    };
    noteInput.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); saveNote(); }
      if (e.key === "Escape") { editingNote = false; wrap.remove(); card.setAttribute("draggable", "true"); }
    });
    noteInput.addEventListener("blur", () => setTimeout(() => {
      if (editingNote) {
        // Save on blur (e.g. clicking away or clicking a color dot then elsewhere)
        // This preserves the selected color even without pressing Enter
        const val = noteInput.value.trim().slice(0, 15);
        const hadNote = !!currentNoteObj;
        if (val || hadNote || lateCheck.checked) {
          saveNote(); // saveNote sets editingNote=false, removes wrap, restores drag
        } else {
          editingNote = false; wrap.remove(); card.setAttribute("draggable", "true");
        }
      }
    }, 200));

    const wrap = el("div", { class: "note-input-wrap" }, noteInput, colorRow, lateRow);
    const roomRow = body.firstChild;
    body.insertBefore(wrap, roomRow.nextSibling);
    setTimeout(() => noteInput.focus(), 20);
  }

  // Provider name / input
  let editingProvider   = false;
  let editingSupervisor = false;

  function openEdit() {
    if (editingProvider) return;
    editingProvider = true; renderProviderArea();
  }

  function onTab(reverse) {
    if (tabIdx === null) return;
    const targetBtn = document.querySelector(`[data-tab-idx="${reverse ? tabIdx - 1 : tabIdx + 1}"] .provider-name-btn`);
    if (targetBtn) setTimeout(() => targetBtn.click(), 60);
  }

  function renderProviderArea() {
    // Remove old supervisor area if present
    const existingSup = body.querySelector(".supervisor-row, .supervisor-input-wrap");
    if (existingSup) existingSup.remove();
    // Remove old provider area if present
    const existing = body.querySelector(".provider-name-btn, .provider-input-wrap");
    if (existing) existing.remove();
    const existingPills = body.querySelector(".pill-row");
    if (existingPills) existingPills.remove();

    if (editingProvider) {
      body.appendChild(buildProviderInput(provider, loc, card, () => {
        editingProvider = false;
        renderProviderArea();
      }, onTab, isDisplay));
      return;
    }

    // ── Supervisor row — shown above provider name when frontliner is non-attending ──
    const supervisor = (boardData[id] || {}).supervisor || null;
    const needsSupervisor = provider && getRosterRole(provider) !== "attending";
    if (needsSupervisor) {
      if (editingSupervisor) {
        body.appendChild(buildSupervisorPicker(supervisor, loc, card, () => {
          editingSupervisor = false;
          renderProviderArea();
        }, isDisplay));
      } else {
        const supRow = el("div", { class: "supervisor-row" },
          el("span", { class: "supervisor-label" }, "Attending"),
          el("button", {
            class: "supervisor-name-btn" + (!supervisor ? " empty" : ""),
            "data-supervisor": supervisor || "",
            "data-role": "supervisor",
            onClick: () => { editingSupervisor = true; renderProviderArea(); }
          }, supervisor || "Tap to assign")
        );
        body.appendChild(supRow);
      }
    }

    // ── Provider name button ──
    const nameLabel = provider
      ? callStatusPrefix(provider) + provider
      : "Tap to assign provider";
    const nameBtn = el("button", {
      class: "provider-name-btn" + (!provider ? " empty" : "") + (isReq && isDisplay ? " requesting-name" : ""),
      onClick: openEdit,
      "data-provider": provider || ""
    }, nameLabel);
    // On mobile, show requesting banner above name
    if (isReq && provider && !isDisplay) {
      body.appendChild(el("div", { class: "requesting-banner" }, "🔔 requesting a break"));
    }
    body.appendChild(nameBtn);

    // Break pills — only if occupied
    if (provider) {
      const pillRow = el("div", { class: "pill-row" });
      BREAKS.forEach(b => {
        const done = !!breaks[b.id];
        const pill = el("button", {
          class: "pill" + (done ? " done" : ""),
          onClick: () => toggleBreak(loc, b.id)
        }, done ? `✓ ${b.label}` : b.label);
        pillRow.appendChild(pill);
      });
      body.appendChild(pillRow);
    }
  }
  renderProviderArea();

  // ── Drag-to-swap (display mode only) ──
  if (isDisplay) {
    // All display cards are drop targets
    card.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      card.classList.add("drag-over");
    });
    card.addEventListener("dragleave", e => {
      if (!card.contains(e.relatedTarget)) card.classList.remove("drag-over");
    });
    card.addEventListener("drop", async e => {
      e.preventDefault();
      card.classList.remove("drag-over");
      const srcLoc = e.dataTransfer.getData("text/plain");
      if (!srcLoc || srcLoc === loc) return;
      const srcId = roomId(srcLoc);
      const srcProvider = (boardData[srcId] || {}).provider;
      if (!srcProvider) return;
      if (srcLoc.startsWith("nb_")) {
        // nb → OR: assignProvider can't rehome the displaced OR occupant into a no-break
        // source (it filters nb_ keys), so it would silently drop them. Do an atomic
        // move/swap: dragged provider into this OR room, any displaced occupant back into
        // the vacated no-break slot.
        const tgtId     = roomId(loc);
        const displaced = (boardData[tgtId] || {}).provider || null;
        const newTgt = { ...(boardData[tgtId] || {}), location: loc, provider: srcProvider, supervisor: null, breaks: getProviderHistory(srcProvider), hold:false, holdAt:null, holdDuration:null, requesting:false };
        const newSrc = (displaced && displaced !== srcProvider)
          ? { ...(boardData[srcId] || {}), provider: displaced }
          : { ...(boardData[srcId] || {}), provider: null };
        boardData[srcId] = newSrc;
        boardData[tgtId] = newTgt;
        if (document.querySelector(".display-outer")) patchDisplay();
        const bPath = `boards/${session.deptCode}/${tsDay()}`;
        await update(ref(db, bPath), { [srcId]: newSrc, [tgtId]: newTgt });
      } else {
        await assignProvider(loc, srcProvider);
      }
      await maybePromptTrackAssignment(loc, srcProvider);
    });
    // Only occupied cards can be dragged
    if (provider) {
      card.setAttribute("draggable", "true");
      card.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/plain", loc);
        e.dataTransfer.effectAllowed = "move";
        setTimeout(() => card.classList.add("dragging"), 0);
      });
      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
        document.querySelectorAll(".drag-over").forEach(c => c.classList.remove("drag-over"));
      });
    }
  }

  card.appendChild(el("div", { class: "card-inner" }, body, side));
  return card;
}

// ─── Request notification (for display mode) ──────────────────────────────────
let shownNotifications    = new Set();
let requestRechimeTimers  = new Map(); // roomId → intervalId for 5-minute rechimes

function checkRequestNotifications() {
  if (!isDisplayMode) return;
  Object.entries(boardData).forEach(([id, room]) => {
    if (room.requesting && room.provider) {
      if (!shownNotifications.has(id)) {
        shownNotifications.add(id);
        showRequestNotification(room.location || id, room.provider);
        // Set up 5-minute rechime interval until request is cleared
        const ivId = setInterval(() => {
          const cur = boardData[id] || {};
          if (cur.requesting && cur.provider) {
            playChime();
          } else {
            clearInterval(requestRechimeTimers.get(id));
            requestRechimeTimers.delete(id);
          }
        }, 5 * 60 * 1000);
        requestRechimeTimers.set(id, ivId);
      }
    }
    if (!room.requesting) {
      shownNotifications.delete(id);
      if (requestRechimeTimers.has(id)) {
        clearInterval(requestRechimeTimers.get(id));
        requestRechimeTimers.delete(id);
      }
    }
  });
}

function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Three gentle rising tones
    [[523.25, 0], [659.25, 0.18], [783.99, 0.36]].forEach(([freq, startTime]) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = "sine";
      osc.frequency.value = freq;
      const t = ctx.currentTime + startTime;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.18, t + 0.06);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
      osc.start(t); osc.stop(t + 0.9);
    });
  } catch(e) { /* audio not available */ }
}

function showRequestNotification(loc, providerName) {
  const DURATION = 15000; // 15 seconds
  playChime();
  const notif = el("div", { class: "request-notification" },
    el("div", { class: "notif-room" }, "🔔 " + loc),
    el("div", { class: "notif-sub"  }, providerName + " is requesting a break"),
    el("div", { class: "notif-timer-bar" }),
    el("button", { class: "notif-dismiss", onClick: () => { clearTimeout(autoTimer); notif.remove(); } }, "Dismiss"),
  );
  document.body.appendChild(notif);

  // Animate the timer bar shrinking
  const bar = notif.querySelector(".notif-timer-bar");
  bar.style.transition = `width ${DURATION}ms linear`;
  setTimeout(() => { bar.style.width = "0%"; }, 50);

  const autoTimer = setTimeout(() => { if (notif.parentNode) notif.remove(); }, DURATION);
}

// ─── Message of the Day ───────────────────────────────────────────────────────
// A full-width line: under the title/date in the phone header (read-only), and as a
// line under the badges on the coordinator display (editable — click to edit).
// Persists in deptAdmin/{code}/motd until someone changes it.
async function saveMotd(text) {
  if (!session?.deptCode) return;
  motd = text;
  await set(ref(db, `deptAdmin/${session.deptCode}/motd`), text || null);
}

function motdDisplayText(editable) {
  if (motd) return "📢 " + motd;
  return editable ? "📢 Message of the day…" : "";
}

function buildMotd(editable) {
  const line = el("div", { class: "motd-line" + (editable ? " motd-editable" : "") });
  line.appendChild(el("span", { class: "motd-text" }, motdDisplayText(editable)));
  if (!editable && !motd) line.style.display = "none";

  if (editable) {
    line.addEventListener("click", () => {
      if (line.querySelector(".motd-input")) return; // already editing
      const input = el("input", { class: "motd-input", type: "text", value: motd, maxlength: "200", placeholder: "Message of the day…" });
      line.innerHTML = "";
      line.appendChild(input);
      input.focus(); input.select();
      let done = false;
      const finish = async (save) => {
        if (done) return; done = true;
        if (save) await saveMotd(input.value.trim());
        line.innerHTML = "";
        line.appendChild(el("span", { class: "motd-text" }, motdDisplayText(true)));
        if (document.querySelector(".display-outer")) layoutDisplay(true); // height may have changed
      };
      input.addEventListener("keydown", e => {
        if (e.key === "Enter")  { e.preventDefault(); finish(true); }
        if (e.key === "Escape") { finish(false); }
      });
      input.addEventListener("blur", () => finish(true));
    });
  }
  return line;
}

// Live-update any rendered MOTD line in place (called from the deptAdmin/motd listener).
function updateMotdDisplay() {
  document.querySelectorAll(".motd-line").forEach(line => {
    if (line.querySelector(".motd-input")) return; // don't clobber an active edit
    const editable = line.classList.contains("motd-editable");
    line.style.display = (!editable && !motd) ? "none" : "";
    const t = line.querySelector(".motd-text");
    if (t) t.textContent = motdDisplayText(editable);
  });
  // On the coordinator display a longer/shorter message changes the layout height
  if (document.querySelector(".display-outer")) layoutDisplay(true);
}

// ─── End-of-Day status chip (coordinator display only) ───────────────────────
function buildEodChip() {
  let panelOpen = false;
  let panel = null;
  let panelMousedown = false;

  const chip = el("div", { class: "chip eod-chip" },
    el("span", { style: { fontSize: "13px" } }, "🕐"),
    el("span", {}, "End of Day"),
  );
  const wrap = el("div", { class: "eod-wrap" }, chip);

  function closePanel() {
    if (panel) { panel.remove(); panel = null; }
    panelOpen = false;
  }

  async function saveEodStatus(rid, status) {
    if (!boardData["_eod_"]) boardData["_eod_"] = {};
    if (status) boardData["_eod_"][rid] = status;
    else delete boardData["_eod_"][rid];
    if (document.querySelector(".display-outer")) patchDisplay();
    await saveEodTime(rid, status || null);
  }

  function buildPanel() {
    const p = el("div", { class: "eod-panel" });
    p.appendChild(el("div", { class: "eod-panel-title" }, "End of Day Status"));

    const occupiedLocs = locations.filter(l => !isDivider(l) && (boardData[roomId(l)] || {}).provider);

    if (!occupiedLocs.length) {
      p.appendChild(el("div", { style: { padding:"10px 14px", fontSize:"12px", color:"#a39688" } }, "No rooms currently assigned."));
    } else {
      p.appendChild(el("div", { class: "eod-col-headers" },
        el("div", { class: "eod-col-header" }, ""),
        el("div", { class: "eod-col-header" }, "On Time"),
        el("div", { class: "eod-col-header" }, "Running Over"),
      ));

      occupiedLocs.forEach(loc => {
        const rid = roomId(loc);
        const room = boardData[rid] || {};
        const status = getEodTimes()[rid] || null;

        const cbOk   = el("input", { class: "eod-cb ok",   type: "checkbox" });
        const cbLate = el("input", { class: "eod-cb late", type: "checkbox" });
        cbOk.checked   = status === "ok";
        cbLate.checked = status === "late";

        cbOk.addEventListener("change", async () => {
          cbLate.checked = false;
          await saveEodStatus(rid, cbOk.checked ? "ok" : null);
        });
        cbLate.addEventListener("change", async () => {
          cbOk.checked = false;
          await saveEodStatus(rid, cbLate.checked ? "late" : null);
        });

        const providerName = room.provider || "";
        const providerNote = providerName ? getProviderNote(providerName) : null;
        const providerLate = providerName ? getProviderLate(providerName) : false;
        p.appendChild(el("div", { class: "eod-row" },
          el("div", { class: "eod-room-label", title: loc + (providerName ? " — " + providerName : "") },
            el("span", { class: "eod-room-text" }, loc + (providerName ? " — " + providerName : "")),
            providerNote ? el("span", { class: "display-note-badge note-" + providerNote.color, style: { fontSize: "0.75em", flexShrink: "0" } }, providerNote.text) : null,
            providerLate ? el("span", { class: "display-note-badge note-blue", style: { fontSize: "0.75em", flexShrink: "0" } }, "Late") : null
          ),
          el("div", { class: "eod-cb-cell" }, cbOk),
          el("div", { class: "eod-cb-cell" }, cbLate),
        ));
      });
    }

    p.addEventListener("mousedown", () => { panelMousedown = true; setTimeout(() => { panelMousedown = false; }, 0); });
    return p;
  }

  chip.addEventListener("click", e => {
    e.stopPropagation();
    if (panelOpen) { closePanel(); return; }
    panelOpen = true;
    panel = buildPanel();
    document.body.appendChild(panel);
    requestAnimationFrame(() => {
      const rect = chip.getBoundingClientRect();
      panel.style.top  = (rect.bottom + 6) + "px";
      const leftEdge = Math.min(rect.right - 280, window.innerWidth - 300);
      panel.style.left = Math.max(4, leftEdge) + "px";
    });
    setTimeout(() => {
      document.addEventListener("click", function outsideClick(ev) {
        if (panelMousedown) return;
        if (panel && panel.contains(ev.target)) return;
        if (wrap.contains(ev.target)) return;
        closePanel();
        document.removeEventListener("click", outsideClick);
      });
    }, 0);
  });

  return wrap;
}

// ─── On-Call chip builder ─────────────────────────────────────────────────────
function buildCallChip() {
  if (!callPositions.length) return null;

  let panelOpen = false;
  let panel = null;
  let panelMousedown = false;

  const chip = el("div", { class: "chip call-chip" },
    el("span", { style: { fontSize: "13px" } }, "📞"),
    el("span", { class: "chip-count" }, "0"),
    el("span", {}, "On Call"),
  );
  const wrap = el("div", { class: "call-panel-wrap" }, chip);

  function refreshChipCount() {
    const n = Object.values(getCallAssignments()).filter(Boolean).length;
    chip.querySelector(".chip-count").textContent = String(n);
    chip.classList.toggle("has-call", n > 0);
  }
  refreshChipCount();

  function closePanel() {
    if (panel) { panel.remove(); panel = null; }
    panelOpen = false;
  }

  // ── Build a provider picker cell (used for both call and post-call columns) ──
  function buildPickerCell(posIdx, getAssignments, saveAssignment, boardKey, isPostCall) {
    const cell = el("div", { class: "call-col", "data-label": isPostCall ? "Post Call Today" : "On Call Tonight" });
    let editing = false;
    let openDd = null;

    function closeDd() { if (openDd) { openDd.remove(); openDd = null; } }

    function renderCell() {
      // Clean up
      closeDd();
      cell.innerHTML = "";
      editing = false;

      const liveProvider = getAssignments()[posIdx] || null;

      if (editing) return; // safety — renderCell sets editing=false above

      const btn = el("button", {
        class: "call-provider-btn" + (!liveProvider ? " empty" : "") + (isPostCall && liveProvider ? " postcall-auto" : ""),
      }, liveProvider || (isPostCall ? "—" : "Tap to assign"));

      btn.addEventListener("mousedown", e => {
        e.preventDefault();
        e.stopPropagation();
        editing = true;
        cell.innerHTML = "";

        const inputWrap = el("div", { class: "call-input-wrap" });
        const input = el("input", {
          class: "call-input",
          type: "text",
          placeholder: "Search…",
          autocomplete: "off",
        });

        let hiIdx = -1;

        function showDd(query) {
          closeDd();
          const matches = query ? roster.filter(n => rosterMatches(n, query)) : roster;
          const dd = el("div", { class: "call-dropdown" });

          if (liveProvider) {
            const clearOpt = el("div", { class: "call-dropdown-opt clear-opt" }, "✕ Remove");
            clearOpt.addEventListener("mousedown", async ev => {
              ev.preventDefault();
              closeDd();
              if (!boardData[boardKey]) boardData[boardKey] = {};
              delete boardData[boardKey][posIdx];
              renderCell();
              if (!isPostCall) refreshChipCount();
              await saveAssignment(posIdx, null);
            });
            dd.appendChild(clearOpt);
          }

          matches.slice(0, 12).forEach(entry => {
            const name = entry.name;
            const opt = el("div", { class: "call-dropdown-opt" }, name);
            opt.addEventListener("mousedown", async ev => {
              ev.preventDefault();
              closeDd();
              if (!boardData[boardKey]) boardData[boardKey] = {};
              boardData[boardKey][posIdx] = name;
              if (!isPostCall) refreshChipCount();
              renderCell();
              await saveAssignment(posIdx, name);
            });
            dd.appendChild(opt);
          });

          if (!matches.length && !liveProvider) {
            dd.appendChild(el("div", { style:{ padding:"8px 12px", fontSize:"12px", color:"#a39688" } }, "No matches."));
          }

          // Position dropdown with fixed coords to escape panel overflow
          document.body.appendChild(dd);
          openDd = dd;
          requestAnimationFrame(() => {
            const r = input.getBoundingClientRect();
            dd.style.top   = (r.bottom + 2) + "px";
            dd.style.left  = r.left + "px";
            dd.style.width = r.width + "px";
          });

          function setHi(i) {
            const opts = Array.from(dd.querySelectorAll(".call-dropdown-opt:not(.clear-opt)"));
            opts.forEach((o, j) => o.classList.toggle("highlighted", j === i));
            hiIdx = i;
            if (opts[i]) opts[i].scrollIntoView({ block:"nearest" });
          }
          input._setHi  = setHi;
          input._getOpts = () => Array.from(dd.querySelectorAll(".call-dropdown-opt:not(.clear-opt)"));
        }

        input.addEventListener("focus", () => showDd(input.value));
        input.addEventListener("input", () => showDd(input.value));
        input.addEventListener("blur", () => setTimeout(() => {
          closeDd();
          renderCell();
        }, 150));
        input.addEventListener("keydown", async e => {
          if (e.key === "Escape") { closeDd(); renderCell(); return; }
          if (e.key === "ArrowDown") {
            e.preventDefault();
            if (!openDd) showDd(input.value);
            const opts = input._getOpts ? input._getOpts() : [];
            hiIdx = Math.min(hiIdx + 1, opts.length - 1);
            if (input._setHi) input._setHi(hiIdx);
            return;
          }
          if (e.key === "ArrowUp") {
            e.preventDefault();
            const opts = input._getOpts ? input._getOpts() : [];
            hiIdx = Math.max(hiIdx - 1, 0);
            if (input._setHi) input._setHi(hiIdx);
            return;
          }
          if (e.key === "Enter" || e.key === "Tab") {
            e.preventDefault();
            const opts = input._getOpts ? input._getOpts() : [];
            let selected = null;
            if (hiIdx >= 0 && opts[hiIdx]) {
              selected = opts[hiIdx].textContent.trim();
            } else if (input.value.trim()) {
              const m = roster.filter(e => rosterMatches(e, input.value.trim()));
              if (m.length) selected = m[0].name;
            }
            if (selected) {
              if (!boardData[boardKey]) boardData[boardKey] = {};
              boardData[boardKey][posIdx] = selected;
              if (!isPostCall) refreshChipCount();
              saveAssignment(posIdx, selected);
            }
            closeDd();
            renderCell();
            if (e.key === "Tab") {
              const panel = cell.closest(".call-panel");
              if (panel) {
                const tonightBtns = Array.from(panel.querySelectorAll(".call-col[data-label='On Call Tonight'] .call-provider-btn"));
                const postcallBtns = Array.from(panel.querySelectorAll(".call-col[data-label='Post Call Today'] .call-provider-btn"));
                const ordered = [...tonightBtns, ...postcallBtns];
                const thisBtn = cell.querySelector(".call-provider-btn");
                const idx = ordered.indexOf(thisBtn);
                const targetBtn = e.shiftKey ? (idx > 0 ? ordered[idx - 1] : null) : (idx >= 0 ? ordered[idx + 1] : null);
                if (targetBtn) setTimeout(() => targetBtn.dispatchEvent(new MouseEvent("mousedown", { bubbles: true, cancelable: true })), 30);
              }
            }
          }
        });

        inputWrap.appendChild(input);
        cell.appendChild(inputWrap);
        setTimeout(() => input.focus(), 20);
      });

      cell.appendChild(btn);
    }

    renderCell();
    return cell;
  }

  // ── Build a single position row ──
  function buildRow(position, posIdx) {
    const row = el("div", { class: "call-row" });
    row.appendChild(el("div", { class: "call-position-label" }, position.name));
    row.appendChild(buildPickerCell(posIdx, getCallAssignments,     saveCallAssignment,     "_call_",     false));
    row.appendChild(buildPickerCell(posIdx, getPostCallAssignments, savePostCallAssignment, "_postcall_", true));
    return row;
  }

  function buildPanel() {
    const p = el("div", { class: "call-panel" });
    p.appendChild(el("div", { class: "call-panel-title" }, "On Call Schedule"));
    // Column headers
    p.appendChild(el("div", { class: "call-col-headers" },
      el("div", { class: "call-col-header-label" }),
      el("div", { class: "call-col-header" }, "On Call Tonight"),
      el("div", { class: "call-col-header" }, "Post Call Today"),
    ));
    callPositions.forEach((position, i) => p.appendChild(buildRow(position, i)));
    p.addEventListener("mousedown", () => { panelMousedown = true; setTimeout(() => { panelMousedown = false; }, 0); });
    return p;
  }

  chip.addEventListener("click", e => {
    e.stopPropagation();
    if (panelOpen) { closePanel(); return; }
    panelOpen = true;
    panel = buildPanel();
    document.body.appendChild(panel);
    requestAnimationFrame(() => {
      const rect = chip.getBoundingClientRect();
      panel.style.top = (rect.bottom + 6) + "px";
      if (window.innerWidth <= 520) {
        panel.style.left  = "8px";
        panel.style.width = (window.innerWidth - 16) + "px";
      } else {
        const leftEdge = Math.min(rect.left, window.innerWidth - 500);
        panel.style.left = Math.max(4, leftEdge) + "px";
      }
    });
    setTimeout(() => {
      document.addEventListener("click", function outsideClick(ev) {
        if (panelMousedown) return;
        if (panel && panel.contains(ev.target)) return;
        if (wrap.contains(ev.target)) return;
        closePanel();
        document.removeEventListener("click", outsideClick);
      });
    }, 0);
  });

  return wrap;
}

// ─── Render: Board ────────────────────────────────────────────────────────────
function renderBoard() {
  if (!session?.deptCode) { renderCodeScreen(); return; }
  document.body.classList.remove("display-mode");
  (window._nbSlotListeners || []).forEach(u => u());
  window._nbSlotListeners = [];
  checkRequestNotifications();

  const visibleLocs = locations;

  // Summary counts
  const realLocs  = locations.filter(l => !isDivider(l));
  const allRooms  = realLocs.map(l => boardData[roomId(l)] || {});
  const occupied  = allRooms.filter(r => r.provider).length;
  const amLeft    = allRooms.filter(r => r.provider && !(r.breaks||{}).am).length;
  const lunchLeft = allRooms.filter(r => r.provider && !(r.breaks||{}).lunch).length;
  const pmLeft    = allRooms.filter(r => r.provider && !(r.breaks||{}).pm).length;

  function makeChip(count, label, bg, color, dot, filterId) {
    const has = count > 0;
    const isActive = filterId !== null && activeFilter === filterId;
    const chip = el("div", {
      class: "chip" + (!filterId ? " filter-rooms" : "") + (isActive ? " active-filter" : ""),
      style: { background: has ? bg : "#f1ede8", color: has ? color : "#c4b8ad" }
    },
      el("span", { class: "chip-dot", style: { background: has ? dot : "#d4ccc6" } }),
      el("span", { class: "chip-count" }, String(count)),
      el("span", {}, label + (isActive ? " ✕" : "")),
    );
    if (filterId) {
      chip.addEventListener("click", () => {
        activeFilter = (activeFilter === filterId) ? null : filterId;
        renderBoard();
      });
    }
    return chip;
  }

  const callChipEl = buildCallChip();
  const chips = [
    makeChip(occupied,  "Rooms Running",  "#fef3c7", "#b45309", "#f59e0b", null),
    makeChip(amLeft,    "AM remaining",   "#fee2e2", "#dc2626", "#f87171", "am"),
    makeChip(lunchLeft, "Lunch remaining","#e0f2fe", "#0369a1", "#38bdf8", "lunch"),
    makeChip(pmLeft,    "PM remaining",   "#ede9fe", "#7c3aed", "#a78bfa", "pm"),
    ...(callChipEl ? [callChipEl] : []),
  ];

  const noBreakCards = noBreakSlots.map((s, i) => renderNoBreakCard(s, false, i));
  let cardTabIdx = noBreakSlots.length;
  const cards = visibleLocs.map(loc => {
    if (isDivider(loc)) {
      return el("div", { class: "board-divider" });
    }
    const card = renderCard(loc, false, cardTabIdx++);
    if (activeFilter) {
      const room = boardData[roomId(loc)] || {};
      if (!room.provider || (room.breaks||{})[activeFilter]) {
        card.classList.add("filter-done"); // dim: empty room OR break already given
      }
    }
    return card;
  });

  const requesting = locations
    .filter(l => !isDivider(l))
    .map(l => ({ loc: l, room: boardData[roomId(l)] || {} }))
    .filter(({ room }) => room.requesting && room.provider);
  const requestBanner = requesting.length
    ? el("div", { class: "global-request-banner" },
        el("div", { class: "grb-title" }, "🔔 Break Requested"),
        ...requesting.map(({ loc, room }) =>
          el("div", { class: "grb-room" }, loc + " — " + room.provider)
        ),
      )
    : null;

  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(el("div", {},
    el("header", { class: "header" },
      el("div", { class: "header-inner" },
        el("div", { class: "logo-wrap" },
          el("div", { class: "logo-icon" }, "💨"),
          el("div", {},
            el("div", { class: "logo-text" }, "Gas Breaker"),
            el("div", { class: "logo-sub"  }, session.deptName + " · " + new Date().toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" })),
          ),
        ),
        el("div", { class: "header-right" },
          el("a", { class: "display-link", href: `?display=1&code=${session.deptCode}`, target: "_blank" }, "Change Display"),
          el("div", { class: "sync-pip" }),
          el("button", { class: "logout-btn", onClick: () => {
            session = null; boardData = {}; locations = [...DEFAULT_LOCATIONS]; noBreakSlots = []; roster = []; trackedRooms = []; defaultEmptyRooms = []; activeFilter = null; providerHistory = {};
            shownNotifications.clear();
            requestRechimeTimers.forEach(id => clearInterval(id)); requestRechimeTimers.clear();
            if (unsubBoard)  { unsubBoard();  unsubBoard  = null; }
            if (unsubConfig) { unsubConfig(); unsubConfig = null; }
            if (unsubMotd)   { unsubMotd();   unsubMotd   = null; }
            motd = "";
            signOut(auth).finally(() => renderCodeScreen());
          }}, "Leave"),
        ),
      ),
      buildMotd(false),
    ),
    el("div", { class: "summary-bar" }, ...chips),
    el("main", { class: "main" },
      requestBanner,
      (noBreakSlots.length && !activeFilter) ? el("div", { class: "no-break-section" },
        ...noBreakCards,
        el("hr", { class: "or-section-divider" }),
      ) : null,
      ...cards,
    ),
  ));

  // Refresh every 30s to update hold timers — but skip if user is actively typing
  clearTimeout(window._holdRefreshTimer);
  window._holdRefreshTimer = setTimeout(() => {
    if (!document.querySelector(".main")) return;
    // Don't interrupt active input — reschedule instead
    const active = document.activeElement;
    if (active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA")) {
      window._holdRefreshTimer = setTimeout(() => { if (document.querySelector(".main")) renderBoard(); }, 30000);
      return;
    }
    renderBoard();
  }, 30000);
}

// ─── Display layout calculator ───────────────────────────────────────────────
// Calculates optimal column count and card size to fill the screen without
// scrolling. Cached so data updates (break toggles etc.) re-apply instantly
// without jitter — only a viewport size change triggers a full re-measure.
let _layoutCache = null;

function layoutDisplay(forceRemeasure = false) {
  const wrap = document.querySelector(".display-wrap");
  if (!wrap) return;

  const children     = Array.from(wrap.children);
  const cardCount    = children.filter(c => !c.classList.contains("display-divider-break")).length;
  const dividerCount = children.filter(c =>  c.classList.contains("display-divider-break")).length;
  if (!cardCount) return;

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // If viewport and card count unchanged, re-apply cached values instantly (no jitter)
  if (!forceRemeasure && _layoutCache
      && _layoutCache.cardCount === cardCount
      && _layoutCache.vw === vw
      && _layoutCache.vh === vh) {
    _applyLayout(_layoutCache);
    return;
  }

  // ── Full measure pass ──
  const summary    = document.querySelector(".summary-bar");
  const outer      = document.querySelector(".display-outer");
  const noBreakRow = document.querySelector(".display-nobreak-row");
  const divider    = document.querySelector(".display-divider");

  const summaryH = summary ? summary.offsetHeight : 0;
  const motdLine = document.querySelector(".display-outer")?.previousElementSibling;
  const motdH    = (motdLine && motdLine.classList.contains("motd-line")) ? motdLine.offsetHeight + 8 : 0;
  const noBreakH = noBreakRow
    ? noBreakRow.offsetHeight + (divider ? divider.offsetHeight : 0) + 12
    : 0;
  const outerPadV = outer
    ? parseFloat(getComputedStyle(outer).paddingTop) + parseFloat(getComputedStyle(outer).paddingBottom)
    : 16;
  const gapPx = parseFloat(getComputedStyle(wrap).gap) || 8;

  // Safety margin: some inter-element margins (summary bar, no-break row/divider) aren't
  // fully counted above, so budget a bit of slack. Keeps the normal fitted layout from
  // tripping the overflow scrollbar; the display still scrolls in genuine overflow cases.
  const availH = vh - summaryH - motdH - 24 - noBreakH - outerPadV;
  const availW = wrap.offsetWidth;

  // ── Compute section sizes from DOM (section dividers force extra grid rows) ──
  // display-divider-break elements span all columns, breaking cards into sections.
  // Each divider consumes a full grid row (height 0) plus one inter-row gap,
  // so the actual row count is higher than ceil(cardCount / cols).
  // `children` and `dividerCount` already computed above.
  const sectionSizes = [];
  let sectionCur = 0;
  children.forEach(c => {
    if (c.classList.contains("display-divider-break")) {
      if (sectionCur > 0) sectionSizes.push(sectionCur);
      sectionCur = 0;
    } else {
      sectionCur++;
    }
  });
  if (sectionCur > 0) sectionSizes.push(sectionCur);
  const numDividerRows = dividerCount;

  // For a given column count, compute the actual number of grid rows
  // (card rows per section, plus one row per divider between sections).
  function computeGridRows(cols) {
    let r = numDividerRows;
    sectionSizes.forEach(n => { r += Math.ceil(n / cols); });
    return r;
  }

  // Divider rows have height 0 but still consume inter-row gaps.
  // Total height = cardRows*cardH + (gridRows-1)*gapPx → solve for cardH:
  function calcCardH(cols) {
    const gridRows = computeGridRows(cols);
    const cardRows = gridRows - numDividerRows;
    return (availH - gapPx * (gridRows - 1)) / cardRows;
  }

  // ── Find the best column count ──
  // We try each column count, compute what card dimensions and font size would
  // result, then check the card is wide enough to hold all content AT THAT
  // font size. This prevents buttons overflowing onto separate lines.
  //
  // Card minimum width breakdown (all at computed fontSize F px):
  //   Card padding L+R        : 2 * 1em        = 2F px
  //   card-inner gap          : 0.6em           = 0.6F px
  //   Side button stack width : widest is hold-warn "26x20 20m" with emoji
  //                             roughly 5.5em at 0.85em font = 5.5 * 0.85 * F
  //                             = 4.7F px  (plus border/padding already in em)
  //   Card body min           : room name needs ~8em minimum
  //                             = 8F px
  //   Total                   : (2 + 0.6 + 4.7 + 8) F = 15.3F px
  //   Safety margin 20%       : 15.3 * 1.2 = ~18.4F
  //
  // So MIN_CARD_W = 18.4 * fontSize, with an absolute floor of 190px.

  const MIN_EM_RATIO = 20.0; // card must be at least this many em-widths wide
  const ABS_MIN_W    = 190;  // absolute px floor for very small font sizes
  const MIN_CARD_H   = 70;   // px minimum useful card height

  let bestCols = 2, bestCardH = 0, bestCardW = 0, bestFontSize = 8;

  const maxCols = Math.min(cardCount, 10);

  // Pass 1: prefer landscape-ish cards (cardH ≤ cardW)
  for (let cols = maxCols; cols >= 2; cols--) {
    const cardW = (availW - gapPx * (cols - 1)) / cols;
    const cardH = calcCardH(cols);
    if (cardH < MIN_CARD_H) continue;
    if (cardH > cardW) continue;
    const fs   = Math.max(8, Math.min(16, cardH * 0.1));
    const minW = Math.max(ABS_MIN_W, MIN_EM_RATIO * fs);
    if (cardW < minW) continue;
    bestCols = cols; bestCardH = cardH; bestCardW = cardW; bestFontSize = fs;
    break;
  }

  // Pass 2: relax aspect ratio — any card that fits height and width minimums
  if (!bestCardH) {
    for (let cols = maxCols; cols >= 2; cols--) {
      const cardW = (availW - gapPx * (cols - 1)) / cols;
      const cardH = calcCardH(cols);
      if (cardH < MIN_CARD_H) continue;
      const fs   = Math.max(8, Math.min(16, cardH * 0.1));
      const minW = Math.max(ABS_MIN_W, MIN_EM_RATIO * fs);
      if (cardW < minW) continue;
      bestCols = cols; bestCardH = cardH; bestCardW = cardW; bestFontSize = fs;
      break;
    }
  }

  // Final fallback: 2 columns, accept whatever size results
  if (!bestCardH) {
    bestCols  = 2;
    bestCardW = (availW - gapPx) / 2;
    bestCardH  = Math.max(MIN_CARD_H, calcCardH(2));
    bestFontSize = Math.max(8, Math.min(16, bestCardH * 0.1));
  }

  const fontSize = bestFontSize;

  _layoutCache = { cardCount, vw, vh, bestCols, bestCardH, bestCardW, fontSize: bestFontSize };
  _applyLayout(_layoutCache);
}

function _applyLayout(cache) {
  const wrap = document.querySelector(".display-wrap");
  if (!wrap) return;
  wrap.style.gridTemplateColumns = `repeat(${cache.bestCols}, 1fr)`;
  wrap.querySelectorAll(".or-card.display-card:not(.no-break-card)").forEach(c => {
    c.style.height = cache.bestCardH + "px";
  });
  document.body.style.fontSize = cache.fontSize + "px";
}

// ─── Patch: Filter chips only (no DOM rebuild) ───────────────────────────────
function patchFilter() {
  const wrap = document.querySelector(".display-wrap");
  if (!wrap) return;

  // Update chip active states using data-filter attribute (reliable, no text parsing)
  const colorMap = { "am": "#f87171", "lunch": "#38bdf8", "pm": "#a78bfa" };
  const labelMap  = { "am": "AM remaining", "lunch": "Lunch remaining", "pm": "PM remaining" };
  document.querySelectorAll(".summary-bar .chip[data-filter]").forEach(chip => {
    const filterId = chip.getAttribute("data-filter");
    const isActive = activeFilter === filterId;
    chip.classList.toggle("active-filter", isActive);
    chip.style.border = "2px solid " + (isActive ? colorMap[filterId] : "transparent");
    const label = chip.querySelector("span:last-child");
    if (label) label.textContent = labelMap[filterId] + (isActive ? " ✕" : "");
  });

  // Update card filter classes
  Array.from(wrap.querySelectorAll(".or-card.display-card:not(.no-break-card)")).forEach(card => {
    card.classList.remove("filter-done", "filter-needs");
    if (!activeFilter) return;
    const lbl = card.querySelector(".room-label");
    if (!lbl) return;
    const loc = lbl.textContent.trim();
    if (isDivider(loc)) return;
    const room = boardData[roomId(loc)] || {};
    if (!room.provider) return;
    if ((room.breaks || {})[activeFilter]) {
      card.classList.add("filter-done");
    } else {
      card.classList.add("filter-needs");
    }
  });

  // Update chip counts to reflect current break state
  const dRealLocs  = locations.filter(l => !isDivider(l));
  const dAllRooms  = dRealLocs.map(l => boardData[roomId(l)] || {});
  const dOccupied  = dAllRooms.filter(r => r.provider).length;
  const dAmLeft    = dAllRooms.filter(r => r.provider && !(r.breaks||{}).am).length;
  const dLunchLeft = dAllRooms.filter(r => r.provider && !(r.breaks||{}).lunch).length;
  const dPmLeft    = dAllRooms.filter(r => r.provider && !(r.breaks||{}).pm).length;
  const countMap   = { "am": dAmLeft, "lunch": dLunchLeft, "pm": dPmLeft };
  const dotMap     = { "am": "#f87171", "lunch": "#38bdf8", "pm": "#a78bfa" };
  const bgMap      = { "am": "#fee2e2", "lunch": "#e0f2fe", "pm": "#ede9fe" };
  const colorMap2  = { "am": "#dc2626", "lunch": "#0369a1", "pm": "#7c3aed" };
  // Update Rooms Running chip count
  const roomsChip = document.querySelector(".summary-bar .chip.filter-rooms .chip-count");
  if (roomsChip) roomsChip.textContent = String(dOccupied);
  // Update on-call chip count (may change when another device updates call assignments)
  const callChip = document.querySelector(".summary-bar .call-chip");
  if (callChip) {
    const callN = Object.values(getCallAssignments()).filter(Boolean).length;
    const callCountEl = callChip.querySelector(".chip-count");
    if (callCountEl) callCountEl.textContent = String(callN);
    callChip.classList.toggle("has-call", callN > 0);
  }
  // Update break chips
  document.querySelectorAll(".summary-bar .chip[data-filter]").forEach(chip => {
    const fid   = chip.getAttribute("data-filter");
    const count = countMap[fid];
    const has   = count > 0;
    const countEl = chip.querySelector(".chip-count");
    const dotEl   = chip.querySelector(".chip-dot");
    if (countEl) countEl.textContent = String(count);
    chip.style.background = has ? bgMap[fid]  : "#2d2825";
    chip.style.color      = has ? colorMap2[fid] : "#4a4240";
    if (dotEl) dotEl.style.background = has ? dotMap[fid] : "#3d3530";
  });
}

// ─── Patch: Coordinator display (data update without full DOM rebuild) ──────────
// Called on Firebase data updates. Updates only the parts of each card that
// can change from a data update: break pills, card state classes, badges,
// hold button label. Does NOT rebuild the DOM — no jitter.
function patchDisplay() {
  const wrap = document.querySelector(".display-wrap");
  if (!wrap) { renderDisplay(); return; } // fallback if display not rendered yet

  locations.forEach(loc => {
    if (isDivider(loc)) return; // dividers have no card to patch
    const id   = roomId(loc);
    const room = boardData[id] || {};
    const provider  = room.provider || null;
    const breaks    = room.breaks   || {};
    const isHold    = !!room.hold;
    const isReq     = !!room.requesting;
    const holdAt       = room.holdAt || null;
    const holdDuration = room.holdDuration || HOLD_CLEAR_MS;
    const holdWarnMs   = Math.max(5 * 60 * 1000, holdDuration * 0.25);
    const now          = Date.now();
    const holdAge      = isHold && holdAt ? now - holdAt : 0;
    const holdExpired   = isHold && holdAt && holdAge >= holdDuration;
    const effectiveHold = isHold && !holdExpired;
    const effectiveWarn = effectiveHold && (holdDuration - holdAge) <= holdWarnMs;

    // Find the card in the DOM by room label text
    const allCards = Array.from(wrap.querySelectorAll(".or-card.display-card:not(.no-break-card)"));
    const card = allCards.find(c => {
      const lbl = c.querySelector(".room-label");
      return lbl && lbl.textContent.trim() === loc;
    });
    if (!card) return;

    // Detect structural change: provider added/removed/swapped, or supervisor changed
    const domNameBtn         = card.querySelector(".provider-name-btn");
    // Provider picker removes the name button from the DOM — use sentinel to avoid null===null match.
    // Supervisor picker leaves the name button in place, so no sentinel needed there.
    const domProviderEditing = !!card.querySelector(".provider-input-wrap");
    const domAnyEditing      = domProviderEditing || !!card.querySelector(".supervisor-input-wrap");
    const domProvider = domProviderEditing
      ? "__editing__"
      : (domNameBtn && !domNameBtn.classList.contains("empty")
          ? (domNameBtn.getAttribute("data-provider") || null) : null);
    const supervisor = room.supervisor || null;
    const domSupBtn  = card.querySelector("[data-role='supervisor']");
    const domSupervisor = domSupBtn ? (domSupBtn.getAttribute("data-supervisor") || null) : null;
    const needsSupervisor = provider && getRosterRole(provider) !== "attending";
    const expectedDomSupervisor = needsSupervisor ? supervisor : null;
    if (domProvider !== provider || (!domAnyEditing && domSupervisor !== expectedDomSupervisor)) {
      // Provider or supervisor changed — rebuild just this card in-place
      const tabIdx = card.getAttribute("data-tab-idx");
      const newCard = renderCard(loc, true, tabIdx !== null ? parseInt(tabIdx) : null);
      // Apply filter classes to new card
      if (activeFilter) {
        const rm = boardData[roomId(loc)] || {};
        if (rm.provider) {
          newCard.classList.add((rm.breaks||{})[activeFilter] ? "filter-done" : "filter-needs");
        }
      }
      card.parentNode.replaceChild(newCard, card);
      return;
    }

    // ── Update card state classes ──
    const stateClasses = ["empty","hold","hold-warn","requesting"];
    stateClasses.forEach(cl => card.classList.remove(cl));
    if (!provider)                                    card.classList.add("empty");
    else if (effectiveHold && effectiveWarn && isReq) { card.classList.add("hold-warn"); card.classList.add("requesting"); }
    else if (effectiveHold && effectiveWarn)          card.classList.add("hold-warn");
    else if (effectiveHold && isReq)                  { card.classList.add("hold"); card.classList.add("requesting"); }
    else if (effectiveHold)                           card.classList.add("hold");
    else if (isReq)                                   card.classList.add("requesting");

    // ── Update break pills ──
    const pillRow = card.querySelector(".pill-row");
    if (pillRow) {
      BREAKS.forEach(b => {
        const pill = Array.from(pillRow.querySelectorAll(".pill")).find(p =>
          p.textContent.replace("✓ ","").trim() === b.label
        );
        if (!pill) return;
        const done = !!breaks[b.id];
        pill.className = "pill" + (done ? " done" : "");
        pill.textContent = done ? "✓ " + b.label : b.label;
      });
    }

    // ── Update hold button (only when hold is active — don't disturb duration picker state) ──
    const holdBtn = card.querySelector(".card-side [data-role='hold']");
    if (holdBtn && provider && effectiveHold) {
      const remaining = Math.max(0, holdDuration - holdAge);
      const mins = Math.ceil(remaining / 60000);
      holdBtn.textContent = (effectiveWarn ? "⚠️ " : "✋ ") + mins + "m";
      holdBtn.className   = "side-btn " + (effectiveWarn ? "hold-warn" : "hold-on");
    } else if (holdBtn && provider && !effectiveHold) {
      // Only reset to "Hold" if it's not currently showing the duration picker
      if (holdBtn.textContent !== "Hold?") {
        holdBtn.textContent = "Hold";
        holdBtn.className   = "side-btn";
      }
    }

    // ── Update request button ──
    const reqBtn = card.querySelector(".card-side [data-role='request']");
    if (reqBtn && provider) {
      reqBtn.className = "side-btn" + (isReq ? " request-on" : "");
      reqBtn.textContent = isReq ? "🔔 Sent" : "Request";
    }

    // ── Update provider name color and call status emoji ──
    const nameBtn = card.querySelector(".provider-name-btn");
    if (nameBtn && provider) {
      if (isReq) nameBtn.classList.add("requesting-name");
      else nameBtn.classList.remove("requesting-name");
      // Sync text — prefix may have changed if call assignments updated
      const expectedText = callStatusPrefix(provider) + provider;
      if (nameBtn.textContent !== expectedText) nameBtn.textContent = expectedText;
    }

    // ── Update badges (note + late + requesting + eod status) in room label row ──
    const note      = provider ? getProviderNote(provider) : null;
    const lateBadge = provider ? getProviderLate(provider) : false;
    const eodStatus = getEodTimes()[id] || null;
    const hasEod    = eodStatus === "ok" || eodStatus === "late";
    const cardBody = card.querySelector(".card-body");
    if (cardBody) {
      // The room label may be either directly in cardBody, or inside a flex wrapper
      // Find or create the flex wrapper that holds room-label + badges
      let labelRow = cardBody.querySelector(".room-label")?.parentElement;

      if (note || lateBadge || isReq || hasEod) {
        // If labelRow is cardBody itself, we need to wrap the room-label in a flex div
        if (labelRow === cardBody) {
          const roomLabelEl = cardBody.querySelector(".room-label");
          const wrapper = el("div", {
            style: { display:"flex", alignItems:"center", gap:"5px", marginBottom:"0", minWidth:"0" }
          });
          roomLabelEl.style.marginBottom = "0";
          roomLabelEl.style.flex = "1";
          roomLabelEl.style.minWidth = "0";
          cardBody.insertBefore(wrapper, roomLabelEl);
          wrapper.appendChild(roomLabelEl);
          labelRow = wrapper;
        }
        // Now labelRow is the flex wrapper — update badges inside it
        let badges = labelRow.querySelector(".display-badges");
        if (!badges) {
          badges = el("div", { class: "display-badges" });
          labelRow.appendChild(badges);
        }
        badges.innerHTML = "";
        if (note) {
          const noteBadge = el("div", { class: "display-note-badge note-" + note.color, style: { cursor:"pointer" } }, note.text);
          noteBadge.addEventListener("click", () => {
            const noteBtn = card.querySelector(".card-side [data-role='note']");
            if (noteBtn) noteBtn.click();
          });
          badges.appendChild(noteBadge);
        }
        if (lateBadge) {
          const lb = el("div", { class: "display-note-badge note-blue", style: { cursor:"pointer" } }, "Late");
          lb.addEventListener("click", () => {
            const noteBtn = card.querySelector(".card-side [data-role='note']");
            if (noteBtn) noteBtn.click();
          });
          badges.appendChild(lb);
        }
        if (isReq) badges.appendChild(el("div", { class: "display-req-badge" }, "🔔 requesting"));
        // Update eod status badge
        const existingEodBadge = labelRow.querySelector(".eod-status-badge");
        if (existingEodBadge) existingEodBadge.remove();
        if (hasEod) {
          const eb = el("span", { class: "eod-status-badge " + eodStatus }, eodStatus === "ok" ? "✓" : "✗");
          labelRow.insertBefore(eb, badges);
        }
      } else {
        // Remove badges and eod badge if present; unwrap labelRow
        const badges = cardBody.querySelector(".display-badges");
        if (badges) badges.remove();
        const eodBadgeEl = cardBody.querySelector(".eod-status-badge");
        if (eodBadgeEl) eodBadgeEl.remove();
        // If labelRow is a wrapper (not cardBody), unwrap the room-label back
        if (labelRow && labelRow !== cardBody && !labelRow.querySelector(".display-badges")) {
          const roomLabelEl = labelRow.querySelector(".room-label");
          if (roomLabelEl) {
            roomLabelEl.style.marginBottom = "";
            roomLabelEl.style.flex = "";
            roomLabelEl.style.minWidth = "";
            cardBody.insertBefore(roomLabelEl, labelRow);
            labelRow.remove();
          }
        }
      }
    }
  });

  // ── Patch no-break slot cards ──
  // Rebuild the card whenever the provider identity changes. Rebuilding (rather than
  // mutating text in place) keeps the draggable attribute and drag listeners in sync —
  // a card that gains a provider via drag must become a draggable source immediately.
  if (noBreakSlots.length > 0) {
    const nbRow = document.querySelector(".display-nobreak-row");
    if (!nbRow) { renderDisplay(); return; }
    noBreakSlots.forEach(slot => {
      const id       = roomId("nb_" + slot);
      const provider = (boardData[id] || {}).provider || null;
      const existingCards = Array.from(nbRow.querySelectorAll(".or-card.no-break-card"));
      const existing = existingCards.find(c => {
        const lbl = c.querySelector(".no-break-label");
        return lbl && lbl.textContent.trim() === slot;
      });
      if (!existing || existing.querySelector(".provider-input-wrap")) return;
      const nameBtn = existing.querySelector(".provider-name-btn");
      if (!nameBtn) return;

      // Provider currently shown in the DOM (strip call/postcall emoji prefix)
      const domProvider = nameBtn.classList.contains("empty")
        ? null
        : nameBtn.textContent.replace(/^[📞🌙] ?/, "");
      if (domProvider !== provider) {
        const tabIdx = existing.getAttribute("data-tab-idx");
        const newCard = renderNoBreakCard(slot, true, tabIdx !== null ? parseInt(tabIdx) : null);
        existing.parentNode.replaceChild(newCard, existing);
      }
    });
  }

  // Re-apply layout (from cache — no jitter)
  layoutDisplay();
  // Update filter highlights to reflect any break changes
  patchFilter();
  // Also check for new request notifications
  checkRequestNotifications();
}

// ─── Dept admin prompt (display board entry point) ───────────────────────────
// Passcode stored in Firebase deptAdmin/{code}/passcode — shared across all devices.
async function showDeptAdminPrompt() {
  const overlay = el("div", { class: "confirm-overlay" });
  const box     = el("div", { class: "confirm-box" },
    el("div", { class: "confirm-title" }, "Admin Access"),
    el("div", { class: "confirm-msg",   style: { color: "#9c8a7e" } }, "Loading…"),
  );
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  // Fetch from Firebase; auto-migrate from localStorage if needed
  let stored;
  try {
    stored = await getDeptAdminPasscode(session.deptCode);
    if (!stored) {
      const local = localStorage.getItem(`gbadmin_${session.deptCode}`);
      if (local) {
        // Migrate — if write fails on a flaky connection, still allow access with local value
        try {
          await saveDeptAdminPasscode(session.deptCode, local);
          localStorage.removeItem(`gbadmin_${session.deptCode}`);
        } catch { /* migration write failed — continue with local value */ }
        stored = local;
      }
    }
  } catch(e) {
    box.innerHTML = "";
    box.append(
      el("div", { class: "confirm-title" }, "Error"),
      el("div", { class: "confirm-msg"  }, "Could not load admin settings. Check your connection."),
      el("div", { class: "btn-row" }, el("button", { class: "btn-ghost", style: { flex: "1" }, onClick: () => overlay.remove() }, "Close")),
    );
    return;
  }

  const isFirst    = !stored;
  const inputStyle = { marginBottom: "8px", width: "100%", boxSizing: "border-box" };
  const passIn1    = el("input", { class: "text-input", type: "password", placeholder: isFirst ? "New passcode (min 4 chars)" : "Admin passcode", autocomplete: "off", style: inputStyle });
  const passIn2    = isFirst ? el("input", { class: "text-input", type: "password", placeholder: "Confirm passcode", autocomplete: "off", style: inputStyle }) : null;
  const statusMsg  = el("div", { style: { fontSize: "12px", color: "#dc2626", minHeight: "16px", marginBottom: "6px" } });
  const submitBtn  = el("button", { class: "btn-primary", style: { flex: "1", padding: "10px" } }, isFirst ? "Set Passcode" : "Enter");
  const cancelBtn  = el("button", { class: "btn-ghost",   style: { flex: "1" } }, "Cancel");

  async function attempt() {
    const p1 = passIn1.value.trim();
    if (isFirst) {
      const p2 = passIn2.value.trim();
      if (p1.length < 4) { statusMsg.textContent = "Passcode must be at least 4 characters."; return; }
      if (p1 !== p2)      { statusMsg.textContent = "Passcodes do not match."; return; }
      try {
        await saveDeptAdminPasscode(session.deptCode, p1);
        overlay.remove(); renderAdminPage(session.deptCode, true);
      } catch(e) { statusMsg.textContent = "Save failed. Check your connection."; }
    } else {
      if (!p1)           { statusMsg.textContent = "Enter your passcode."; return; }
      if (p1 !== stored) { statusMsg.textContent = "Incorrect passcode."; passIn1.value = ""; passIn1.focus(); return; }
      overlay.remove(); renderAdminPage(session.deptCode, true);
    }
  }

  passIn1.addEventListener("keydown", e => { if (e.key === "Enter") { isFirst ? passIn2?.focus() : attempt(); } });
  if (passIn2) passIn2.addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });
  submitBtn.addEventListener("click", attempt);
  cancelBtn.addEventListener("click", () => overlay.remove());

  box.innerHTML = "";
  box.append(
    el("div", { class: "confirm-title" }, isFirst ? "Create Admin Passcode" : "Admin Access"),
    el("div", { class: "confirm-msg" }, isFirst ? "Set a passcode to secure admin access from this display board." : session.deptName + " · Admin Panel"),
    passIn1, ...(passIn2 ? [passIn2] : []), statusMsg,
    el("div", { class: "btn-row" }, submitBtn, cancelBtn),
  );
  setTimeout(() => passIn1.focus(), 50);
}

// ─── Render: Coordinator display ──────────────────────────────────────────────
function renderDisplay() {
  isDisplayMode = true;
  document.body.classList.add("display-mode");
  checkRequestNotifications();

  const visibleLocs = locations;

  const noBreakCards = noBreakSlots.map((s, i) => renderNoBreakCard(s, true, i));
  let dCardTabIdx = noBreakSlots.length;
  const cards = visibleLocs.map(loc => {
    if (isDivider(loc)) {
      // Divider: full-width element that forces a new row in CSS grid
      return el("div", { class: "display-divider-break" });
    }
    const card = renderCard(loc, true, dCardTabIdx++);
    if (activeFilter) {
      const room = boardData[roomId(loc)] || {};
      if (room.provider) {
        if ((room.breaks||{})[activeFilter]) {
          card.classList.add("filter-done");   // dim: already got this break
        } else {
          card.classList.add("filter-needs");  // highlight: still needs this break
        }
      }
    }
    return card;
  });

  const dRealLocs  = locations.filter(l => !isDivider(l));
  const dAllRooms  = dRealLocs.map(l => boardData[roomId(l)] || {});
  const dOccupied  = dAllRooms.filter(r => r.provider).length;
  const dAmLeft    = dAllRooms.filter(r => r.provider && !(r.breaks||{}).am).length;
  const dLunchLeft = dAllRooms.filter(r => r.provider && !(r.breaks||{}).lunch).length;
  const dPmLeft    = dAllRooms.filter(r => r.provider && !(r.breaks||{}).pm).length;

  const dCallChipEl = buildCallChip();

  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(el("div", {},

    el("div", { class: "summary-bar", style: { maxWidth: "none" } },
      ...[
        [dOccupied,  "Rooms Running",   "#fef3c7", "#b45309", "#f59e0b", null],
        [dAmLeft,    "AM remaining",    "#fee2e2", "#dc2626", "#f87171", "am"],
        [dLunchLeft, "Lunch remaining", "#e0f2fe", "#0369a1", "#38bdf8", "lunch"],
        [dPmLeft,    "PM remaining",    "#ede9fe", "#7c3aed", "#a78bfa", "pm"],
      ].map(([count, label, bg, color, dot, filterId]) => {
        const has = count > 0;
        const isActive = filterId !== null && activeFilter === filterId;
        const chip = el("div", {
          class: "chip" + (!filterId ? " filter-rooms" : "") + (isActive ? " active-filter" : ""),
          style: { background: has ? bg : "#2d2825", color: has ? color : "#4a4240", border: "2px solid " + (isActive ? color : "transparent") },
          ...(filterId ? { "data-filter": filterId } : {})
        },
          el("span", { class: "chip-dot", style: { background: has ? dot : "#3d3530" } }),
          el("span", { class: "chip-count" }, String(count)),
          el("span", {}, label + (isActive ? " ✕" : "")),
        );
        if (filterId) chip.addEventListener("click", () => { activeFilter = (activeFilter === filterId) ? null : filterId; patchFilter(); });
        return chip;
      }).concat(dCallChipEl ? [dCallChipEl] : [])
       .concat([buildEodChip()])
       .concat([(() => {
         const adminBtn = el("div", { class: "chip", style: { marginLeft: "auto", cursor: "pointer", background: "#3d3530", color: "#c9bdb7", border: "1px solid #5a4e48" } }, "Admin");
         adminBtn.addEventListener("click", showDeptAdminPrompt);
         return adminBtn;
       })()])
       .concat([(() => {
         const btn = el("div", { class: "chip", style: { cursor: "pointer", background: "#3d3530", color: "#c9bdb7", border: "1px solid #5a4e48" } }, "Change Display");
         btn.addEventListener("click", () => { isDisplayMode = false; renderBoard(); });
         return btn;
       })()])
    ),
    buildMotd(true),
    el("div", { class: "display-outer" },
      noBreakSlots.length ? el("div", { class: "display-nobreak-row" }, ...noBreakCards) : null,
      noBreakSlots.length ? el("hr", { class: "display-divider" }) : null,
      el("div", { class: "display-wrap" }, ...cards),
    ),
  ));

  // Calculate optimal card layout after DOM paints (force remeasure on full rebuild)
  _layoutCache = null;
  requestAnimationFrame(() => requestAnimationFrame(() => layoutDisplay(true)));

  // Re-layout on window resize (TV resolution change, window resize)
  window.removeEventListener("resize", window._displayResizeHandler);
  window._displayResizeHandler = () => {
    clearTimeout(window._resizeLayoutTimer);
    window._resizeLayoutTimer = setTimeout(() => layoutDisplay(true), 80);
  };
  window.addEventListener("resize", window._displayResizeHandler);

  // ── Per-slot Firebase listeners for instant no-break card refresh ──
  // The main board onValue delivers a full snapshot which can lag on slow connections.
  // Targeted listeners on each nb_ key fire immediately when only that slot changes.
  (window._nbSlotListeners || []).forEach(u => u());
  window._nbSlotListeners = noBreakSlots.map(slot => {
    const id = roomId("nb_" + slot);
    const slotRef = ref(db, `boards/${session.deptCode}/${tsDay()}/${id}`);
    return onValue(slotRef, snap => {
      boardData[id] = snap.val() || {};
      const provider = boardData[id].provider || null;
      const nbRow = document.querySelector(".display-nobreak-row");
      if (!nbRow) return;
      const cards = Array.from(nbRow.querySelectorAll(".or-card.no-break-card"));
      const existing = cards.find(c => c.querySelector(".no-break-label")?.textContent === slot);
      if (!existing || existing.querySelector(".provider-input-wrap")) return;
      const nameBtn = existing.querySelector(".provider-name-btn");
      if (!nameBtn) return;
      nameBtn.textContent = provider ? callStatusPrefix(provider) + provider : "Tap to assign";
      nameBtn.classList.toggle("empty", !provider);
      existing.classList.toggle("empty", !provider);
    });
  });

  clearTimeout(window._holdRefreshTimer);
  window._holdRefreshTimer = setTimeout(function tickDisplay() {
    if (!document.querySelector(".display-outer")) return;
    // Use patchDisplay (no DOM rebuild) — timer only needs to refresh hold countdowns
    const active = document.activeElement;
    if (!active || (active.tagName !== "INPUT" && active.tagName !== "TEXTAREA")) {
      patchDisplay();
    }
    // Reschedule
    window._holdRefreshTimer = setTimeout(tickDisplay, 30000);
  }, 30000);
}
